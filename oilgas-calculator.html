{
tab: 8,
id: 'h2s_safety',
title: {ru:'БЕЗОПАСНОСТЬ — РАСЧЁТ ЗОНЫ H₂S',en:'SAFETY — H₂S HAZARD ZONE CALC'},
fields: [
{ id: 'Q_h2s', label:{ ru: 'Расход выброса H₂S (кг/с)', en: 'H₂S emission rate (kg/s)' }, def: '' },
{ id: 'U_wind', label:{ ru: 'Скорость ветра (м/с)', en: 'Wind speed (m/s)' }, def: '3' },
{ id: 'C_h2s', label:{ ru: 'Концентр. H₂S в газе (% мол.)', en: 'H₂S in gas (mol%)' }, def: '' },
{ id: 'Q_gas', label:{ ru: 'Дебит газа (тыс.м³/сут)', en: 'Gas rate (Mm³/d)' }, def: '' },
],
calc(v) {
const Q_h2s=+v.Q_h2s, U=+v.U_wind, C_h2s=+v.C_h2s, Q_gas=+v.Q_gas;
if((!Q_h2s && (!C_h2s||!Q_gas))||!U) return null;

let m_h2s = Q_h2s;
if(!m_h2s && C_h2s && Q_gas) {

const Q_m3s = Q_gas*1000/86400;
m_h2s = Q_m3s*(C_h2s/100)*34/22.4;
}

const PDK_work = 0.00001;
const PDK_danger = 0.0003;
const PDK_lethal = 0.0009;

const R_work = Math.sqrt(m_h2s/(Math.PI*U*PDK_work));
const R_danger = Math.sqrt(m_h2s/(Math.PI*U*PDK_danger));
const R_lethal = Math.sqrt(m_h2s/(Math.PI*U*PDK_lethal));
return [
[{ru:'Выброс H₂S',en:'H₂S emission'}[lang], m_h2s.toFixed(4)+' кг/с'],
[{ru:'Зона ПДК рабочей зоны (10мг/м³)',en:'Workplace MAC zone (10mg/m³)'}[lang], R_work.toFixed(0)+' м'],
[{ru:'Опасная зона (300 мг/м³)',en:'Hazard zone (300 mg/m³)'}[lang], R_danger.toFixed(0)+' м'],
[{ru:'Смертельная зона (900 мг/м³)',en:'Lethal zone (900 mg/m³)'}[lang], R_lethal.toFixed(0)+' м'],
[{ru:'Направление эвакуации',en:'Evacuation direction'}[lang], L('ПРОТИВ направления ветра','UPWIND from source')],
];
}
},

{
tab: 2,
id: 'pipe_stress',
title: {ru:'ПРОЧНОСТЬ ОБСАДНОЙ КОЛОННЫ',en:'CASING STRING STRENGTH'},
fields: [
{ id: 'D_out', label:{ ru: 'Внешн. диаметр (мм)', en: 'Outer diameter (mm)' }, def: '168.3' },
{ id: 'D_in', label:{ ru: 'Внутр. диаметр (мм)', en: 'Inner diameter (mm)' }, def: '152' },
{ id: 'sigma_t', label:{ ru: 'Предел текучести стали (МПа)', en: 'Steel yield strength (MPa)' }, def: '550' },
{ id: 'H', label:{ ru: 'Глубина спуска колонны (м)', en: 'Casing depth (m)' }, def: '' },
{ id: 'rho_fl', label:{ ru: 'Плотность флюида (кг/м³)', en: 'Fluid density (kg/m³)' }, def: '1200' },
],
calc(v) {
const Do=+v.D_out/1000, Di=+v.D_in/1000, sig=+v.sigma_t;
const H=+v.H, rho=+v.rho_fl;
if(!Do||!Di||!sig) return null;
const t = (Do-Di)/2;
const t_mm = t*1000;

const D_t = Do/t;
let P_collapse;
if(D_t <= 15) P_collapse = 2*sig*t/(Do)*0.875/1e6*10.197;
else P_collapse = (0.052*sig/(D_t-0.875)/1e6)*10197;

const P_burst = 2*sig*t/(Do)*0.875/1e6*10.197;

const F_metal = Math.PI/4*(Do*Do - Di*Di);
const N_yield = F_metal*sig*1e6/1000;

const G_col = H ? F_metal*H*7850*9.81/1000 : null;

const P_hydro = H && rho ? rho*9.81*H/101325 : null;
const res = [
[{ru:'Толщина стенки',en:'Wall thickness'}[lang], t_mm.toFixed(1)+' мм'],
[{ru:'Давление смятия (collapse)',en:'Collapse pressure'}[lang], Math.abs(P_collapse).toFixed(0)+' атм'],
[{ru:'Давление разрыва (burst)',en:'Burst pressure'}[lang], P_burst.toFixed(0)+' атм'],
[{ru:'Растягивающая нагрузка (предел)',en:'Tensile limit load'}[lang], N_yield.toFixed(0)+' кН'],
];
if(G_col) res.push([{ru:'Вес колонны',en:'String weight'}[lang], (G_col/1000).toFixed(2)+' т']);
if(P_hydro) res.push([{ru:'Гидростатика на башмаке',en:'Hydrostatic at shoe'}[lang], P_hydro.toFixed(1)+' атм']);
return res;
}
},

{
tab: 10,
id: 'z_factor',
title: {ru:'Z-ФАКТОР ГАЗА (ПРИБЛИЖ.)',en:'GAS Z-FACTOR (APPROX.)'},
fields: [
{ id: 'P', label:{ ru: 'Давление P (МПа)', en: 'Pressure P (MPa)' }, def: '' },
{ id: 'T', label:{ ru: 'Температура T (°C)', en: 'Temperature T (°C)' }, def: '' },
{ id: 'Pc', label:{ ru: 'Псевдокрит. давл. Pc (МПа)', en: 'Pseudo-critical pressure Pc (MPa)' }, def: '4.6' },
{ id: 'Tc', label:{ ru: 'Псевдокрит. темп. Tc (°C)', en: 'Pseudo-critical temp Tc (°C)' }, def: '-80' },
],
calc(v) {
const P=+v.P, T=+v.T+273.15, Pc=+v.Pc, Tc=+v.Tc+273.15;
if(!P||!T||!Pc||!Tc) return null;
const Ppr=P/Pc, Tpr=T/Tc;

const A=-0.06125*Ppr/Tpr*Math.exp(-1.2*Math.pow(1-1/Tpr,2));

const Z = 1 - (0.06125*Ppr/Tpr)*Math.exp(-1.2*Math.pow(1-1/Tpr,2)) * 0.9;
const rho_sc=0.7173*P*1000/(Z*(T))*0.001;
return [
['Z-фактор (прибл.)', Math.max(0.1,Z).toFixed(4)],
['Ppr (приведённое)', Ppr.toFixed(4)],
['Tpr (приведённое)', Tpr.toFixed(4)],
];
}
},

fields: [

{ id: 'cosf', label:'cosφ', def: '0.85' },
{ id: 'U_vn', label:{ ru: 'Напряжение ВН (кВ)', en: 'HV voltage (kV)' }, def: '6',
type:'select', options:[{v:'6',l:'6 кВ'},{v:'10',l:'10 кВ'},{v:'35',l:'35 кВ'}]},
{ id: 'U_nn', label:{ ru: 'Напряжение НН (В)', en: 'LV voltage (V)' }, def: '1000',
type:'select', options:[{v:'380',l:'380 В'},{v:'660',l:'660 В'},{v:'1000',l:'1000 В'},{v:'6000',l:'6000 В'}]},
{ id: 'k_zap', label:{ ru: 'Коэфф. загрузки (0.70-0.85)', en: 'Load factor (0.70-0.85)' }, def: '0.75' },
{ id: 'Uk', label:{ ru: 'Напряжение КЗ Uк (%)', en: 'Short-circuit voltage Uk (%)' }, def: '5.5' },
],
calc(v) {
const P=+v.P_load, cosf=+v.cosf, Uvn=+v.U_vn*1000, Unn=+v.U_nn;
const kz=+v.k_zap, Uk=+v.Uk/100;
if(!P||!cosf||!Uvn||!Unn||!kz) return null;
const Q=P*Math.sqrt(1-cosf*cosf)/cosf;
const S_load=Math.sqrt(P*P+Q*Q);
const S_need=S_load/kz;
const std=[25,40,63,100,160,250,400,630,1000,1600,2500,4000,6300];
const S_std=std.find(s=>s>=S_need)||6300;
const I_nn=S_std*1000/(Math.sqrt(3)*Unn);
const I_vn=S_std*1000/(Math.sqrt(3)*Uvn);
const I_kz=I_nn/Uk;
const eta=P/(P+S_std*0.003+S_std*Uk*kz*kz)*100;
return [
[{ru:'Полная нагрузка S',en:'Apparent load S'}[lang], S_load.toFixed(1)+' кВА'],
[{ru:'Требуемая мощность',en:'Required power'}[lang], S_need.toFixed(1)+' кВА'],
[{ru:'ВЫБРАННЫЙ ТРАНСФОРМАТОР',en:'SELECTED TRANSFORMER'}[lang], 'ТМ-'+S_std+'/'+Math.round(Uvn/1000)],
[{ru:'Ток НН ('+Unn+' В)',en:'LV current'}, I_nn.toFixed(1)+' А'],
[{ru:'Ток ВН ('+Math.round(Uvn/1000)+' кВ)',en:'HV current'}, I_vn.toFixed(2)+' А'],
[{ru:'Ток КЗ на шинах НН',en:'Short-circuit current LV bus'}[lang], I_kz.toFixed(0)+' А'],
[{ru:'КПД при загрузке '+Math.round(kz*100)+'%',en:'Efficiency at '+Math.round(kz*100)+'%'}, eta.toFixed(2)+'%'],
[{ru:'Потери х.х.',en:'No-load losses'}[lang], (S_std*0.003).toFixed(2)+' кВт'],
];
}

]},

type:'select', options:[{v:'1',l:'1'},{v:'2',l:'2'},{v:'4',l:'4'}]},
],
calc(v) {
const hx=+v.hx, L=+v.L_obj||0, W=+v.W_obj||0;
const zone=v.zone||'A', n=+v.n_rods||1;
if(!hx) return null;
const hd=L&&W?Math.sqrt(L*L+W*W)/2:Math.max(L,W)||10;
let hr=null;
for(let h=Math.ceil(hx)+1;h<=200;h++){
const rx=zone==='A'?(1.1-0.002*h)*(h-hx/0.85):1.5*(h-hx/0.92);
if(rx*Math.sqrt(n)>=hd){hr=h;break;}
}
if(!hr) hr=200;
const h=hr;
const h0=zone==='A'?0.85*h:0.92*h;
const r0=zone==='A'?1.2*h:1.5*h;
const rx=zone==='A'?(1.1-0.002*h)*(h-hx/0.85):1.5*(h-hx/0.92);
const ok=rx*Math.sqrt(n)>=hd;
return [
[{ru:'Зона / надёжность',en:'Zone / reliability'}[lang], 'Зона '+zone+' ('+(zone==='A'?'99.5%':'95%')+')'],

];

{ id: 'rho_c', label:{ ru: 'Плотность реагента (кг/л)', en: 'Chemical density (kg/L)' }, def: '1.05' },
{ id: 'conc', label:{ ru: 'Концентрация раствора (%)', en: 'Solution concentration (%)' }, def: '100' },
{ id: 'chem', label:{ ru: 'Тип реагента', en: 'Chemical type' }, def: 'inhib',
type:'select', options:[
{v:'inhib',l:'Ингибитор коррозии — 20-100 ppm'},{v:'scale',l:'Ингибитор солеотложений — 10-50 ppm'},
{v:'deemul',l:'Деэмульгатор — 30-200 ppm'},{v:'bact',l:'Бактерицид — 50-500 ppm'},
{v:'asph',l:'Депрессатор АСПО — 100-500 ppm'},{v:'methol',l:'Метанол (гидраты)'},
{v:'other',l:'Другой реагент'},
]},
],
calc(v) {
const Qf=+v.Q_fl,dose=+v.dose,rho=+v.rho_c,conc=+v.conc/100;
if(!Qf||!dose||!rho||!conc) return null;
const Vd=Qf*1000*dose/1e6/conc, Vh=Vd/24, md=Vd*rho;
const sa=[0.1,0.5,1,2,4,8,16,25,40,63,100,160,250];
const Qp=sa.find(q=>q>=Vh)||250;
const nm={inhib:'Ингибитор коррозии',scale:'Ингиб. солеотл.',deemul:'Деэмульгатор',bact:'Бактерицид',asph:'Деп. АСПО',methol:'Метанол',other:'Реагент'};
return [
[{ru:'Тип реагента',en:'Chemical type'}[lang], nm[v.chem]||'Реагент'],
[{ru:'РАСХОД л/сут',en:'RATE L/d'}[lang], Vd.toFixed(3)+' л/сут'],
[{ru:'Расход л/ч',en:'Rate L/h'}[lang], Vh.toFixed(4)+' л/ч'],
[{ru:'Расход мл/мин',en:'Rate mL/min'}[lang], (Vd/1440*1000).toFixed(2)+' мл/мин'],
[{ru:'Масса кг/сут',en:'Mass kg/d'}[lang], md.toFixed(3)+' кг/сут'],
[{ru:'Расход кг/мес',en:'Consumption kg/month'}[lang], (md*30).toFixed(1)+' кг'],
[{ru:'Расход кг/год',en:'Consumption kg/year'}[lang], (md*365).toFixed(0)+' кг'],
[{ru:'НАСОС-ДОЗАТОР подача',en:'DOSING PUMP rate'}[lang], Qp+' л/ч'],
];
}

{
tab: 9,
id: 'choke_dp',
title: {ru:'ШТУЦЕР — ДРОССЕЛИРОВАНИЕ И РАСХОД',en:'CHOKE — THROTTLING & FLOW'},
fields: [
{ id: 'mode', label:{ ru: 'Режим расчёта', en: 'Calculation mode' }, def: 'q_from_dp',
type:'select', options:[
{v:'q_from_dp',l:'Расход → по ΔP и диаметру'},
{v:'dp_from_q',l:'ΔP → по расходу и диаметру'},
{v:'d_from_q', l:'Диаметр → по расходу и ΔP'},
]},
{ id: 'D_ch', label:{ ru: 'Диаметр штуцера (мм)', en: 'Choke diameter (mm)' }, def: '' },
{ id: 'P1', label:'P1 до штуцера (атм)', def: '' },
{ id: 'P2', label:'P2 после штуцера (атм)', def: '' },
{ id: 'Q_m3d', label:{ ru: 'Расход Q (м³/сут) — для режима ΔP или D', en: 'Rate Q (m³/d) — for ΔP or D mode' }, def: '' },
{ id: 'rho', label:{ ru: 'Плотность флюида (кг/м³)', en: 'Fluid density (kg/m³)' }, def: '870' },
{ id: 'Cd', label:{ ru: 'Коэфф. расхода Cd (0.60-0.85)', en: 'Discharge coeff. Cd (0.60-0.85)' }, def: '0.75' },
],
calc(v) {
const mode=v.mode, D=+v.D_ch/1000, P1=+v.P1*101325, P2=+v.P2*101325;
const Qi=+v.Q_m3d/86400, rho=+v.rho, Cd=+v.Cd;
if(!rho||!Cd) return null;
const dP=P1-P2;
if(mode==='q_from_dp'){
if(!D||dP<=0) return null;
const A=Math.PI/4*D*D, vel=Cd*Math.sqrt(2*dP/rho), Q=A*vel;
return [
['ΔP', (dP/101325).toFixed(2)+' атм'],
[{ru:'Скорость',en:'Velocity'}[lang], vel.toFixed(2)+' м/с'],
[{ru:'РАСХОД м³/сут',en:'FLOW RATE m³/d'}[lang], (Q*86400).toFixed(2)+' м³/сут'],
[{ru:'Расход барр/сут',en:'Rate bbl/d'}[lang], (Q*86400/0.159).toFixed(1)+' барр/сут'],
];
} else if(mode==='dp_from_q'){
if(!D||!Qi) return null;
const A=Math.PI/4*D*D, vel=Qi/A, dp2=rho*vel*vel/(2*Cd*Cd);
return [
[{ru:'Скорость',en:'Velocity'}[lang], vel.toFixed(2)+' м/с'],
[{ru:'ПЕРЕПАД ΔP',en:'PRESSURE DROP ΔP'}[lang], (dp2/101325).toFixed(3)+' атм'],
];
} else {
if(!Qi||dP<=0) return null;
const An=Qi/(Cd*Math.sqrt(2*dP/rho)), Dn=Math.sqrt(4*An/Math.PI)*1000;
const sd=[3,4,5,6,8,10,12,14,16,18,20,25,30,35,40,50];
const Ds=sd.find(d=>d>=Dn)||50;
return [
[{ru:'РАСЧЁТНЫЙ ДИАМЕТР',en:'CALCULATED DIAMETER'}[lang], Dn.toFixed(2)+' мм'],
[{ru:'СТАНДАРТНЫЙ ШТУЦЕР',en:'STANDARD CHOKE'}[lang], Ds+' мм'],
];
}
}
},

{
tab: 9,
id: 'ejector_gas',
title: {ru:'ЭЖЕКТОР ГАЗА — СТЕПЕНЬ ИНЖЕКЦИИ И КПД',en:'GAS EJECTOR — INJECTION RATIO & EFFICIENCY'},
fields: [
{ id: 'Pw', label:'P рабочего газа P_раб (атм)', def: '' },
{ id: 'Ps', label:'P всасывания P_нас (атм)', def: '' },
{ id: 'Po', label:'P выхода P_вых (атм)', def: '' },
{ id: 'Qw', label:{ ru: 'Расход рабочего газа (тыс.м³/сут)', en: 'Motive gas flow (Mm³/d)' }, def: '' },
],
calc(v) {
const Pw=+v.Pw, Ps=+v.Ps, Po=+v.Po, Qw=+v.Qw;
if(!Pw||!Ps||!Po||!Qw) return null;
if(!(Ps<Po&&Po<Pw)) return [[L('Ошибка: P_нас < P_вых < P_раб','Error: Ps < Po < Pw'),'']];
const u=0.5*(Math.sqrt(Pw/Po)-1)/Math.sqrt(Po/Ps);
const Qs=Qw*u, eta=u*(Po-Ps)/(Pw-Po)*100;
return [
[{ru:'Степень сжатия пасс. газа',en:'Suction compression ratio'}[lang], (Po/Ps).toFixed(3)],
[{ru:'Коэфф. инжекции u',en:'Injection ratio u'}[lang], u.toFixed(3)],
[{ru:'РАСХОД ПАССИВНОГО ГАЗА',en:'ENTRAINED GAS FLOW'}[lang], Qs.toFixed(2)+' тыс.м³/сут'],
[{ru:'Суммарный расход на выходе',en:'Total outlet flow'}[lang], (Qw+Qs).toFixed(2)+' тыс.м³/сут'],
[{ru:'КПД эжектора',en:'Ejector efficiency'}[lang], eta.toFixed(1)+'%'],
];
}
},

const g=pd[v.gas]; if(!g) return null;
let Cm=+v.C_mgm3;
if(!Cm&&+v.C_ppm) Cm=+v.C_ppm*g.mw/24.04;
const res=[
[{ru:'Класс опасности',en:'Hazard class'}[lang], g.klass+' кл.'],

let activeTab = 0;

function render() {
const tabsEl = document.getElementById('tabs-container');
const sectsEl = document.getElementById('sections-container');
tabsEl.innerHTML = '';
sectsEl.innerHTML = '';

const tabs = T[lang].tabNames;
tabs.forEach((name, i) => {
const btn = document.createElement('button');
btn.className = 'tab' + (i===activeTab?' active':'');
btn.textContent = name;
btn.onclick = () => { activeTab=i; render(); };
tabsEl.appendChild(btn);
});

const numTabs = tabs.length;
for(let t=0; t<numTabs; t++) {
const sec = document.createElement('div');
sec.className = 'section' + (t===activeTab?' active':'');
const grid = document.createElement('div');
grid.className = 'calc-grid';
calcs.filter(c=>c.tab===t).forEach(c => {
grid.appendChild(buildCard(c));
});
sec.appendChild(grid);
sectsEl.appendChild(sec);
}
}

function buildCard(c) {
const card = document.createElement('div');
card.className = 'calc-card';

const title = document.createElement('div');
title.className = 'card-title';
title.textContent = c.title[lang];
card.appendChild(title);



const vals = {};
c.fields.forEach(f => {
const div = document.createElement('div');
div.className = 'field';
const label = document.createElement('label');
label.textContent = typeof f.label==='object'?f.label[lang]:f.label;
div.appendChild(label);

let input;
if(f.type === 'select') {
input = document.createElement('select');
const opts = f.options || f.opts || [];
opts.forEach(o => {
const opt = document.createElement('option');
if(typeof o === 'object' && o.v !== undefined) {
opt.value = o.v;
opt.textContent = o.l || o.v;
if(f.def && o.v === f.def) opt.selected = true;
} else {
opt.value = o; opt.textContent = o;
if(f.def && o === f.def) opt.selected = true;
}
input.appendChild(opt);
});
} else {
input = document.createElement('input');
input.type = 'number';
input.step = 'any';
if(f.def) input.value = f.def;
input.placeholder = '0';
}
input.id = c.id + '_' + f.id;
vals[f.id] = input;
div.appendChild(input);
card.appendChild(div);

input.addEventListener('keydown', e => { if(e.key==='Enter') doCalc(); });
});

const btn = document.createElement('button');
btn.className = 'calc-btn';
btn.textContent = T[lang].btn;
card.appendChild(btn);

const resultBox = document.createElement('div');
resultBox.className = 'result-box';
card.appendChild(resultBox);

function doCalc() {
const inputs = {};
c.fields.forEach(f => { inputs[f.id] = vals[f.id].value; });
const res = c.calc(inputs);
resultBox.innerHTML = '';
if(!res) {
resultBox.className = 'result-box visible';
resultBox.innerHTML = `<div style="color:var(--red);font-family:'Share Tech Mono',monospace;font-size:11px">${T[lang].err}</div>`;
return;
}
resultBox.className = 'result-box visible';
res.forEach(row => {
const [lbl, val] = row;
const rd = document.createElement('div');
rd.className = 'result-row';
const lel = document.createElement('span');
lel.className = 'result-label';
lel.textContent = typeof lbl==='object'?lbl[lang]:lbl;
const vel = document.createElement('span');
vel.className = 'result-val';
vel.textContent = val;
rd.appendChild(lel);
rd.appendChild(vel);
resultBox.appendChild(rd);
});
}

btn.onclick = doCalc;
return card;
}
