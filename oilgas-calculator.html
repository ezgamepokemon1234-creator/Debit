<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIL & GAS CALCULATOR</title>
<style> :root { --bg: #060a0f; --bg2: #0c1219; --panel: #0f1a24; --border: #1a3040; --gold: #c8952a; --gold2: #f0b940; --cyan: #00d4ff; --green: #00ff88; --red: #ff4455; --text: #b0c8d8; --muted: #3a5060; --white: #e8f4fc; } * { margin:0; padding:0; box-sizing:border-box; } body { background: var(--bg); color: var(--text); font-family: 'Trebuchet MS', 'Arial', sans-serif; min-height: 100vh; background-image: radial-gradient(ellipse at 10% 20%, rgba(200,149,42,0.06) 0%, transparent 40%), radial-gradient(ellipse at 90% 80%, rgba(0,212,255,0.04) 0%, transparent 40%), repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(26,48,64,0.1) 40px, rgba(26,48,64,0.1) 41px), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(26,48,64,0.1) 40px, rgba(26,48,64,0.1) 41px); } header { text-align: center; padding: 32px 20px 20px; position: relative; } .lang-switch { position: absolute; top: 24px; right: 20px; display: flex; gap: 4px; } .lang-btn { padding: 6px 14px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Courier New', 'Consolas', monospace; font-size: 11px; letter-spacing: 2px; cursor: pointer; border-radius: 3px; transition: all 0.2s; } .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); } .header-badge { font-family: 'Courier New', 'Consolas', monospace; font-size: 10px; letter-spacing: 5px; color: var(--gold); margin-bottom: 10px; opacity: 0.8; } h1 { font-family: 'Courier New', 'Consolas', monospace; font-size: clamp(22px, 5vw, 48px); font-weight: 900; color: var(--white); letter-spacing: 4px; line-height: 1; } h1 span { color: var(--gold); } .header-sub { font-family: 'Courier New', 'Consolas', monospace; font-size: 11px; color: var(--muted); letter-spacing: 3px; margin-top: 8px; } .header-line { width: 200px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto 0; } .tabs-wrap { max-width: 1100px; margin: 0 auto; padding: 0 16px; } .tabs { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 24px; border-bottom: 1px solid var(--border); } .tab { padding: 10px 16px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'Courier New', 'Consolas', monospace; font-size: 10px; letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s; white-space: nowrap; margin-bottom: -1px; text-transform: uppercase; } .tab:hover { color: var(--text); } .tab.active { color: var(--gold); border-bottom-color: var(--gold); } .section { display: none; } .section.active { display: block; } .calc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; padding-bottom: 32px; } .calc-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; position: relative; overflow: hidden; transition: border-color 0.2s; } .calc-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.6; } .calc-card:hover { border-color: rgba(200,149,42,0.4); } .card-title { font-family: 'Courier New', 'Consolas', monospace; font-size: 11px; font-weight: 700; color: var(--gold2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; } .card-formula { font-family: 'Courier New', 'Consolas', monospace; font-size: 10px; color: var(--muted); margin-bottom: 14px; letter-spacing: 0.5px; } .field { margin-bottom: 10px; } .field label { display: block; font-size: 10px; color: var(--muted); font-family: 'Courier New', 'Consolas', monospace; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; } .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; color: var(--white); font-family: 'Courier New', 'Consolas', monospace; font-size: 15px; outline: none; transition: border-color 0.2s; -moz-appearance: textfield; } .field input::-webkit-outer-spin-button, .field input::-webkit-inner-spin-button { -webkit-appearance: none; } .field input:focus, .field select:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(200,149,42,0.1); } .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; } .calc-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, var(--gold), #a07020); border: none; border-radius: 4px; color: var(--bg); font-family: 'Courier New', 'Consolas', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; margin-top: 6px; } .calc-btn:hover { background: linear-gradient(135deg, var(--gold2), var(--gold)); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,149,42,0.3); } .result-box { margin-top: 10px; padding: 12px; background: var(--bg); border-radius: 4px; border-left: 3px solid var(--gold); display: none; } .result-box.visible { display: block; animation: fadeIn 0.3s ease; } @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } } .result-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; border-bottom: 1px solid rgba(26,48,64,0.5); } .result-row:last-child { border-bottom: none; } .result-label { font-size: 10px; color: var(--muted); font-family: 'Courier New', 'Consolas', monospace; } .result-val { font-family: 'Courier New', 'Consolas', monospace; font-size: 15px; font-weight: 700; color: var(--gold2); } .result-unit { font-size: 10px; color: var(--muted); margin-left: 4px; font-family: 'Courier New', 'Consolas', monospace; } footer { text-align: center; padding: 24px 20px; font-family: 'Courier New', 'Consolas', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; } @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } .tab { font-size: 9px; padding: 8px 8px; letter-spacing: 0.5px; } .lang-switch { top: 12px; right: 12px; } } </style>
</head>
<body>

<header>
  <div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('ru')" id="btn-ru">РУС</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">ENG</button>
  </div>

  <!-- ATA LOGO -->
  <div style="display:flex;justify-content:center;margin-bottom:16px;">
    <svg width="90" height="90" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer border -->
      <rect x="3" y="3" width="84" height="84" rx="10" ry="10"
            fill="#0a1220" stroke="#c8952a" stroke-width="1.5"/>
      <!-- Inner corner accents -->
      <line x1="3" y1="18" x2="18" y2="3" stroke="#c8952a" stroke-width="1" opacity="0.4"/>
      <line x1="72" y1="3" x2="87" y2="18" stroke="#c8952a" stroke-width="1" opacity="0.4"/>
      <line x1="3" y1="72" x2="18" y2="87" stroke="#c8952a" stroke-width="1" opacity="0.4"/>
      <line x1="72" y1="87" x2="87" y2="72" stroke="#c8952a" stroke-width="1" opacity="0.4"/>
      <!-- Gold top accent line -->
      <line x1="20" y1="14" x2="70" y2="14" stroke="#c8952a" stroke-width="1" opacity="0.5"/>
      <!-- ATA text -->
      <text x="45" y="52" text-anchor="middle"
            font-family="'Courier New', monospace"
            font-size="28" font-weight="900" letter-spacing="4"
            fill="url(#goldGrad)">ATA</text>
      <!-- Subtitle -->
      <text x="45" y="65" text-anchor="middle"
            font-family="'Courier New', monospace"
            font-size="5.5" letter-spacing="1.5"
            fill="#c8952a" opacity="0.85">ANVAROV TIMUR</text>
      <text x="45" y="74" text-anchor="middle"
            font-family="'Courier New', monospace"
            font-size="5.5" letter-spacing="1.5"
            fill="#c8952a" opacity="0.85">AKRAMOVICH</text>
      <!-- Bottom accent line -->
      <line x1="20" y1="79" x2="70" y2="79" stroke="#c8952a" stroke-width="1" opacity="0.5"/>
      <!-- Gradient def -->
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#f0d070;stop-opacity:1"/>
          <stop offset="50%" style="stop-color:#c8952a;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#a07020;stop-opacity:1"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="header-badge" id="hbadge">⬡ НЕФТЕГАЗОВАЯ ОТРАСЛЬ</div>
  <h1>OIL &amp; <span>GAS</span></h1>
  <div class="header-sub" id="hsub">// ПРОФЕССИОНАЛЬНЫЙ КАЛЬКУЛЯТОР</div>
  <div class="header-line"></div>
</header>

<div class="tabs-wrap">
  <div class="tabs" id="tabs-container"></div>
  <div id="sections-container"></div>
</div>

<footer>OIL &amp; GAS CALCULATOR v2.0 · 2026 &nbsp;|&nbsp; Разработал: АНВАРОВ ТИМУР АКРАМОВИЧ</footer>

<script>

let lang = 'ru';
const L=(r,e)=>lang==='ru'?r:e;

const T = {
ru: {
badge: '⬡ НЕФТЕГАЗОВАЯ ОТРАСЛЬ',
sub: '// ПРОФЕССИОНАЛЬНЫЙ КАЛЬКУЛЯТОР',
btn: 'РАССЧИТАТЬ',
err: 'Введите корректные значения',
tabNames: [{ru:'ДОБЫЧА / ДЕБИТ',en:'PRODUCTION / RATE'}[lang], 'УЭЦН / ШГН / ГАЗЛИФТ', 'СКВАЖИНА / ГЛУШЕНИЕ', 'ДАВЛЕНИЕ / ГИДРАВЛ.', 'ПЛАСТ / ГДИ / ГРП', 'БУРЕНИЕ / КРС / РИР', 'СЕПАРАЦИЯ / ПОВЕРХ.', 'ЭЛЕКТРООБОРУДОВАНИЕ', 'БЕЗОПАСНОСТЬ / НГПА', 'ТЕХПРОЦЕСС / ХИМИ', 'PVT / ФЛЮИДЫ', 'ЕДИНИЦЫ / КОНВЕРТ.', 'ЭКОНОМИКА / МТО', 'ЭКОЛОГИЯ / ОХРАНА Т']
},
en: {
badge: '⬡ OIL & GAS INDUSTRY',
sub: '// ПРОФЕССИОНАЛЬНЫЙ КАЛЬКУЛЯТОР',
btn: 'CALCULATE',
err: 'Enter valid values',
tabNames: ['PRODUCTION / RATE', 'ESP / SRP / GASLIFT', 'WELL / KILL FLUID', 'PRESSURE / HYDRAUL.', 'RESERVOIR / PTA / FRAC', 'DRILLING / WO / RIW', 'SEPARATION / SURFACE', 'ELECTRICAL EQUIP.', 'SAFETY / EXPLOSION', 'PROCESS / CHEMICALS', 'PVT / FLUIDS', 'UNITS / CONVERSION', 'ECONOMICS / MTO', 'ECOLOGY / HSE']
}
};

const calcs = [

{
tab: 0,
id: 'direct',
title: {ru:'ПРЯМОЙ ЗАМЕР ДЕБИТА',en:'DIRECT FLOW MEASUREMENT'},
fields: [
{ id: 'v', label:{ ru: 'Объём жидкости (л)', en: 'Fluid volume (L)' }, def: '' },
{ id: 't', label:{ ru: 'Время замера (мин)', en: 'Measurement time (min)' }, def: '' },
],
calc(v) {
const V=+v.v, t=+v.t;
if(!V||!t) return null;
const lpm=V/t, m3h=lpm*60/1000, day=lpm*1440/1000;
return [
[{ru:'л/мин',en:'L/min'}[lang], lpm.toFixed(3)],
[{ru:'м³/ч',en:'m³/h'}[lang], m3h.toFixed(4)],
[{ru:'м³/сут',en:'m³/d'}[lang], day.toFixed(3)],
[{ru:'барр/сут',en:'bbl/d'}[lang], (day/0.159).toFixed(2)],
];
}
},

{
tab: 0,
id: 'pkv',
title: {ru:'РЕЖИМ ПКВ (ПЕРИОДИЧЕСКАЯ ОТКАЧКА)',en:'INTERMITTENT PUMPING (PKV)'},
fields: [
{ id: 'vc', label:{ ru: 'Объём за цикл (л)', en: 'Volume per cycle (L)' }, def: '' },
{ id: 'tw', label:{ ru: 'Время работы насоса (мин)', en: 'Pump run time (min)' }, def: '' },
{ id: 'ts', label:{ ru: 'Время простоя (мин)', en: 'Pump off time (min)' }, def: '' },
],
calc(v) {
const vc=+v.vc, tw=+v.tw, ts=+v.ts;
if(!vc||!tw||!ts) return null;
const cyc=tw+ts, kpd=(tw/cyc)*100, cpd=1440/cyc, lpm=vc/tw, day=(vc*cpd)/1000;
return [
[{ru:'Длина цикла',en:'Cycle length'}[lang], cyc.toFixed(1)+' мин'],
[{ru:'КПД',en:'Efficiency'}[lang], kpd.toFixed(1)+'%'],
[{ru:'Циклов/сут',en:'Cycles/day'}[lang], cpd.toFixed(2)],
[{ru:'Дебит рабочий',en:'Working rate'}[lang], lpm.toFixed(3)+' л/мин'],
[{ru:'Суточный дебит',en:'Daily rate'}[lang], day.toFixed(3)+' м³/сут'],
[{ru:'Суточный дебит',en:'Daily rate'}[lang], (day/0.159).toFixed(2)+' барр/сут'],
];
}
},

{
tab: 0,
id: 'darcy',
title: { ru: 'ЗАКОН ДАРСИ (ФИЛЬТРАЦИЯ)', en: "DARCY'S LAW (FILTRATION)" },
fields: [
{ id: 'k', label:{ ru: 'Проницаемость k (мД)', en: 'Permeability k (mD)' }, def: '100' },
{ id: 'A', label:{ ru: 'Площадь A (м²)', en: 'Area A (m²)' }, def: '1' },
{ id: 'dp', label:{ ru: 'Перепад ΔP (атм)', en: 'Pressure drop ΔP (atm)' }, def: '10' },
{ id: 'mu', label:{ ru: 'Вязкость μ (сПз)', en: 'Viscosity μ (cP)' }, def: '2' },
{ id: 'L', label:{ ru: 'Длина L (м)', en: 'Length L (m)' }, def: '100' },
],
calc(v) {
const k=+v.k, A=+v.A, dp=+v.dp, mu=+v.mu, L=+v.L;
if(!k||!A||!dp||!mu||!L) return null;
const Q = (k*9.869e-16 * A * dp*101325) / (mu*1e-3 * L);
const Qd = Q*86400;
return [
[{ru:'Расход',en:'Flow rate'}[lang], (Q*1e6).toFixed(4)+' м³/с·10⁻⁶'],
[{ru:'Суточный дебит',en:'Daily rate'}[lang], Qd.toFixed(4)+' м³/сут'],
[{ru:'Суточный дебит',en:'Daily rate'}[lang], (Qd/0.159).toFixed(3)+' барр/сут'],
];
}
},

{
tab: 0,
id: 'vogel',
title: { ru: 'УРАВНЕНИЕ ВОГЕЛЯ (IPR)', en: "VOGEL'S EQUATION (IPR)" },
fields: [
{ id: 'qmax', label:{ ru: 'Макс. дебит Qmax (м³/сут)', en: 'Max rate Qmax (m³/d)' }, def: '100' },
{ id: 'pr', label:{ ru: 'Пластовое давл. Pr (атм)', en: 'Reservoir pressure Pr (atm)' }, def: '200' },
{ id: 'pwf', label:{ ru: 'Забойное давл. Pwf (атм)', en: 'BHP Pwf (atm)' }, def: '120' },
],
calc(v) {
const qmax=+v.qmax, pr=+v.pr, pwf=+v.pwf;
if(!qmax||!pr||pwf<0) return null;
const r=pwf/pr, q=qmax*(1-0.2*r-0.8*r*r);
const PI=q/(pr-pwf);
return [
[{ru:'Дебит Q',en:'Rate Q'}[lang], q.toFixed(3)+' м³/сут'],
[{ru:'Дебит Q',en:'Rate Q'}[lang], (q/0.159).toFixed(2)+' барр/сут'],
[{ru:'Индекс продуктивности PI',en:'Productivity index PI'}[lang], PI.toFixed(4)+' м³/сут/атм'],
];
}
},

{
tab: 0,
id: 'productivity',
title: {ru:'ИНДЕКС ПРОДУКТИВНОСТИ',en:'PRODUCTIVITY INDEX'},
fields: [
{ id: 'Q', label:{ ru: 'Фактический дебит Q (м³/сут)', en: 'Actual rate Q (m³/d)' }, def: '' },
{ id: 'Pr', label:{ ru: 'Пластовое давл. (атм)', en: 'Reservoir pressure (atm)' }, def: '' },
{ id: 'Pwf', label:{ ru: 'Забойное давл. (атм)', en: 'BHP (atm)' }, def: '' },
],
calc(v) {
const Q=+v.Q, Pr=+v.Pr, Pwf=+v.Pwf;
if(!Q||!Pr||Pwf<0||Pr<=Pwf) return null;
const PI=Q/(Pr-Pwf);
const drawdown=Pr-Pwf;
return [
[{ru:'Депрессия',en:'Drawdown'}[lang], drawdown.toFixed(2)+' атм'],
[{ru:'Индекс продуктивности',en:'Productivity index'}[lang], PI.toFixed(4)+' м³/сут/атм'],
['PI в барр', (PI/0.159).toFixed(4)+' барр/сут/атм'],
];
}
},

{
tab: 6,
id: 'sep_gor',
title: {ru:'ГАЗ-НЕФТЯНОЙ ФАКТОР',en:'GAS-OIL RATIO (GOR)'},
fields: [
{ id: 'qg', label:{ ru: 'Дебит газа (тыс. м³/сут)', en: 'Gas rate (Mm³/d)' }, def: '' },
{ id: 'qo', label:{ ru: 'Дебит нефти (м³/сут)', en: 'Oil rate (m³/d)' }, def: '' },
],
calc(v) {
const qg=+v.qg*1000, qo=+v.qo;
if(!qg||!qo) return null;
const gor=qg/qo;
return [
[{ru:'ГФФ',en:'GOR'}[lang], gor.toFixed(1)+' м³/м³'],
[{ru:'ГФФ',en:'GOR'}[lang], (gor/5.615).toFixed(1)+' scf/bbl'],
[{ru:'Тип флюида',en:'Fluid type'}[lang], gor<100?L('Нефть','Oil'):gor<5000?L('Газоконденсат','Gas condensate'):L('Газ','Gas')],
];
}
},

{
tab: 6,
id: 'sep_split',
title: {ru:'РАСЧЁТ СЕПАРАТОРА (ЖИДКОСТЬ-ГАЗ)',en:'SEPARATOR SIZING (L/G)'},
fields: [
{ id: 'K', label:{ ru: 'Коэфф. K (вертик. = 0.06)', en: 'Coeff. K (vertical = 0.06)' }, def: '0.06' },
{ id: 'rho_l', label:{ ru: 'Плотность жидкости (кг/м³)', en: 'Fluid density (kg/m³)' }, def: '800' },
{ id: 'rho_g', label:{ ru: 'Плотность газа (кг/м³)', en: 'Gas density (kg/m³)' }, def: '50' },
{ id: 'Qg', label:{ ru: 'Расход газа (м³/ч)', en: 'Gas flow rate (m³/h)' }, def: '1000' },
],
calc(v) {
const K=+v.K, rl=+v.rho_l, rg=+v.rho_g, Qg=+v.Qg/3600;
if(!K||!rl||!rg||!Qg) return null;
const vg=K*Math.sqrt((rl-rg)/rg);
const A=Qg/vg;
const D=Math.sqrt(4*A/Math.PI);
return [
[{ru:'Макс. скорость газа',en:'Max gas velocity'}[lang], vg.toFixed(3)+' м/с'],
[{ru:'Треб. площадь сечения',en:'Required cross-section'}[lang], (A*1e4).toFixed(2)+' см²'],
[{ru:'Мин. диаметр сепаратора',en:'Min separator diameter'}[lang], (D*1000).toFixed(0)+' мм'],
];
}
},

{
tab: 6,
id: 'watercut',
title: {ru:'ОБВОДНЁННОСТЬ — НЕФТЬ / ВОДА / ТОННЫ',en:'WATER CUT — OIL / WATER / TONNES'},
fields: [
{ id: 'ql', label:{ ru: 'Дебит жидкости (м³/сут)', en: 'Liquid rate (m³/d)' }, def: '' },
{ id: 'wc', label:{ ru: 'Обводнённость по пробе WC (%)', en: 'Sample watercut WC (%)' }, def: '' },
{ id: 'rho_oil', label:{ ru: 'Плотность нефти (кг/м³)', en: 'Oil density (kg/m³)' }, def: '870' },
{ id: 'rho_wat', label:{ ru: 'Плотность воды (кг/м³)', en: 'Water density (kg/m³)' }, def: '1010' },
],
calc(v) {
const ql=+v.ql, wc=+v.wc, rho_o=+v.rho_oil, rho_w=+v.rho_wat;
if(!ql||wc<0||wc>100||!rho_o||!rho_w) return null;
const qo = ql*(1 - wc/100);
const qw = ql*(wc/100);
const t_oil = qo*rho_o/1000;
const t_wat = qw*rho_w/1000;
const t_liq = t_oil + t_wat;
const rho_mix = (qo*rho_o + qw*rho_w)/ql;
let stage;
if(wc<30) stage=[{ru:'Начальная обводнённость',en:'Initial watercut'}[lang],'Early stage'];
else if(wc<70) stage=[{ru:'Средняя обводнённость',en:'Average watercut'}[lang],'Middle stage'];
else if(wc<90) stage=[{ru:'Поздняя стадия',en:'Late stage'}[lang],'Late stage'];
else stage=[{ru:'Высокообводнённая скважина',en:'High watercut well'}[lang],'High water cut well'];
return [
[{ru:'Дебит НЕФТИ',en:'OIL rate'}[lang], qo.toFixed(3)+' м³/сут'],
[{ru:'Дебит нефти (барр)',en:'Oil rate (bbl)'}[lang], (qo/0.159).toFixed(2)+' барр/сут'],
[{ru:'ТОНН НЕФТИ в сутки',en:'OIL tonnes/day'}[lang], t_oil.toFixed(2)+' т/сут'],
['', '──────────────'],
[{ru:'Дебит ВОДЫ',en:'WATER rate'}[lang], qw.toFixed(3)+' м³/сут'],
[{ru:'ТОНН ВОДЫ в сутки',en:'WATER tonnes/day'}[lang], t_wat.toFixed(2)+' т/сут'],
['', '──────────────'],
[{ru:'Обводнённость WC',en:'Watercut WC'}[lang], wc.toFixed(2)+'%'],
[{ru:'Плотность смеси',en:'Mixture density'}[lang], rho_mix.toFixed(1)+' кг/м³'],
[{ru:'Масса жидкости всего',en:'Total fluid mass'}[lang], t_liq.toFixed(2)+' т/сут'],
[{ru:'Стадия разработки',en:'Development stage'}[lang], stage[lang]],
];
}
},

{
tab: 0,
id: 'inflow',
title: {ru:'ПРИТОК ЖИДКОСТИ В СКВАЖИНУ',en:'WELL LIQUID INFLOW'},
fields: [
{ id: 'Ppl', label:{ ru: 'Пластовое давл. Рпл (атм)', en: 'Reservoir pressure (atm)' }, def: '' },
{ id: 'Hzab', label:{ ru: 'Глубина насоса/забоя (м)', en: 'Pump/BH depth (m)' }, def: '' },
{ id: 'Hd', label:{ ru: 'Динамический уровень Нд (м)', en: 'Dynamic level Hd (m)' }, def: '' },
{ id: 'rho_fl', label:{ ru: 'Плотность флюида (кг/м³)', en: 'Fluid density (kg/m³)' }, def: '870' },
{ id: 'Qfact', label:{ ru: 'Фактический дебит Q (м³/сут)', en: 'Actual rate Q (m³/d)' }, def: '' },
],
calc(v) {
const Ppl=+v.Ppl, Hzab=+v.Hzab, Hd=+v.Hd, rho=+v.rho_fl, Qf=+v.Qfact;
if(!Ppl||!Hzab||!Hd||!rho||!Qf) return null;
const Pbhp = rho*9.81*(Hzab-Hd)/101325;
const depress = Ppl - Pbhp;
if(depress <= 0) return null;
const PI = Qf/depress;
const Qmax_lin = PI*Ppl;
const r = Pbhp/Ppl;
const Qmax_vog = Qf/(1-0.2*r-0.8*r*r);
return [
[{ru:'Забойное давл. Рзаб',en:'BHP Pwf'}[lang], Pbhp.toFixed(2)+' атм'],
[{ru:'Депрессия',en:'Drawdown'}[lang], depress.toFixed(2)+' атм'],
[{ru:'Индекс продуктивности PI',en:'Productivity index PI'}[lang], PI.toFixed(4)+' м³/сут/атм'],
[{ru:'Макс. дебит (линейн.)',en:'Max rate (linear)'}[lang], Qmax_lin.toFixed(2)+' м³/сут'],
[{ru:'Макс. дебит (Вогель)',en:'Max rate (Vogel)'}[lang], Qmax_vog.toFixed(2)+' м³/сут'],
[{ru:'Макс. дебит (Вогель, барр)',en:'Max rate (Vogel, bbl)'}[lang], (Qmax_vog/0.159).toFixed(1)+' барр/сут'],
];
}
},

if(!Q||!P||!opex) return null;
const rev_day = Q*P;
const profit_day = (rev_day - opex)*(1 - tax/100);
const profit_month = profit_day*30;
const profit_year = profit_day*365;
const cost_per_t = opex/Q;

const Q_year2 = Q*(1-d);
const Q_year3 = Q_year2*(1-d);
const res = [

{
tab: 0,
id: 'dupuit_formula',
title: {ru:'ФОРМУЛА ДЮПИИ — ПРИТОК ИЗ ПЛАСТА',en:'DUPUIT FORMULA — RESERVOIR INFLOW'},
fields: [
{ id: 'k', label:{ ru: 'Проницаемость k (мД)', en: 'Permeability k (mD)' }, def: '' },
{ id: 'h', label:{ ru: 'Эфф. толщина пласта h (м)', en: 'Net pay h (m)' }, def: '' },
{ id: 'Ppl', label:{ ru: 'Пластовое давл. Рпл (атм)', en: 'Reservoir pressure (atm)' }, def: '' },
{ id: 'Pbhp', label:{ ru: 'Забойное давл. Рзаб (атм)', en: 'BHP Pwf (atm)' }, def: '' },
{ id: 'mu', label:{ ru: 'Вязкость нефти μ (мПа·с)', en: 'Oil viscosity μ (mPa·s)' }, def: '5' },
{ id: 'Rk', label:{ ru: 'Радиус контура питания Rк (м)', en: 'Drainage radius Rk (m)' }, def: '300' },
{ id: 'Rw', label:{ ru: 'Радиус скважины Rс (м)', en: 'Wellbore radius Rs (m)' }, def: '0.108' },
{ id: 'skin', label:{ ru: 'Скин-фактор S (0 = без загрязнения)', en: 'Skin factor S (0 = undamaged)' }, def: '0' },
],
calc(v) {
const k=+v.k*1e-15, h=+v.h, Ppl=+v.Ppl*101325, Pbhp=+v.Pbhp*101325;
const mu=+v.mu*1e-3, Rk=+v.Rk, Rw=+v.Rw, S=+v.skin;
if(!k||!h||!Ppl||!Pbhp||!mu||!Rk||!Rw) return null;
const dP = Ppl - Pbhp;
const lnR = Math.log(Rk/Rw) + S;

const Q_m3s = 2*Math.PI*k*h*dP/(mu*lnR);
const Q_day = Q_m3s*86400;

const PI = Q_day/(dP/101325);

const R_skin = S > 0 ? Rw*Math.exp(S) : null;

const Q_max = 2*Math.PI*k*h*Ppl/(mu*lnR)*86400;
return [
['ln(Rк/Rс) + S', lnR.toFixed(4)],
[{ru:'Депрессия ΔP',en:'Drawdown ΔP'}[lang], (dP/101325).toFixed(2)+' атм'],
[{ru:'ДЕБИТ (Дюпии)',en:'RATE (Dupuit)'}[lang], Q_day.toFixed(2)+' м³/сут'],
[{ru:'Дебит (барр/сут)',en:'Rate (bbl/d)'}[lang], (Q_day/0.159).toFixed(1)+' барр/сут'],
[{ru:'Индекс продуктивности PI',en:'Productivity index PI'}[lang], PI.toFixed(4)+' м³/сут/атм'],
[{ru:'Макс. дебит (Рзаб→0)',en:'Max rate (Pwf→0)'}[lang], Q_max.toFixed(2)+' м³/сут'],
S>0 ? [{ru:'Радиус зоны загрязнения',en:'Contamination zone radius'}[lang], R_skin.toFixed(2)+' м'] :
[L('Скин = 0 — скважина чистая','Skin = 0 — no damage'), ''],
].filter(r => r[1] !== '');
}
},

if(!Pnom||!U||!If||!In||!cosfi||!eff) return null;
const load = If/In*100;
const P_el = Math.sqrt(3)*U*If*cosfi/1000;
const P_shaft = P_el*eff/100;
const P_heat = P_el - P_shaft;
let mode;
if(load<70) mode=[{ru:'НЕДОГРУЗ — риск перегрева',en:'UNDERLOADED — overheating risk'}[lang],'UNDERLOAD — overheat risk'];

else if(load<=115) mode=[{ru:'ДОПУСТИМАЯ ПЕРЕГРУЗКА',en:'ALLOWABLE OVERLOAD'}[lang],'ALLOWABLE OVERLOAD'];
else mode=[{ru:'ПЕРЕГРУЗКА — ОПАСНО',en:'OVERLOAD — DANGER'}[lang],'OVERLOAD — DANGER'];
return [

[{ru:'Режим работы',en:'Operating mode'}[lang], mode[lang]],
[{ru:'Потребл. мощность',en:'Power consumption'}[lang], P_el.toFixed(2)+' кВт'],

fields: [

{ id: 'H_nkt', label:{ ru: 'Глубина спуска НКТ (м)', en: 'Tubing depth (m)' }, def: '' },
{ id: 'D_col', label:{ ru: 'Внутр. диаметр ЭК (мм)', en: 'Casing ID (mm)' }, def: '148.3' },
{ id: 'D_nkt_out', label:{ ru: 'Внешн. диаметр НКТ (мм)', en: 'Tubing OD (mm)' }, def: '73' },
{ id: 'D_nkt_in', label:{ ru: 'Внутр. диаметр НКТ (мм)', en: 'Tubing ID (mm)' }, def: '62' },
{ id: 'Ppl', label:{ ru: 'Пластовое давл. (атм)', en: 'Reservoir pressure (atm)' }, def: '' },
{ id: 'rho_kill', label:{ ru: 'Плотн. жидкости глушения (кг/м³)', en: 'Kill fluid density (kg/m³)' }, def: '1100' },
],
calc(v) {
const Hz=+v.Hzab, Hn=+v.H_nkt;
const Dc=+v.D_col/1000, Do=+v.D_nkt_out/1000, Di=+v.D_nkt_in/1000;
const Ppl=+v.Ppl, rho=+v.rho_kill;
if(!Hz||!Hn||!Dc||!Do||!Di||!rho) return null;
const A_ann = Math.PI/4*(Dc*Dc - Do*Do);
const A_nkt = Math.PI/4*Di*Di;
const A_open = Math.PI/4*Dc*Dc;
const V_ann = A_ann*Hn;
const V_nkt = A_nkt*Hn;
const V_open = A_open*(Hz-Hn);
const V_total = V_ann + V_nkt + V_open;
const rho_min = Ppl ? Ppl*101325/(9.81*Hz) : 0;
const P_hydro = rho*9.81*Hz/101325;
const res = [
[{ru:'Объём затрубного простр.',en:'Annulus volume'}[lang], V_ann.toFixed(3)+' м³'],
[{ru:'Объём внутри НКТ',en:'Volume inside tubing'}[lang], V_nkt.toFixed(3)+' м³'],

];

return res;
}
},

const wall=(Do-Di)/2*1000;

const A_in = Math.PI/4*Di*Di;

];
if(nPipes>0) {

res.push([{ru:'Объём колонны (внутр.)',en:'Casing volume (ID)'}[lang], (V_one*nPipes).toFixed(3)+' м³']);
}
return res;
}
},

{

const vel = Q/A;
const Re = rho*vel*D/0.005;
const f = Re>4000 ? 0.316/Math.pow(Re,0.25) : (Re>0 ? 64/Re : 0.02);
const dH_fric = f*(Hp/D)*(vel*vel/(2*9.81));
const H_ufl = Pufl*101325/(rho*9.81);
const H_need = Hd + H_ufl + dH_fric;
const P_pump = rho*9.81*H_need/1e6;
const kW_hyd = P_pump*Q*1000;
return [
[{ru:'Скорость потока в НКТ',en:'Flow velocity in tubing'}[lang], vel.toFixed(3)+' м/с'],
[{ru:'Потери напора на трение',en:'Friction head losses'}[lang], dH_fric.toFixed(2)+' м'],
[{ru:'Напор на устьевое давл.',en:'Head for WHP'}[lang], H_ufl.toFixed(1)+' м'],
[{ru:'ТРЕБУЕМЫЙ НАПОР УЭЦН',en:'REQUIRED ESP HEAD'}[lang], H_need.toFixed(1)+' м'],
[{ru:'Давление насоса',en:'Pump pressure'}[lang], (P_pump*10.197).toFixed(2)+' атм'],
[{ru:'Гидравл. мощность',en:'Hydraulic power'}[lang], kW_hyd.toFixed(2)+' кВт'],
[{ru:'Рекоменд. напор +15%',en:'Recommended head +15%'}[lang], (H_need*1.15).toFixed(1)+' м'],
];
}
},

{
tab: 1,
id: 'pkv_esp',
title: {ru:'РЕЖИМ ПКВ ДЛЯ УЭЦН (УЭЦН + ПЭД + ТРАНСФОРМАТОР)',en:'INTERMITTENT MODE: ESP + MOTOR + TRANSFORMER'},
fields: [
{ id: 'Qinflow', label:{ ru: 'Приток скважины (м³/сут)', en: 'Well inflow (m³/d)' }, def: '' },
{ id: 'Qesp', label:{ ru: 'Подача УЭЦН Qнас (м³/сут)', en: 'ESP pump rate (m³/d)' }, def: '' },
{ id: 'Pnom_ped', label:{ ru: 'Мощность ПЭД ном. (кВт)', en: 'ESP motor nominal power (kW)' }, def: '' },
{ id: 'U_trans', label:{ ru: 'Напряжение трансф. (В)', en: 'Transformer voltage (V)' }, def: '1000' },
{ id: 'I_nom', label:{ ru: 'Номин. ток ПЭД (А)', en: 'ESP motor nominal current (A)' }, def: '' },
{ id: 'H_pump', label:{ ru: 'Глубина спуска насоса (м)', en: 'Pump depth (m)' }, def: '' },
{ id: 'D_col', label:{ ru: 'Внутр. диаметр ЭК (мм)', en: 'Casing ID (mm)' }, def: '148.3' },
{ id: 'D_nkt_out', label:{ ru: 'Внешн. диаметр НКТ (мм)', en: 'Tubing OD (mm)' }, def: '73' },
],
calc(v) {
const Qi=+v.Qinflow, Qn=+v.Qesp, Pnom=+v.Pnom_ped;
const U=+v.U_trans, In=+v.I_nom, Hp=+v.H_pump;
const Dc=+v.D_col/1000, Do=+v.D_nkt_out/1000;
if(!Qi||!Qn||!Pnom||!U||!In) return null;
if(Qn <= Qi) return [[{ru:'Ошибка',en:'Error'}[lang], L('Qнас должен быть > Qприток','Qesp must be > Qinflow')]];
const kpd = Qi/Qn;
const T_on_min = 1440*kpd;
const T_off_min = 1440*(1-kpd);
const cycle = 1440;
const cycles_day = 1440/( T_on_min + T_off_min );
const T_on_rec = Math.max(T_on_min, 120);
const T_off_rec = T_on_rec/kpd - T_on_rec;
const P_trans_rec = Pnom*1.25;
const I_start = In*6;
const res = [
[{ru:'Коэфф. периодичности Квкл',en:'Duty cycle Kd'}[lang], (kpd*100).toFixed(1)+'%'],
[{ru:'Время работы Твкл',en:'Run time Ton'}[lang], T_on_min.toFixed(1)+' мин / '+( T_on_min/60).toFixed(2)+' ч'],
[{ru:'Время простоя Твыкл',en:'Off time Toff'}[lang], T_off_min.toFixed(1)+' мин'],
[{ru:'Рекоменд. Твкл (мин. 2ч)',en:'Recommended Ton (min 2h)'}[lang], T_on_rec.toFixed(1)+' мин'],
[{ru:'Рекоменд. Твыкл',en:'Recommended Toff'}[lang], T_off_rec.toFixed(1)+' мин'],
[{ru:'Рекоменд. мощн. трансформ.',en:'Recommended transformer power'}[lang], P_trans_rec.toFixed(1)+' кВА'],
[{ru:'Пусковой ток (прибл. 6xIном)',en:'Starting current (approx. 6xInom)'}[lang], I_start.toFixed(1)+' А'],
];
if(Hp && Dc && Do) {
const A_ann = Math.PI/4*(Dc*Dc - Do*Do);
const V_ann = A_ann*Hp;
res.push([{ru:'Объём затрубного простр.',en:'Annulus volume'}[lang], V_ann.toFixed(2)+' м³ / '+(V_ann*1000).toFixed(0)+' л']);
}
return res;
}
},

{
tab: 2,
id: 'kill_density',
title: {ru:'ПЛОТНОСТЬ И ОБЪЁМ РАСТВОРА ДЛЯ СКВАЖИНЫ',en:'KILL FLUID: DENSITY & VOLUME'},
fields: [
{ id: 'Ppl', label:{ ru: 'Пластовое давл. Рпл (атм)', en: 'Reservoir pressure (atm)' }, def: '' },
{ id: 'Hzab', label:{ ru: 'Глубина скважины (м)', en: 'Well depth (m)' }, def: '' },
{ id: 'K_excess', label:{ ru: 'Коэфф. превышения (1.05–1.10)', en: 'Excess factor (1.05–1.10)' }, def: '1.07' },
{ id: 'D_col', label:{ ru: 'Внутр. диаметр ЭК (мм)', en: 'Casing ID (mm)' }, def: '148.3' },
{ id: 'D_nkt_out', label:{ ru: 'Внешн. диаметр НКТ (мм)', en: 'Tubing OD (mm)' }, def: '73' },
{ id: 'D_nkt_in', label:{ ru: 'Внутр. диаметр НКТ (мм)', en: 'Tubing ID (mm)' }, def: '62' },
{ id: 'H_nkt', label:{ ru: 'Глубина спуска НКТ (м)', en: 'Tubing depth (m)' }, def: '' },
],
calc(v) {
const Ppl=+v.Ppl, Hz=+v.Hzab, K=+v.K_excess;
const Dc=+v.D_col/1000, Do=+v.D_nkt_out/1000, Di=+v.D_nkt_in/1000;
const Hn=+v.H_nkt;
if(!Ppl||!Hz||!K||!Dc) return null;
const rho_min = Ppl*101325/(9.81*Hz);
const rho_calc = rho_min*K;
const A_ann = Do ? Math.PI/4*(Dc*Dc - Do*Do) : Math.PI/4*Dc*Dc;
const A_nkt = Di ? Math.PI/4*Di*Di : 0;
const depth = Hn || Hz;
const V_ann = A_ann*depth;
const V_nkt = A_nkt*depth;
const V_open = (Do && Hn && Hz>Hn) ? Math.PI/4*Dc*Dc*(Hz-Hn) : 0;
const V_total = V_ann + V_nkt + V_open;
const rho_bar = 2650;
const rho_water = 1000;
const V_bar = V_total*(rho_calc - rho_water)/(rho_bar - rho_water);
const m_bar = V_bar*rho_bar;
const P_hydro = rho_calc*9.81*Hz/101325;
return [
[{ru:'Мин. плотность (без запаса)',en:'Min density (no margin)'}[lang], rho_min.toFixed(0)+' кг/м³'],
[{ru:'РАСЧЁТНАЯ ПЛОТНОСТЬ (x'+K+')',en:'CALCULATED DENSITY (x'+K+')'}, rho_calc.toFixed(0)+' кг/м³'],
[{ru:'Гидростатика раствора',en:'Mud hydrostatic'}[lang], P_hydro.toFixed(2)+' атм'],
[{ru:'Превышение над Рпл',en:'Excess above Pres'}[lang], ((P_hydro/Ppl-1)*100).toFixed(1)+'%'],
['', '──────────────'],
[{ru:'Объём затрубного простр.',en:'Annulus volume'}[lang], V_ann.toFixed(3)+' м³'],
[{ru:'Объём НКТ (внутр.)',en:'Tubing volume (ID)'}[lang], V_nkt.toFixed(3)+' м³'],
[{ru:'Объём открытого ствола',en:'Open hole volume'}[lang], V_open.toFixed(3)+' м³'],
[{ru:'ОБЩИЙ объём скважины',en:'TOTAL wellbore volume'}[lang], V_total.toFixed(3)+' м³'],
[{ru:'С запасом +20%',en:'With +20% margin'}[lang], (V_total*1.2).toFixed(3)+' м³'],
['', '── Утяжелитель: барит (2650 кг/м³) ──'],
[{ru:'Масса баритового порошка',en:'Barite mass'}[lang], m_bar.toFixed(0)+' кг'],
[{ru:'Объём баритового порошка',en:'Barite volume'}[lang], V_bar.toFixed(3)+' м³'],
];
}
},

{
tab: 1,
id: 'vsd_freq',
title: {ru:'ИЗМЕНЕНИЕ ДЕБИТА УЭЦН ПРИ ИЗМЕНЕНИИ ЧАСТОТЫ (ЧРП)',en:'ESP RATE CHANGE WITH FREQUENCY (VFD)'},
fields: [
{ id: 'Q1', label:{ ru: 'Подача насоса Q1 (м3/сут) при f1', en: 'Pump rate Q1 (m³/d) at f1' }, def: '' },
{ id: 'H1', label:{ ru: 'Напор H1 (м) при f1', en: 'Head H1 (m) at f1' }, def: '' },
{ id: 'P1', label:{ ru: 'Мощность P1 (кВт) при f1', en: 'Power P1 (kW) at f1' }, def: '' },
{ id: 'f1', label:{ ru: 'Текущая частота f1 (Гц)', en: 'Current frequency f1 (Hz)' }, def: '50' },
{ id: 'f2', label:{ ru: 'Новая частота f2 (Гц)', en: 'New frequency f2 (Hz)' }, def: '' },
],
calc(v) {
const Q1=+v.Q1, H1=+v.H1, P1=+v.P1, f1=+v.f1, f2=+v.f2;
if(!Q1||!f1||!f2) return null;
const k = f2/f1;
const Q2 = Q1*k;
const H2 = H1 ? H1*k*k : null;
const P2 = P1 ? P1*k*k*k : null;
const dQ = Q2 - Q1;
const dQ_pct = (k-1)*100;
let warn;
if(f2 > 60) warn = L('ВНИМАНИЕ: >60 Гц — риск для ПЭД и насоса!','WARNING: >60 Hz — motor/pump risk!');
else if(f2 < 35) warn = L('ВНИМАНИЕ: <35 Гц — плохое охлаждение ПЭД','WARNING: <35 Hz — poor motor cooling');
else warn = L('Частота в допустимом диапазоне (35-60 Гц)','Frequency in safe range (35-60 Hz)');
const res = [
[{ru:'Коэфф. изменения f2/f1',en:'Frequency ratio f2/f1'}[lang], k.toFixed(4)],
[{ru:'НОВАЯ ПОДАЧА Q2',en:'NEW RATE Q2'}[lang], Q2.toFixed(2)+' м3/сут'],
[{ru:'Подача Q2 (барр/сут)',en:'Rate Q2 (bbl/d)'}[lang], (Q2/0.159).toFixed(2)+' барр/сут'],
[{ru:'Изменение дебита',en:'Rate change'}[lang], (dQ>=0?'+':'')+dQ.toFixed(2)+' м3/сут'],
[{ru:'Изменение дебита %',en:'Rate change %'}[lang], (dQ_pct>=0?'+':'')+dQ_pct.toFixed(1)+'%'],
];
if(H2) res.push([{ru:'НОВЫЙ НАПОР H2',en:'NEW HEAD H2'}[lang], H2.toFixed(1)+' м']);
if(P2) {
res.push([{ru:'НОВАЯ МОЩНОСТЬ P2',en:'NEW POWER P2'}[lang], P2.toFixed(2)+' кВт']);
res.push([{ru:'Изменение мощности',en:'Power change'}[lang], ((P2-P1)>=0?'+':'')+(P2-P1).toFixed(2)+' кВт']);
}
res.push([{ru:'Статус',en:'Status'}[lang], warn]);
return res;
}
},

{

{
tab: 1,
id: 'shgn_calc',
title: {ru:'ШГН — ШТАНГОВЫЙ ГЛУБИННЫЙ НАСОС',en:'SRP — SUCKER ROD PUMP CALCULATION'},
fields: [
{ id: 'D_plung', label:{ ru: 'Диаметр плунжера (мм)', en: 'Plunger diameter (mm)' }, def: '44' },
{ id: 'S', label:{ ru: 'Длина хода плунжера S (м)', en: 'Plunger stroke S (m)' }, def: '3' },
{ id: 'n', label:{ ru: 'Число качаний в минуту (кач/мин)', en: 'Strokes per minute (spm)' }, def: '6' },
{ id: 'eta', label:{ ru: 'КПД насоса (0.6–0.9)', en: 'Pump efficiency (0.6–0.9)' }, def: '0.75' },
{ id: 'H_pump', label:{ ru: 'Глубина подвески насоса (м)', en: 'Pump hanging depth (m)' }, def: '' },
{ id: 'rho_fl', label:{ ru: 'Плотность флюида (кг/м³)', en: 'Fluid density (kg/m³)' }, def: '870' },
{ id: 'D_rod', label:{ ru: 'Диаметр штанг (мм)', en: 'Rod diameter (mm)' }, def: '22' },
],
calc(v) {
const Dp=+v.D_plung/1000, S=+v.S, n=+v.n, eta=+v.eta;
const Hp=+v.H_pump, rho=+v.rho_fl, Dr=+v.D_rod/1000;
if(!Dp||!S||!n||!eta) return null;
const F_pl = Math.PI/4*Dp*Dp;
const Q_m3_day = F_pl*S*n*eta*1440;
const Q_t_day = Q_m3_day*rho/1000;

const G_fluid = F_pl*Hp*rho*9.81/1000;
const F_rod = Dr ? Math.PI/4*Dr*Dr*Hp*7850*9.81/1000 : null;
const G_upstroke = F_rod ? G_fluid + F_rod : G_fluid;
const G_downstroke = F_rod ? G_fluid - F_rod * 0.5 : null;
const res = [
[{ru:'Площадь плунжера',en:'Plunger area'}[lang], (F_pl*1e6).toFixed(1)+' см²'],
[{ru:'ДЕБИТ насоса',en:'PUMP RATE'}[lang], Q_m3_day.toFixed(2)+' м³/сут'],
[{ru:'Дебит (т/сут)',en:'Rate (t/d)'}[lang], Q_t_day.toFixed(2)+' т/сут'],
[{ru:'Дебит (барр/сут)',en:'Rate (bbl/d)'}[lang], (Q_m3_day/0.159).toFixed(1)+' барр/сут'],
];
if(Hp && rho) {
res.push([{ru:'Нагрузка от жидкости',en:'Fluid load'}[lang], G_fluid.toFixed(2)+' кН']);
if(F_rod) {
res.push([{ru:'Вес колонны штанг',en:'Rod string weight'}[lang], F_rod.toFixed(2)+' кН']);
res.push([{ru:'Нагрузка вверх (максим.)',en:'Upstroke load (max)'}[lang], G_upstroke.toFixed(2)+' кН']);
}
}
return res;
}
},

{
tab: 1,
id: 'gaslift_calc',
title: {ru:'ГАЗЛИФТ — ДАВЛЕНИЕ ЗАКАЧКИ И ГЛУБИНА КЛАПАНА',en:'GAS LIFT — INJECTION PRESSURE & VALVE DEPTH'},
fields: [
{ id: 'Ppl', label:{ ru: 'Пластовое давл. Рпл (атм)', en: 'Reservoir pressure (atm)' }, def: '' },
{ id: 'Hzab', label:{ ru: 'Глубина скважины (м)', en: 'Well depth (m)' }, def: '' },
{ id: 'rho_liq', label:{ ru: 'Плотность жидкости (кг/м³)', en: 'Fluid density (kg/m³)' }, def: '870' },
{ id: 'rho_mix', label:{ ru: 'Плотность газожидк. смеси (кг/м³)', en: 'Gas-liquid mixture density (kg/m³)' }, def: '400' },
{ id: 'P_comp', label:{ ru: 'Давление компрессора (атм)', en: 'Compressor pressure (atm)' }, def: '' },
{ id: 'Q_liq', label:{ ru: 'Дебит жидкости Q (м³/сут)', en: 'Liquid rate Q (m³/d)' }, def: '' },
{ id: 'GLR', label:{ ru: 'Газовый фактор GLR (м³/м³)', en: 'Gas-liquid ratio GLR (m³/m³)' }, def: '100' },
],
calc(v) {
const Ppl=+v.Ppl, Hz=+v.Hzab, rho_l=+v.rho_liq, rho_m=+v.rho_mix;
const Pcomp=+v.P_comp, Ql=+v.Q_liq, GLR=+v.GLR;
if(!Ppl||!Hz||!rho_l||!rho_m) return null;

const H_valve = Pcomp ? (Pcomp*101325 - Ppl*101325)/(9.81*(rho_l - rho_m)) : Hz*0.7;
const H_cl = Math.min(Math.max(H_valve, 0), Hz);

const P_inj = Ppl - rho_m*9.81*Hz/101325;

const Q_gas = Ql ? Ql*GLR : null;
const res = [
[{ru:'Оптим. глубина клапана',en:'Optimal valve depth'}[lang], H_cl.toFixed(0)+' м'],
[{ru:'Требуемое давл. закачки',en:'Required injection pressure'}[lang], P_inj.toFixed(2)+' атм'],
[{ru:'Давл. закачки (МПа)',en:'Injection pressure (MPa)'}[lang], (P_inj*0.101325).toFixed(3)+' МПа'],
[{ru:'Депрессия газлифта',en:'Gaslift drawdown'}[lang], (Ppl-P_inj).toFixed(2)+' атм'],
];
if(Q_gas) res.push([{ru:'Расход газа',en:'Gas rate'}[lang], (Q_gas/1000).toFixed(2)+' тыс.м³/сут']);
return res;
}
},

{
tab: 1,
id: 'shgn_rod_stress',
title: {ru:'ШГН — НАГРУЗКИ НА ШТАНГИ И БАЛАНСИР',en:'SRP — ROD AND BEAM LOADS'},
fields: [
{ id: 'D_plung', label:{ ru: 'Диаметр плунжера (мм)', en: 'Plunger diameter (mm)' }, def: '44' },
{ id: 'H_pump', label:{ ru: 'Глубина подвески насоса (м)', en: 'Pump hanging depth (m)' }, def: '' },
{ id: 'D_rod', label:{ ru: 'Диаметр штанг (мм)', en: 'Rod diameter (mm)' }, def: '22' },
{ id: 'rho_fl', label:{ ru: 'Плотность флюида (кг/м³)', en: 'Fluid density (kg/m³)' }, def: '870' },
{ id: 'S', label:{ ru: 'Длина хода (м)', en: 'Stroke length (m)' }, def: '3' },
{ id: 'n_spm', label:{ ru: 'Число качаний (кач/мин)', en: 'Stroke rate (spm)' }, def: '6' },
],
calc(v) {
const Dp=+v.D_plung/1000, Hp=+v.H_pump, Dr=+v.D_rod/1000;
const rho=+v.rho_fl, S=+v.S, n=+v.n_spm;
if(!Dp||!Hp||!Dr||!rho) return null;
const F_pl = Math.PI/4*Dp*Dp;
const F_rod = Math.PI/4*Dr*Dr;
const rho_st = 7850;

const W_rod_air = F_rod*Hp*rho_st*9.81;

const W_rod_liq = W_rod_air*(1 - rho/rho_st);

const W_fluid = F_pl*Hp*rho*9.81;

const omega = 2*Math.PI*n/60;
const F_dyn = F_rod*Hp*rho_st*omega*omega*S/2;

const F_max = W_rod_liq + W_fluid + F_dyn;

const F_min = W_rod_liq - F_dyn;

const sigma_max = F_max/F_rod/1e6;
const sigma_min = F_min/F_rod/1e6;
const allow = 130;
return [
[{ru:'Вес штанг (воздух)',en:'Rod weight (in air)'}[lang], (W_rod_air/1000).toFixed(2)+' кН'],
[{ru:'Вес штанг (в жидкости)',en:'Rod weight (in fluid)'}[lang], (W_rod_liq/1000).toFixed(2)+' кН'],
[{ru:'Нагрузка от жидкости',en:'Fluid load'}[lang], (W_fluid/1000).toFixed(2)+' кН'],
[{ru:'Динамическая нагрузка',en:'Dynamic load'}[lang], (F_dyn/1000).toFixed(2)+' кН'],
[{ru:'НАГРУЗКА ХОД ВВЕРХ (макс)',en:'UPSTROKE LOAD (max)'}[lang], (F_max/1000).toFixed(2)+' кН'],
[{ru:'НАГРУЗКА ХОД ВНИЗ (мин)',en:'DOWNSTROKE LOAD (min)'}[lang], (F_min/1000).toFixed(2)+' кН'],
[{ru:'Напряжение в штанге (макс)',en:'Rod stress (max)'}[lang], sigma_max.toFixed(1)+' МПа'],
[{ru:'Допустимое напряжение',en:'Allowable stress'}[lang], allow+' МПа'],
[{ru:'Запас прочности',en:'Safety factor'}[lang], (allow/sigma_max).toFixed(2)],
];
}
},

{

id: 'esp_supply_time',
title: {ru:'ВРЕМЯ ПОДАЧИ УЭЦН — ПОЛНЫЙ СПРАВОЧНИК НКТ',en:'ESP FILL TIME — FULL NKT REFERENCE'},
fields: [

{

fields: [
{ id: 'Pbhp', label:{ ru: 'Забойное давл. до остановки Рзаб (атм)', en: 'BHP before shut-in Pwf (atm)' }, def: '' },
{ id: 'P1', label:{ ru: 'Давление через 1 час после остановки (атм)', en: 'Pressure 1h after shut-in (atm)' }, def: '' },
{ id: 'P2', label:{ ru: 'Давление через 10 часов (атм)', en: 'Pressure 10h after shut-in (atm)' }, def: '' },
{ id: 'tp', label:{ ru: 'Время работы до остановки tp (час)', en: 'Run time before shut-in tp (h)' }, def: '720' },
{ id: 'Q', label:{ ru: 'Дебит до остановки Q (м³/сут)', en: 'Rate before shut-in Q (m³/d)' }, def: '' },
{ id: 'mu', label:{ ru: 'Вязкость нефти mu (мПа*с)', en: 'Oil viscosity mu (mPa·s)' }, def: '5' },
{ id: 'h', label:{ ru: 'Эффективная толщина пласта h (м)', en: 'Net pay h (m)' }, def: '10' },
],
calc(v) {
const Pbhp=+v.Pbhp, P1=+v.P1, P2=+v.P2, tp=+v.tp, Q=+v.Q, mu=+v.mu, h=+v.h;
if(!Pbhp||!P1||!P2||!tp||!Q) return null;

const dt1=1, dt2=10;
const X1 = Math.log10((tp+dt1)/dt1);
const X2 = Math.log10((tp+dt2)/dt2);
const m = (P2-P1)/(X2-X1);

const Ppl = P1 - m*X1;
const depress = Ppl - Pbhp;

const PI_ideal = Q/(depress||1);

const kh = mu>0 && h>0 ? (0.183*Q*mu/(m*h)).toFixed(3) : null;
return [
[{ru:'Наклон прямой Хорнера m',en:'Horner slope m'}[lang], m.toFixed(3)+' атм/лог.цикл'],
[{ru:'Пластовое давление Рпл*',en:'Reservoir pressure Pres*'}[lang], Ppl.toFixed(2)+' атм'],
[{ru:'Депрессия',en:'Drawdown'}[lang], depress.toFixed(2)+' атм'],
[{ru:'Восстановление за 9ч (Р10-Р1)',en:'Recovery over 9h (P10-P1)'}[lang], (P2-P1).toFixed(2)+' атм'],
kh ? [{ru:'Проницаемость x h (мД*м)',en:'Permeability x h (mD·m)'}[lang], kh+' мД*м'] :
['', ''],
].filter(r => r[1] !== '');
}
},

{
tab: 4,
id: 'hydrofrac',
title: {ru:'ГРП — ГИДРОРАЗРЫВ ПЛАСТА (ОЦЕНКА)',en:'HYDRAULIC FRACTURING (ESTIMATION)'},
fields: [
{ id: 'H', label:{ ru: 'Глубина ГРП (м)', en: 'Frac depth (m)' }, def: '' },
{ id: 'Ppore', label:{ ru: 'Поровое давление (атм)', en: 'Pore pressure (atm)' }, def: '' },
{ id: 'sigma_h', label:{ ru: 'Мин. горизонт. напряжение Sh (атм)', en: 'Min horizontal stress Sh (atm)' }, def: '' },
{ id: 'Q_frac', label:{ ru: 'Расход жидкости ГРП (м³/мин)', en: 'Frac fluid rate (m³/min)' }, def: '3' },
{ id: 'V_frac', label:{ ru: 'Объём жидкости ГРП (м³)', en: 'Frac fluid volume (m³)' }, def: '' },
{ id: 'rho_frac', label:{ ru: 'Плотность жидкости ГРП (кг/м³)', en: 'Frac fluid density (kg/m³)' }, def: '1000' },
],
calc(v) {
const H=+v.H, Pp=+v.Ppore, Sh=+v.sigma_h, Qf=+v.Q_frac, Vf=+v.V_frac, rho=+v.rho_frac;
if(!H||!Pp||!Sh) return null;

const Pfrac = 2*Sh - Pp;

const P_hydro = rho*9.81*H/101325;
const P_surface = Pfrac - P_hydro + 20;

const t_inj = Vf && Qf ? Vf/Qf : null;

const Lf = Vf ? Math.sqrt(Vf*1000/(4*0.01)) : null;
return [
[{ru:'Давление разрыва пласта',en:'Formation fracture pressure'}[lang], Pfrac.toFixed(1)+' атм'],
[{ru:'Давление на устье (расч.)',en:'Wellhead pressure (calc.)'}[lang], Math.max(0,P_surface).toFixed(1)+' атм'],
[{ru:'Гидростатика жидкости',en:'Fluid hydrostatic'}[lang], P_hydro.toFixed(1)+' атм'],
Vf ? [{ru:'Объём жидкости ГРП',en:'Frac fluid volume'}[lang], Vf.toFixed(1)+' м³'] : ['', ''],
t_inj ? [{ru:'Время закачки',en:'Pumping time'}[lang], t_inj.toFixed(1)+' мин']: ['', ''],
Lf ? [{ru:'Полудлина трещины (оценка)',en:'Fracture half-length (estimate)'}[lang], Lf.toFixed(0)+' м'] : ['', ''],
].filter(r => r[1] !== '');
}
},

{
tab: 4,
id: 'darcy_radial',
title: { ru: 'ЗАКОН ДАРСИ — РАДИАЛЬНЫЙ ПРИТОК', en: "DARCY'S LAW — RADIAL FLOW" },
fields: [
{ id: 'k', label:{ ru: 'Проницаемость k (мД)', en: 'Permeability k (mD)' }, def: '' },
{ id: 'h', label:{ ru: 'Эффект. толщина h (м)', en: 'Effective thickness h (m)' }, def: '' },
{ id: 'Ppl', label:{ ru: 'Пластовое давл. (атм)', en: 'Reservoir pressure (atm)' }, def: '' },
{ id: 'Pbhp', label:{ ru: 'Забойное давл. (атм)', en: 'BHP (atm)' }, def: '' },
{ id: 'mu', label:{ ru: 'Вязкость нефти (мПа*с)', en: 'Oil viscosity (mPa·s)' }, def: '5' },
{ id: 'Re', label:{ ru: 'Радиус контура питания Re (м)', en: 'Drainage radius Re (m)' }, def: '300' },
{ id: 'Rw', label:{ ru: 'Радиус скважины Rw (м)', en: 'Wellbore radius Rw (m)' }, def: '0.1' },
{ id: 'S', label:{ ru: 'Скин-фактор S', en: 'Skin factor S' }, def: '0' },
],
calc(v) {
const k=+v.k*1e-15, h=+v.h, Ppl=+v.Ppl, Pbhp=+v.Pbhp;
const mu=+v.mu*1e-3, Re=+v.Re, Rw=+v.Rw, S=+v.S;
if(!k||!h||!Ppl||!Pbhp||!mu||!Re||!Rw) return null;
const dP = (Ppl-Pbhp)*101325;
const Q = 2*Math.PI*k*h*dP/(mu*(Math.log(Re/Rw)+S));
const Q_day = Q*86400;
const PI = Q_day/((Ppl-Pbhp));
return [
[{ru:'Дебит Q',en:'Rate Q'}[lang], Q_day.toFixed(3)+' м³/сут'],
[{ru:'Дебит Q',en:'Rate Q'}[lang], (Q_day/0.159).toFixed(2)+' барр/сут'],
[{ru:'Индекс продуктивности PI',en:'Productivity index PI'}[lang], PI.toFixed(4)+' м³/сут/атм'],
['ln(Re/Rw)', Math.log(Re/Rw).toFixed(3)],
[{ru:'Влияние скин-фактора',en:'Skin factor effect'}[lang], S>0?L('Загрязнение пласта','Formation damage'):S<0?L('Интенсификация','Stimulation'):L('Без скина','No skin')],
];
}
},

{ id: 'qi', label:{ ru: 'Нач. дебит qi (м³/сут)', en: 'Initial rate qi (m³/d)' }, def: '' },
{ id: 'Di', label:{ ru: 'Нач. темп падения Di (% в год)', en: 'Initial decline Di (%/year)' }, def: '20' },
{ id: 'b', label:{ ru: 'Показатель Арпса b (0=эксп, 1=гарм)', en: 'Arps b exponent (0=exp, 1=harm)' }, def: '0.5' },
{ id: 'Qlim', label:{ ru: 'Предельный дебит Qlim (м³/сут)', en: 'Limit rate Qlim (m³/d)' }, def: '2' },
{ id: 'years', label:{ ru: 'Прогноз на лет', en: 'Forecast years' }, def: '5' },
],
calc(v) {
const qi=+v.qi, Di_pct=+v.Di, b=+v.b, Qlim=+v.Qlim, yrs=+v.years;
if(!qi||!Di_pct) return null;
const Di = Di_pct/100/365;
const res = [];
let Q_cum = 0;
for(let y=1; y<=Math.min(yrs,10); y++) {
const t = y*365;
let q;
if(b < 0.01) q = qi*Math.exp(-Di*t);
else q = qi/Math.pow(1+b*Di*t, 1/b);
q = Math.max(q, 0);

let Np;
if(b < 0.01) Np = qi/Di*(1-Math.exp(-Di*t));
else Np = qi/(Di*(1-b))*(1-Math.pow(1+b*Di*t,(b-1)/b));
const status = q < Qlim ? L('< лимита (нерентаб.)','< limit (uneconomic)') : '';
res.push([{ru:'Год '+y+' — дебит',en:'Year '+y+' — rate'}, q.toFixed(1)+' м³/сут | Накопл: '+(Np/1000).toFixed(2)+' тыс.м³'+(status?' | '+status:'')]);
}

let t_lim;
if(b < 0.01) t_lim = -Math.log(Qlim/qi)/Di/365;
else t_lim = (Math.pow(qi/Qlim,b)-1)/(b*Di)/365;
res.unshift([{ru:'Время до Qlim',en:'Time to Qlim'}[lang], t_lim.toFixed(1)+' лет']);
return res;
}
},

{

],
calc(v) {
const Pinj=+v.P_inj, Pp=+v.Ppore, k=+v.k*1e-15, h=+v.h;

if(!Pinj||!Pp||!k||!h||!mu) return null;
const dP = (Pinj-Pp)*101325;

const Q_per_well = n ? Q_inj/n : null;
const comp = n ? (Q_inj/n).toFixed(1) : '—';
return [
[{ru:'Дебит закачки Q_inj',en:'Injection rate Q_inj'}[lang], Q_inj.toFixed(2)+' м³/сут'],
[{ru:'Дебит закачки',en:'Injection rate'}[lang], (Q_inj/0.159).toFixed(1)+' барр/сут'],
[{ru:'На 1 добывающую скв.',en:'Per producer well'}[lang], comp+' м³/сут'],
[{ru:'Охват пласта (оценка)',en:'Formation sweep (estimate)'}[lang], '~60-70% (5-точечная схема)'],
[{ru:'Перепад давления',en:'Pressure drop'}[lang], (Pinj-Pp).toFixed(1)+' атм'],
];
}
},

const RF = Ks*Kd*Kr;
const res = [

{
tab: 4,
id: 'well_drainage',
title: {ru:'ЗОНА ДРЕНИРОВАНИЯ СКВАЖИНЫ',en:'WELL DRAINAGE AREA'},
fields: [
{ id: 'k', label:{ ru: 'Проницаемость k (мД)', en: 'Permeability k (mD)' }, def: '' },
{ id: 'h', label:{ ru: 'Толщина пласта h (м)', en: 'Pay thickness h (m)' }, def: '' },
{ id: 'dP', label:{ ru: 'Депрессия dP (атм)', en: 'Drawdown dP (atm)' }, def: '' },
{ id: 'Q', label:{ ru: 'Дебит Q (м³/сут)', en: 'Rate Q (m³/d)' }, def: '' },
{ id: 'mu', label:{ ru: 'Вязкость нефти (мПа*с)', en: 'Oil viscosity (mPa·s)' }, def: '5' },
{ id: 'Rw', label:{ ru: 'Радиус скважины Rw (м)', en: 'Wellbore radius Rw (m)' }, def: '0.108' },
],
calc(v) {
const k=+v.k*1e-15, h=+v.h, dP=+v.dP*101325;
const Q=+v.Q/86400, mu=+v.mu*1e-3, Rw=+v.Rw;
if(!k||!h||!dP||!Q||!mu||!Rw) return null;

const Re = Math.exp(2*Math.PI*k*h*dP/(Q*mu) - 0.5 + Math.log(Rw));
const Re_limited = Math.min(Re, 5000);
const A_drain = Math.PI*Re_limited*Re_limited/1e4;
const S_factor = Math.log(Re_limited/Rw) - Math.log(Re/Rw);
const PI_theor = Q/86400/(dP/101325);
return [
[{ru:'Радиус контура питания Re',en:'Drainage radius Re'}[lang], Re_limited.toFixed(0)+' м'],
[{ru:'Площадь дренирования',en:'Drainage area'}[lang], A_drain.toFixed(2)+' га'],
['PI теоретич.', PI_theor.toFixed(4)+' м³/сут/атм'],
['kh', (k*1e15*h).toFixed(2)+' мД*м'],
];
}
},

{

fields: [
{ id: 'Kp', label:{ ru: 'Пористость Кп (%)', en: 'Porosity Kp (%)' }, def: '' },

{ id: 'Kohv', label:{ ru: 'Коэфф. охвата Кохв (0.5–0.9)', en: 'Sweep efficiency (0.5–0.9)' }, def: '0.70' },

{ id: 'Q_prod', label:{ ru: 'Добыча жидкости (м³/сут)', en: 'Liquid production (m³/d)' }, def: '' },
],
calc(v) {
const Kp=+v.Kp/100, Ko=+v.Ko, Kohv=+v.Kohv, WC=+v.WC/100;
const Qi=+v.Q_inj, Qp=+v.Q_prod;
if(!Kp||!Ko||!Kohv) return null;
const KIN = Kp*Ko*Kohv;
const Qo = WC ? Qp*(1-WC) : null;
const Qw_prod = WC ? Qp*WC : null;
const balance = Qi && Qp ? (Qi - Qp) : null;
const comp = Qi && Qp ? Qi/Qp : null;
const res = [
[{ru:'КИН теоретический',en:'RF theoretical'}[lang], (KIN*100).toFixed(2)+'%'],
[{ru:'Коэфф. вытеснения Ko',en:'Displacement efficiency Ko'}[lang], (Ko*100).toFixed(1)+'%'],
[{ru:'Коэфф. охвата Кохв',en:'Sweep efficiency Ksw'}[lang], (Kohv*100).toFixed(1)+'%'],
];
if(Qo) res.push([{ru:'Дебит нефти',en:'Oil rate'}[lang], Qo.toFixed(2)+' м³/сут']);
if(Qw_prod) res.push([{ru:'Дебит воды',en:'Water rate'}[lang], Qw_prod.toFixed(2)+' м³/сут']);
if(comp) res.push([{ru:'Компенсация отбора закачкой',en:'Injection-production compensation'}[lang], comp.toFixed(3)]);

return res;
}
},

{
tab: 5,
id: 'cement_calc',
title: {ru:'РАСЧЁТ ЦЕМЕНТИРОВАНИЯ СКВАЖИНЫ',en:'WELL CEMENTING CALCULATION'},
fields: [
{ id: 'H_bot', label:{ ru: 'Глубина башмака колонны (м)', en: 'Casing shoe depth (m)' }, def: '' },
{ id: 'H_top', label:{ ru: 'Верх цементного кольца (м)', en: 'Top of cement (m)' }, def: '0' },
{ id: 'D_skv', label:{ ru: 'Диаметр долота/ствола (мм)', en: 'Bit/borehole diameter (mm)' }, def: '215.9' },
{ id: 'D_col_out', label:{ ru: 'Внешн. диаметр колонны (мм)', en: 'Casing OD (mm)' }, def: '168.3' },
{ id: 'D_col_in', label:{ ru: 'Внутр. диаметр колонны (мм)', en: 'Casing ID (mm)' }, def: '152' },
{ id: 'k_loss', label:{ ru: 'Коэфф. потерь (1.2–1.5)', en: 'Loss factor (1.2–1.5)' }, def: '1.3' },
{ id: 'rho_cem', label:{ ru: 'Плотность цем. раствора (кг/м³)', en: 'Cement slurry density (kg/m³)' }, def: '1850' },
],
calc(v) {
const Hbot=+v.H_bot, Htop=+v.H_top, Dskv=+v.D_skv/1000;
const Dco=+v.D_col_out/1000, Dci=+v.D_col_in/1000;
const k=+v.k_loss, rho=+v.rho_cem;
if(!Hbot||!Dskv||!Dco||!Dci||!k||!rho) return null;
const H_cem = Hbot - Htop;

const A_ann = Math.PI/4*(Dskv*Dskv - Dco*Dco);
const V_ann = A_ann*H_cem;

const A_col = Math.PI/4*Dci*Dci;
const V_col = A_col*Hbot;

const V_cem = V_ann*k;
const m_cem = V_cem*rho;

const m_dry = m_cem/1.5;
const V_water = m_dry*0.5/1000;
return [
[{ru:'Высота цементного кольца',en:'Cement column height'}[lang], H_cem.toFixed(0)+' м'],
[{ru:'Объём затрубн. простр.',en:'Annulus volume'}[lang], V_ann.toFixed(3)+' м³'],
[{ru:'ОБЪЁМ ЦЕМ. РАСТВОРА (с запасом)',en:'CEMENT VOLUME (with margin)'}[lang], V_cem.toFixed(3)+' м³'],
[{ru:'Масса цем. раствора',en:'Cement slurry mass'}[lang], (m_cem/1000).toFixed(2)+' т'],
[{ru:'Сухой цемент (прибл.)',en:'Dry cement (approx.)'}[lang], (m_dry/1000).toFixed(2)+' т'],
[{ru:'Вода для затворения',en:'Mix water'}[lang], V_water.toFixed(2)+' м³'],
[{ru:'Объём продавочной жидкости',en:'Displacement fluid volume'}[lang], V_col.toFixed(3)+' м³'],
];
}
},

{
tab: 5,
id: 'mud_weight',
title: {ru:'БУРОВОЙ РАСТВОР — ПЛОТНОСТЬ И ДАВЛЕНИЕ',en:'DRILLING MUD — DENSITY & PRESSURE'},
fields: [
{ id: 'H', label:{ ru: 'Глубина (м)', en: 'Depth (m)' }, def: '' },
{ id: 'rho_mud', label:{ ru: 'Плотность раствора (кг/м³)', en: 'Mud density (kg/m³)' }, def: '1200' },
{ id: 'Ppore', label:{ ru: 'Поровое давление (атм)', en: 'Pore pressure (atm)' }, def: '' },
{ id: 'Pfrac', label:{ ru: 'Давление разрыва пласта (атм)', en: 'Fracture pressure (atm)' }, def: '' },
],
calc(v) {
const H=+v.H, rho=+v.rho_mud, Ppore=+v.Ppore, Pfrac=+v.Pfrac;
if(!H||!rho) return null;
const Phydro = rho*9.81*H/101325;
const EMW = rho;
const res = [
[{ru:'Гидростатическое давление',en:'Hydrostatic pressure'}[lang], Phydro.toFixed(2)+' атм'],
[{ru:'Гидростатическое давление',en:'Hydrostatic pressure'}[lang], (Phydro*0.0981).toFixed(3)+' МПа'],
[{ru:'Гидростатическое давление',en:'Hydrostatic pressure'}[lang], (Phydro*14.696).toFixed(1)+' psi'],
[{ru:'Эффективная плотность (EMW)',en:'Effective density (EMW)'}[lang], EMW.toFixed(0)+' кг/м³'],
];
if(Ppore) {
const rho_min = Ppore*101325/(9.81*H);
res.push([{ru:'Мин. плотность (от выброса)',en:'Min density (kick control)'}[lang], rho_min.toFixed(0)+' кг/м³']);
const margin = rho - rho_min;
res.push([{ru:'Запас плотности',en:'Density margin'}[lang], margin.toFixed(0)+' кг/м³ ('+(margin>0?'норма':'НЕДОСТАТОЧНО')+')']);
}
if(Pfrac) {
const rho_max = Pfrac*101325/(9.81*H);
res.push([{ru:'Макс. плотность (до разрыва)',en:'Max density (before fracture)'}[lang], rho_max.toFixed(0)+' кг/м³']);
if(rho > rho_max) res.push([{ru:'СТАТУС',en:'STATUS'}[lang], L('ОПАСНО: давление выше разрыва!','DANGER: pressure exceeds fracture!')]);
else res.push([{ru:'Окно бурения',en:'Drilling window'}[lang], (rho_max-rho).toFixed(0)+' кг/м³']);
}
return res;
}
},

{
tab: 5,
id: 'rop_calc',
title: {ru:'МЕХАНИЧЕСКАЯ СКОРОСТЬ БУРЕНИЯ (МСБ)',en:'RATE OF PENETRATION (ROP)'},
fields: [
{ id: 'dH', label:{ ru: 'Проходка за рейс (м)', en: 'Footage per run (m)' }, def: '' },
{ id: 'dt_drill', label:{ ru: 'Время бурения (ч)', en: 'Drilling time (h)' }, def: '' },
{ id: 'dt_trip', label:{ ru: 'Время на подъём/спуск (ч)', en: 'Trip time (h)' }, def: '' },
{ id: 'WOB', label:{ ru: 'Нагрузка на долото WOB (т)', en: 'WOB (t)' }, def: '' },
{ id: 'RPM', label:{ ru: 'Обороты долота (об/мин)', en: 'Bit RPM' }, def: '' },
{ id: 'D_bit', label:{ ru: 'Диаметр долота (мм)', en: 'Bit diameter (mm)' }, def: '215.9' },
],
calc(v) {
const dH=+v.dH, dt_d=+v.dt_drill, dt_t=+v.dt_trip;
const WOB=+v.WOB, RPM=+v.RPM, D=+v.D_bit/1000;
if(!dH||!dt_d) return null;
const ROP = dH/dt_d;
const dt_total = dt_d + (dt_t||0);
const ROP_avg = dt_total ? dH/dt_total : null;
const res = [
[{ru:'МСБ (чистое время)',en:'ROP (net time)'}[lang], ROP.toFixed(2)+' м/ч'],
ROP_avg ? [{ru:'Коммерческая МСБ',en:'Commercial ROP'}[lang], ROP_avg.toFixed(2)+' м/ч'] : ['', ''],
[{ru:'Проходка за смену (12ч)',en:'Footage per shift (12h)'}[lang], (ROP*12).toFixed(1)+' м'],
[{ru:'Проходка за сутки',en:'Daily footage'}[lang], (ROP*24).toFixed(1)+' м'],
];
if(WOB && RPM && D) {

const A_bit = Math.PI/4*D*D;
const MSE = (WOB*1000*9.81/A_bit + 2*Math.PI*RPM*0.1*WOB*1000/(A_bit*ROP/3600))/1e6;
res.push([{ru:'Удельная мех. энергия MSE',en:'Mechanical specific energy MSE'}[lang], MSE.toFixed(1)+' МДж/м³']);
}
return res.filter(r => r[1] !== '');
}
},

{
tab: 5,
id: 'kick_control',
title: {ru:'КОНТРОЛЬ ВЫБРОСА (ГАЗОВЫЙ ПУЗЫРЬ)',en:'KICK CONTROL (GAS INFLUX)'},
fields: [
{ id: 'H_well', label:{ ru: 'Глубина скважины (м)', en: 'Well depth (m)' }, def: '' },
{ id: 'Ppore', label:{ ru: 'Поровое давление (атм)', en: 'Pore pressure (atm)' }, def: '' },
{ id: 'rho_mud', label:{ ru: 'Плотность раствора (кг/м³)', en: 'Mud density (kg/m³)' }, def: '1200' },
{ id: 'V_kick', label:{ ru: 'Объём выброса (м³)', en: 'Release volume (m³)' }, def: '' },
{ id: 'D_col', label:{ ru: 'Диаметр обсадной колонны (мм)', en: 'Casing OD (mm)' }, def: '215.9' },
],
calc(v) {
const H=+v.H_well, Ppore=+v.Ppore, rho=+v.rho_mud, Vk=+v.V_kick, D=+v.D_col/1000;
if(!H||!Ppore||!rho) return null;
const Phydro = rho*9.81*H/101325;
const P_ufl = Ppore - Phydro;
const H_kick = Vk && D ? Vk/(Math.PI/4*D*D) : null;

const rho_kill = Ppore*101325/(9.81*H)*1.05;
const delta_rho = rho_kill - rho;

const rho_bar = 2650;
const V_total_mud = Math.PI/4*D*D*H;
const V_barite = delta_rho > 0 ? V_total_mud*delta_rho/(rho_bar - rho_kill) : 0;
const res = [
[{ru:'Гидростатика раствора',en:'Mud hydrostatic'}[lang], Phydro.toFixed(2)+' атм'],
[{ru:'Поровое давление',en:'Pore pressure'}[lang], Ppore.toFixed(2)+' атм'],
[{ru:'Давление на устье (СИАД)',en:'Wellhead pressure (SICP)'}[lang], Math.max(0,P_ufl).toFixed(2)+' атм'],
[{ru:'Требуемая плотность глушения',en:'Required kill density'}[lang], rho_kill.toFixed(0)+' кг/м³'],
[{ru:'Добавка к плотности',en:'Density additive'}[lang], delta_rho.toFixed(0)+' кг/м³'],
];
if(H_kick) res.push([{ru:'Высота газового пузыря',en:'Gas bubble height'}[lang], H_kick.toFixed(1)+' м']);
return res;
}
},

{

{ id: 'H_bot', label:{ ru: 'Подошва интервала (м)', en: 'Interval bottom (m)' }, def: '' },
{ id: 'D_col', label:{ ru: 'Внутр. диаметр колонны (мм)', en: 'Casing ID (mm)' }, def: '152' },
{ id: 'k_abs', label:{ ru: 'Коэфф. поглощения (1.3–2.0)', en: 'Absorption coeff. (1.3–2.0)' }, def: '1.5' },
{ id: 'rho_cem', label:{ ru: 'Плотность цем. раствора (кг/м³)', en: 'Cement slurry density (kg/m³)' }, def: '1850' },
{ id: 'P_inj', label:{ ru: 'Давление продавки (атм)', en: 'Squeeze pressure (atm)' }, def: '100' },
],
calc(v) {
const Ht=+v.H_top, Hb=+v.H_bot, D=+v.D_col/1000;
const k=+v.k_abs, rho=+v.rho_cem, Pinj=+v.P_inj;
if(!Ht||!Hb||!D||!k||!rho) return null;
const H_int = Hb - Ht;
const A = Math.PI/4*D*D;
const V_col = A*H_int;
const V_cem = V_col*k;
const V_prod = A*Ht;
const m_cem = V_cem*rho;
const m_dry = m_cem*0.65;
return [
[{ru:'Интервал изоляции',en:'Isolation interval'}[lang], H_int.toFixed(0)+' м ('+Ht+'-'+Hb+' м)'],

[{ru:'Сухой цемент',en:'Dry cement'}[lang], (m_dry/1000).toFixed(2)+' т'],
[{ru:'Объём продавочной жидк.',en:'Displacement fluid volume'}[lang], V_prod.toFixed(3)+' м³'],
[{ru:'Давление продавки',en:'Displacement pressure'}[lang], Pinj.toFixed(0)+' атм'],
];
}

{
tab: 5,
id: 'mud_volume',
title: {ru:'ОБЪЁМ И СОСТАВ БУРОВОГО РАСТВОРА',en:'MUD VOLUME & COMPOSITION'},
fields: [
{ id: 'D_bit', label:{ ru: 'Диаметр долота (мм)', en: 'Bit diameter (mm)' }, def: '215.9' },
{ id: 'H', label:{ ru: 'Глубина интервала (м)', en: 'Interval depth (m)' }, def: '' },
{ id: 'k_cav', label:{ ru: 'Коэфф. кавернозности (1.1–1.4)', en: 'Washout factor (1.1–1.4)' }, def: '1.2' },
{ id: 'rho_mud', label:{ ru: 'Требуемая плотность (кг/м³)', en: 'Required density (kg/m³)' }, def: '1150' },
{ id: 'rho_base', label:{ ru: 'Плотность базового раствора (кг/м³)', en: 'Base fluid density (kg/m³)' }, def: '1000' },
{ id: 'rho_bar', label:{ ru: 'Плотн. утяжелителя — барит (кг/м³)', en: 'Weighting agent — barite (kg/m³)' }, def: '4200' },
],
calc(v) {
const D=+v.D_bit/1000, H=+v.H, k=+v.k_cav;
const rho_t=+v.rho_mud, rho_b=+v.rho_base, rho_w=+v.rho_bar;
if(!D||!H||!k||!rho_t||!rho_b||!rho_w) return null;
const V_hole = Math.PI/4*D*D*H*k;
const V_surface = V_hole*0.5;
const V_total = V_hole + V_surface;

const C_bar = rho_w*(rho_t - rho_b)/(rho_w - rho_b);
const m_bar_total = C_bar*V_total;
const V_base = V_total*(1 - C_bar/rho_w);
return [
[{ru:'Объём скважины (ствол)',en:'Wellbore volume'}[lang], V_hole.toFixed(2)+' м³'],
[{ru:'Поверхностный запас',en:'Surface reserve'}[lang], V_surface.toFixed(2)+' м³'],
[{ru:'ОБЩИЙ объём раствора',en:'TOTAL mud volume'}[lang], V_total.toFixed(2)+' м³'],
[{ru:'Утяжелитель (барит) на 1 м³',en:'Weighting agent (barite) per 1 m³'}[lang], C_bar.toFixed(1)+' кг/м³'],
[{ru:'ВСЕГО баритового порошка',en:'TOTAL barite powder'}[lang], (m_bar_total/1000).toFixed(2)+' т'],
[{ru:'Объём базового флюида',en:'Base fluid volume'}[lang], V_base.toFixed(2)+' м³'],
];
}
},

{
tab: 5,
id: 'mud_funnel',
title: {ru:'ВЯЗКОСТЬ БУРОВОГО РАСТВОРА (ВОРОНКА МАРША)',en:'MUD VISCOSITY (MARSH FUNNEL)'},
fields: [
{ id: 'FV', label:{ ru: 'Воронка Марша (сек/кварта)', en: 'Marsh funnel (s/qt)' }, def: '' },
{ id: 'rho_mud', label:{ ru: 'Плотность раствора (кг/м³)', en: 'Mud density (kg/m³)' }, def: '1150' },
{ id: 'T600', label:{ ru: 'Показание вискозиметра 600 об/мин', en: 'Viscometer 600 RPM' }, def: '' },
{ id: 'T300', label:{ ru: 'Показание вискозиметра 300 об/мин', en: 'Viscometer 300 RPM' }, def: '' },
{ id: 'Gel10s', label:{ ru: 'СНС 10 сек (фунт/100 кв.фут)', en: 'Gel strength 10 sec (lb/100ft²)' }, def: '' },
{ id: 'Gel10m', label:{ ru: 'СНС 10 мин (фунт/100 кв.фут)', en: 'Gel strength 10 min (lb/100ft²)' }, def: '' },
],
calc(v) {
const FV=+v.FV, rho=+v.rho_mud, T600=+v.T600, T300=+v.T300;
const G10s=+v.Gel10s, G10m=+v.Gel10m;
if(!FV) return null;
const mu_app = FV>25 ? (FV-25)*1.5 : null;
const res = [
[{ru:'Воронка Марша',en:'Marsh funnel'}[lang], FV.toFixed(0)+' сек'],
[{ru:'Плотность раствора',en:'Mud density'}[lang], rho.toFixed(0)+' кг/м³'],
];
if(T600 && T300) {
const PV = T600 - T300;
const YP = T300 - PV;
const YP_pa = YP*0.4788;
res.push([{ru:'Пластическая вязкость PV',en:'Plastic viscosity PV'}[lang], PV.toFixed(1)+' мПа*с']);
res.push([{ru:'ДНС (YP)',en:'Yield point (YP)'}[lang], YP.toFixed(1)+' lb/100ft² = '+YP_pa.toFixed(1)+' Па']);
const n = 3.32*Math.log10(T600/T300);
const K = 510*T300/Math.pow(511,n);
res.push([{ru:'Индекс течения n',en:'Flow behavior index n'}[lang], n.toFixed(3)]);
res.push([{ru:'Индекс консистенции K',en:'Consistency index K'}[lang], K.toFixed(3)+' мПа*сn']);
}
if(G10s && G10m) {
res.push([{ru:'СНС 10 сек / 10 мин',en:'GS 10 sec / 10 min'}[lang], G10s+' / '+G10m+' lb/100ft²']);
const gel_ratio = G10m/G10s;
const gel_type = gel_ratio < 1.5 ? L('Прогрессивный (норма)','Progressive (normal)') :
gel_ratio < 3 ? L('Умеренно прогрессивный','Moderately progressive') :
L('Высокий — риск прихвата!','High — stuck pipe risk!');
res.push([{ru:'Тип гелеобразования',en:'Gel type'}[lang], gel_type]);
}
return res;
}

{
tab: 5,
id: 'bit_hydraulics',
title: {ru:'ГИДРАВЛИКА ДОЛОТА — ПОТЕРИ ДАВЛЕНИЯ',en:'BIT HYDRAULICS — PRESSURE LOSSES'},
fields: [
{ id: 'Q', label:{ ru: 'Расход насоса (л/с)', en: 'Pump rate (L/s)' }, def: '25' },
{ id: 'rho_mud', label:{ ru: 'Плотность раствора (кг/м³)', en: 'Mud density (kg/m³)' }, def: '1150' },
{ id: 'D_noz1', label:{ ru: 'Диаметр насадки 1 (1/32 дюйма)', en: 'Nozzle 1 (1/32 in)' }, def: '12' },
{ id: 'D_noz2', label:{ ru: 'Диаметр насадки 2 (1/32 дюйма)', en: 'Nozzle 2 (1/32 in)' }, def: '12' },
{ id: 'D_noz3', label:{ ru: 'Диаметр насадки 3 (1/32 дюйма)', en: 'Nozzle 3 (1/32 in)' }, def: '12' },
{ id: 'P_pump', label:{ ru: 'Давление насоса (атм)', en: 'Pump pressure (atm)' }, def: '150' },
],
calc(v) {
const Q=+v.Q/1000, rho=+v.rho_mud, Pp=+v.P_pump;
const d1=+v.D_noz1*0.0254/32, d2=+v.D_noz2*0.0254/32, d3=+v.D_noz3*0.0254/32;
if(!Q||!rho||!d1) return null;
const Cd = 0.95;
const An = Math.PI/4*(d1*d1 + d2*d2 + d3*d3);
const V_noz = Q/An;
const dP_bit = rho*Q*Q/(2*Cd*Cd*An*An)/101325;
const HSI = dP_bit*101325*Q/(Math.PI/4*(+v.D_noz1*0.0254/32*32)**2*0.0254**2*1000);
const P_circ = Pp - dP_bit;
const HHP_bit = dP_bit*101325*Q/1000;
return [
[{ru:'Суммарная площадь насадок',en:'Total nozzle area'}[lang], (An*1e6).toFixed(2)+' мм²'],
[{ru:'Скорость через насадки',en:'Nozzle velocity'}[lang], V_noz.toFixed(1)+' м/с'],
[{ru:'Потери давл. на долоте',en:'Bit pressure drop'}[lang], dP_bit.toFixed(1)+' атм'],
[{ru:'Давл. на циркуляцию',en:'Circulation pressure'}[lang], P_circ.toFixed(1)+' атм'],
[{ru:'Мощность на долоте',en:'Bit power'}[lang], HHP_bit.toFixed(2)+' кВт'],
[{ru:'Оптим. потери на долоте (65%)',en:'Optimal bit pressure drop (65%)'}[lang], (Pp*0.65).toFixed(1)+' атм'],
];
}
},

{
tab: 3,
id: 'reynolds',
title: {ru:'ЧИСЛО РЕЙНОЛЬДСА',en:'REYNOLDS NUMBER'},
fields: [
{ id: 'rho', label:{ ru: 'Плотность ρ (кг/м³)', en: 'Density ρ (kg/m³)' }, def: '850' },
{ id: 'vel', label:{ ru: 'Скорость v (м/с)', en: 'Velocity v (m/s)' }, def: '1.5' },
{ id: 'D', label:{ ru: 'Диаметр D (мм)', en: 'Diameter D (mm)' }, def: '150' },
{ id: 'mu', label:{ ru: 'Дин. вязкость μ (мПа·с)', en: 'Dynamic viscosity μ (mPa·s)' }, def: '5' },
],
calc(v) {
const rho=+v.rho, vel=+v.vel, D=+v.D/1000, mu=+v.mu/1000;
if(!rho||!vel||!D||!mu) return null;
const Re=rho*vel*D/mu;
const regime = Re<2300 ? [{ru:'Ламинарный',en:'Laminar'}[lang],'Laminar'] : Re<4000 ? [{ru:'Переходный',en:'Transitional'}[lang],'Transitional'] : [{ru:'Турбулентный',en:'Turbulent'}[lang],'Turbulent'];
const f_lam = Re<2300 ? 64/Re : 0;
const f_turb = Re>=4000 ? 0.316/Math.pow(Re,0.25) : 0;
return [
[{ru:'Число Рейнольдса Re',en:'Reynolds number Re'}[lang], Re.toFixed(0)],
[{ru:'Режим течения',en:'Flow regime'}[lang], regime[lang]],
Re<2300 ? [{ru:'Коэфф. Дарси-Вейсбаха',en:'Darcy-Weisbach factor'}[lang], f_lam.toFixed(5)] :
[{ru:'Коэфф. Блазиуса (турб.)',en:'Blasius factor (turb.)'}[lang], f_turb.toFixed(5)],
];
}
},

],
calc(v) {
const Ts=+v.T_surf, G=+v.grad, Hp=+v.H_pump, Hz=+v.H_well, Tmax=+v.T_max_esp;
if(!Ts||!G||!Hz) return null;
const T_bottom = Ts + G*Hz/100;
const T_pump = Hp ? Ts + G*Hp/100 : null;
const T_mid = Ts + G*(Hz/2)/100;
let status = '';
if(T_pump && Tmax) {
if(T_pump > Tmax) status = L('ОПАСНО: температура на насосе превышает макс. ПЭД!','DANGER: pump temp exceeds max motor temp!');
else if(T_pump > Tmax*0.9) status = L('ВНИМАНИЕ: температура близка к максимуму ПЭД','WARNING: temp close to motor limit');
else status = L('НОРМА: температура ПЭД в допустимых пределах','NORMAL: motor temp within limits');
}
const res = [
[{ru:'Температура на поверхности',en:'Surface temperature'}[lang], Ts.toFixed(1)+' °C'],
[{ru:'Температура на середине',en:'Mid-depth temperature'}[lang], T_mid.toFixed(1)+' °C'],
[{ru:'Температура на забое',en:'Temperature at BH'}[lang], T_bottom.toFixed(1)+' °C'],
];
if(T_pump) {
res.push([{ru:'Температура на насосе',en:'Temperature at pump'}[lang], T_pump.toFixed(1)+' °C']);
if(status) res.push([{ru:'Статус ПЭД',en:'Motor status'}[lang], status]);
}

const step = Math.round(Hz/4/50)*50 || 250;
for(let d=step; d<=Hz; d+=step) {
res.push([{ru:'Темп. на '+d+' м',en:'Temp at '+d+' m'}, (Ts+G*d/100).toFixed(1)+' °C']);
}
return res;
}
},

{
tab: 6,
id: 'separator_design',
title: {ru:'ТРЁХФАЗНЫЙ СЕПАРАТОР — РАСЧЁТ',en:'THREE-PHASE SEPARATOR — DESIGN'},
fields: [
{ id: 'Q_gas', label:{ ru: 'Дебит газа (тыс.м³/сут)', en: 'Gas rate (Mm³/d)' }, def: '' },
{ id: 'Q_liq', label:{ ru: 'Дебит жидкости (м³/сут)', en: 'Liquid rate (m³/d)' }, def: '' },
{ id: 'P_sep', label:{ ru: 'Давление сепарации (атм)', en: 'Separator pressure (atm)' }, def: '5' },
{ id: 'T_sep', label:{ ru: 'Температура сепарации (°C)', en: 'Separator temperature (°C)' }, def: '20' },
{ id: 'rho_oil', label:{ ru: 'Плотность нефти (кг/м³)', en: 'Oil density (kg/m³)' }, def: '850' },
{ id: 'rho_gas', label:{ ru: 'Плотность газа (кг/м³)', en: 'Gas density (kg/m³)' }, def: '0.8' },
],
calc(v) {
const Qg=+v.Q_gas*1000/86400, Ql=+v.Q_liq/86400;
const P=+v.P_sep, T=+v.T_sep+273.15;
const rho_o=+v.rho_oil, rho_g=+v.rho_gas;
if(!Qg||!Ql||!P||!rho_g) return null;

const Qg_act = Qg*0.101325*T/(P*273.15);

const K_sou = 0.06;
const V_gas = K_sou*Math.sqrt((rho_o-rho_g)/rho_g);

const D_gas = Math.sqrt(4*Qg_act/(Math.PI*V_gas));

const t_ret = 300;
const V_liq = Ql*t_ret;
const D_liq = Math.pow(4*V_liq/(Math.PI*5), 1/3);
const D_sep = Math.max(D_gas, D_liq);
const L_sep = 5*D_sep;
const D_std = [0.6,0.8,1.0,1.2,1.4,1.6,1.8,2.0,2.4,3.0].find(d=>d>=D_sep)||3.0;
return [
[{ru:'Скорость газа (Соузерс)',en:'Gas velocity (Souders)'}[lang], V_gas.toFixed(3)+' м/с'],
[{ru:'Дебит газа (раб. усл.)',en:'Gas rate (actual cond.)'}[lang], (Qg_act*3600).toFixed(1)+' м³/ч'],
[{ru:'Расчётный диаметр',en:'Calculated diameter'}[lang], D_sep.toFixed(3)+' м'],
[{ru:'СТАНДАРТНЫЙ диаметр',en:'STANDARD diameter'}[lang], D_std.toFixed(1)+' м'],
[{ru:'Расчётная длина L=5D',en:'Design length L=5D'}[lang], (D_std*5).toFixed(1)+' м'],
[{ru:'Объём жидк. секции',en:'Liquid section volume'}[lang], V_liq.toFixed(2)+' м³'],
];
}
},

{
tab: 6,
id: 'pump_pipeline',
title: {ru:'НАСОС НЕФТЕПРОВОДА — ПОДБОР И НАПОР',en:'OIL PIPELINE PUMP — SELECTION & HEAD'},
fields: [
{ id: 'Q', label:{ ru: 'Расход Q (м³/ч)', en: 'Flow rate Q (m³/h)' }, def: '' },
{ id: 'L', label:{ ru: 'Длина трубопровода L (км)', en: 'Pipeline length L (km)' }, def: '' },
{ id: 'D', label:{ ru: 'Внутр. диаметр трубы D (мм)', en: 'Pipe ID D (mm)' }, def: '200' },
{ id: 'dZ', label:{ ru: 'Перепад высот dZ (м)', en: 'Elevation difference dZ (m)' }, def: '0' },
{ id: 'rho', label:{ ru: 'Плотность нефти (кг/м³)', en: 'Oil density (kg/m³)' }, def: '870' },
{ id: 'mu_cst', label:{ ru: 'Кинем. вязкость (сСт)', en: 'Kinematic viscosity (cSt)' }, def: '10' },
{ id: 'eff_pump', label:{ ru: 'КПД насоса (%)', en: 'Pump efficiency (%)' }, def: '75' },
],
calc(v) {
const Q=+v.Q/3600, L=+v.L*1000, D=+v.D/1000;
const dZ=+v.dZ, rho=+v.rho, mu=+v.mu_cst*1e-6, eff=+v.eff_pump/100;
if(!Q||!L||!D||!rho||!mu) return null;
const A = Math.PI/4*D*D;
const vel = Q/A;
const Re = vel*D/mu;
let f;
if(Re<2300) f=64/Re;
else f=0.316/Math.pow(Re,0.25);
const dH_fric = f*(L/D)*(vel*vel/(2*9.81));
const H_total = dH_fric + dZ + vel*vel/(2*9.81);
const P_shaft = rho*9.81*H_total*Q/1000;
const P_motor = P_shaft/eff;
return [
[{ru:'Скорость потока',en:'Flow velocity'}[lang], vel.toFixed(3)+' м/с'],
[{ru:'Число Рейнольдса',en:'Reynolds number'}[lang], Re.toFixed(0)],
[{ru:'Режим течения',en:'Flow regime'}[lang], Re<2300?L('Ламинарный','Laminar'):L('Турбулентный','Turbulent')],
[{ru:'Потери напора на трение',en:'Friction head losses'}[lang], dH_fric.toFixed(2)+' м'],
[{ru:'ПОЛНЫЙ НАПОР насоса',en:'TOTAL PUMP HEAD'}[lang], H_total.toFixed(2)+' м'],
[{ru:'Мощность на валу',en:'Shaft power'}[lang], P_shaft.toFixed(2)+' кВт'],
[{ru:'Мощность электродвигателя',en:'Motor power'}[lang], P_motor.toFixed(2)+' кВт'],
];
}
},

{
tab: 6,
id: 'tank_volume',
title: {ru:'РЕЗЕРВУАР — ОБЪЁМ И ХРАНЕНИЕ',en:'STORAGE TANK — VOLUME & INVENTORY'},
fields: [
{ id: 'type', label:{ ru: 'Тип (1=верт., 2=гориз.)', en: 'Type (1=vertical, 2=horizontal)' }, def: '1' },
{ id: 'D_tank', label:{ ru: 'Диаметр резервуара D (м)', en: 'Tank diameter D (m)' }, def: '' },
{ id: 'H_tank', label:{ ru: 'Высота/длина (м)', en: 'Height/length (m)' }, def: '' },
{ id: 'H_liq', label:{ ru: 'Уровень жидкости (м)', en: 'Liquid level (m)' }, def: '' },
{ id: 'rho', label:{ ru: 'Плотность жидкости (кг/м³)', en: 'Fluid density (kg/m³)' }, def: '870' },
{ id: 'T_fill', label:{ ru: 'Время наполнения (сут)', en: 'Fill time (days)' }, def: '' },
],
calc(v) {
const type=+v.type, D=+v.D_tank, H=+v.H_tank, Hl=+v.H_liq;
const rho=+v.rho, Tf=+v.T_fill;
if(!D||!H) return null;
const R = D/2;
const V_total = Math.PI*R*R*H;
const V_liq = Hl ? Math.PI*R*R*Hl : null;
const V_dead = Math.PI*R*R*0.2;
const M_liq = V_liq ? V_liq*rho/1000 : null;
const fill_rate = Tf && V_total ? V_total/Tf : null;
return [
[{ru:'Геометрический объём',en:'Geometric volume'}[lang], V_total.toFixed(2)+' м³'],
[{ru:'Рабочий объём (-мёртвый ост.)',en:'Working volume (- dead volume)'}[lang], (V_total-V_dead).toFixed(2)+' м³'],
[{ru:'Мёртвый остаток',en:'Dead volume'}[lang], V_dead.toFixed(2)+' м³'],
V_liq ? [{ru:'Объём жидкости (текущий)',en:'Current fluid volume'}[lang], V_liq.toFixed(2)+' м³'] : ['',''],
M_liq ? [{ru:'Масса жидкости',en:'Fluid mass'}[lang], (M_liq).toFixed(2)+' т'] : ['',''],
V_liq ? [{ru:'Заполнение',en:'Fill level'}[lang], (V_liq/V_total*100).toFixed(1)+'%'] : ['',''],
fill_rate ? [{ru:'Скорость наполнения',en:'Fill rate'}[lang], fill_rate.toFixed(2)+' м³/сут'] : ['',''],
].filter(r => r[1] !== '');
}
},

{
tab: 6,
id: 'flare_load',
title: {ru:'ФАКЕЛ — НАГРУЗКА И РАССЕИВАНИЕ',en:'FLARE — LOAD & DISPERSION'},
fields: [
{ id: 'Q_norm', label:{ ru: 'Нормальный сброс (тыс.м³/ч)', en: 'Normal blowdown (Mm³/h)' }, def: '' },
{ id: 'Q_emer', label:{ ru: 'Аварийный сброс (тыс.м³/ч)', en: 'Emergency blowdown (Mm³/h)' }, def: '' },
{ id: 'LHV', label:{ ru: 'Низшая теплота сгорания (МДж/м³)', en: 'Lower heating value (MJ/m³)' }, def: '34' },
{ id: 'H_flare', label:{ ru: 'Высота факела (м)', en: 'Flare height (m)' }, def: '30' },
{ id: 'D_tip', label:{ ru: 'Диаметр оголовка (мм)', en: 'Flare tip diameter (mm)' }, def: '200' },
],
calc(v) {
const Qn=+v.Q_norm*1000/3600, Qe=+v.Q_emer*1000/3600;
const LHV=+v.LHV*1e6, H=+v.H_flare, D=+v.D_tip/1000;
if(!Qn||!LHV) return null;
const Q_des = Qe || Qn;
const A_tip = Math.PI/4*D*D;
const V_tip = Q_des/A_tip;
const P_heat = Q_des*LHV/1000;

const F_allow = 4000;
const R_safe = Math.sqrt(P_heat*1000*0.1/(4*Math.PI*F_allow));
return [
[{ru:'Тепловая нагрузка (норм.)',en:'Heat load (normal)'}[lang], (Qn*LHV/1e6).toFixed(2)+' МВт'],
[{ru:'Тепловая нагрузка (авар.)',en:'Heat load (emergency)'}[lang], (Q_des*LHV/1e6).toFixed(2)+' МВт'],
[{ru:'Скорость газа в оголовке',en:'Gas velocity at tip'}[lang], V_tip.toFixed(1)+' м/с'],
[{ru:'Безопасное расстояние',en:'Safe distance'}[lang], R_safe.toFixed(1)+' м'],
[{ru:'Высота факела',en:'Flare height'}[lang], H.toFixed(0)+' м'],
V_tip>60 ? [L('ВНИМАНИЕ: скорость > 60 м/с — шум/вибрация','WARNING: velocity > 60 m/s — noise/vibration'),''] :
[L('Скорость в норме','Velocity OK'),''],
].filter(r => r[1] !== '' || true).filter(r => r[0] !== '');
}
},

{
tab: 7,
id: 'cable_esp',
title: {ru:'КАБЕЛЬ УЭЦН — СЕЧЕНИЕ И ПОТЕРИ',en:'ESP CABLE — CROSS-SECTION & LOSSES'},
fields: [
{ id: 'I', label:{ ru: 'Ток ПЭД (А)', en: 'Motor current (A)' }, def: '' },
{ id: 'L', label:{ ru: 'Длина кабеля (м)', en: 'Cable length (m)' }, def: '' },
{ id: 'A', label:{ ru: 'Сечение кабеля (мм2)', en: 'Cable section (mm²)' }, def: '16' },
{ id: 'U', label:{ ru: 'Напряжение трансформ. (В)', en: 'Transformer voltage (V)' }, def: '1000' },
{ id: 'T_fluid', label:{ ru: 'Темп. жидкости на глубине (°C)', en: 'Fluid temp at depth (°C)' }, def: '60' },
],
calc(v) {
const I=+v.I, L=+v.L, A=+v.A, U=+v.U, T=+v.T_fluid;
if(!I||!L||!A||!U) return null;
const rho_cu = 0.0172 * (1 + 0.004*(T-20));
const R_phase = rho_cu * L / A;
const dU = Math.sqrt(3) * I * R_phase / 1000;
const dU_pct = dU/U*100;
const P_loss = 3 * I*I * R_phase / 1000;
const U_motor = U - dU;
let status;
if(dU_pct > 10) status = L('КРИТИЧЕСКИЕ ПОТЕРИ — увеличить сечение!','CRITICAL LOSSES — increase cross-section!');
else if(dU_pct > 5) status = L('Повышенные потери — проверить сечение','High losses — check cross-section');
else status = L('Потери в норме','Losses normal');
const A_rec = dU_pct>5 ? Math.ceil(A * dU_pct / 5) : A;
return [
[{ru:'Сопротивление фазы R',en:'Phase resistance R'}[lang], R_phase.toFixed(4)+' Ом'],
[{ru:'Потери напряжения dU',en:'Voltage drop dU'}[lang], dU.toFixed(1)+' В ('+dU_pct.toFixed(1)+'%)'],
[{ru:'Напряжение на ПЭД',en:'Motor voltage'}[lang], U_motor.toFixed(1)+' В'],
[{ru:'Тепловые потери в кабеле',en:'Cable heat losses'}[lang], P_loss.toFixed(2)+' кВт'],
[{ru:'Нагрев кабеля (прибл.)',en:'Cable heating (approx.)'}[lang], (P_loss*10).toFixed(1)+' °C/100м'],
[{ru:'Статус',en:'Status'}[lang], status],
dU_pct>5 ? [{ru:'Рекоменд. сечение',en:'Recommended section'}[lang], A_rec+' мм2'] :
[{ru:'Сечение достаточно',en:'Section sufficient'}[lang], A+' мм2'],
];
}
},

{
tab: 7,
id: 'pump_efficiency',
title: {ru:'КПД НАСОСНОЙ УСТАНОВКИ (УЭЦН полный)',en:'TOTAL ESP SYSTEM EFFICIENCY'},
fields: [
{ id: 'kpd_nas', label:{ ru: 'КПД насоса (%)', en: 'Pump efficiency (%)' }, def: '55' },
{ id: 'kpd_ped', label:{ ru: 'КПД ПЭД (%)', en: 'Motor efficiency (%)' }, def: '85' },

{ id: 'P_gidro', label:{ ru: 'Гидравл. мощность (кВт)', en: 'Hydraulic power (kW)' }, def: '' },
],
calc(v) {
const kn=+v.kpd_nas/100, km=+v.kpd_ped/100, kc=+v.kpd_kab/100;
const kt=+v.kpd_trans/100, kv=+v.kpd_chp/100, Pg=+v.P_gidro;
if(!kn||!km||!kc||!kt||!kv) return null;
const KPD_total = kn*km*kc*kt*kv*100;
const KPD_no_chp = kn*km*kc*kt*100;
const P_consumed = Pg ? Pg/(KPD_total/100) : null;
const P_losses = Pg && P_consumed ? P_consumed - Pg : null;
return [
[{ru:'КПД насоса',en:'Pump efficiency'}[lang], (kn*100).toFixed(1)+'%'],
[{ru:'КПД ПЭД',en:'Motor efficiency'}[lang], (km*100).toFixed(1)+'%'],

[{ru:'КПД ЧРП',en:'VFD efficiency'}[lang], (kv*100).toFixed(1)+'%'],
[{ru:'КПД СИСТЕМЫ (с ЧРП)',en:'SYSTEM EFFICIENCY (with VFD)'}[lang], KPD_total.toFixed(2)+'%'],
[{ru:'КПД системы (без ЧРП)',en:'System efficiency (no VFD)'}[lang], KPD_no_chp.toFixed(2)+'%'],
P_consumed ? [{ru:'Потребляемая мощность',en:'Power consumption'}[lang], P_consumed.toFixed(2)+' кВт'] : ['',''],
P_losses ? [{ru:'Потери в системе',en:'System losses'}[lang], P_losses.toFixed(2)+' кВт'] : ['',''],
].filter(r => r[1] !== '');
}
},

{
tab: 7,
id: 'cable_voltage_drop',
title: {ru:'ПОТЕРЯ НАПРЯЖЕНИЯ ΔU В КАБЕЛЕ УЭЦН (ПУЭ)',en:'VOLTAGE DROP ΔU IN ESP CABLE (PUE)'},
fields: [
{ id: 'I', label:{ ru: 'Номинальный ток ПЭД I (А)', en: 'ESP motor nominal current I (A)' }, def: '' },
{ id: 'L', label:{ ru: 'Длина кабеля L (км)', en: 'Cable length L (km)' }, def: '' },
{ id: 'S', label:{ ru: 'Сечение кабеля S (мм²)', en: 'Cable section S (mm²)' }, def: '16',
type: 'select', options: [
{v:'6', l:'6 мм²'},
{v:'10', l:'10 мм²'},
{v:'16', l:'16 мм²'},
{v:'25', l:'25 мм²'},
{v:'35', l:'35 мм²'},
{v:'50', l:'50 мм²'},
{v:'70', l:'70 мм²'},
{v:'95', l:'95 мм²'},
{v:'120', l:'120 мм²'},
{v:'150', l:'150 мм²'},
{v:'185', l:'185 мм²'},
{v:'custom', l:'Другое — ввести вручную'},
]
},
{ id: 'S_custom', label:{ ru: 'Сечение вручную (мм²) — если выбрали "Другое"', en: 'Custom section (mm²)' }, def: '' },
{ id: 'U_trans', label:{ ru: 'Напряжение трансформатора (В)', en: 'Transformer voltage (V)' }, def: '1000' },
{ id: 'cos_fi', label:{ ru: 'Коэффициент мощности cos φ', en: 'Power factor cos φ' }, def: '0.88' },
{ id: 'T_cable', label:{ ru: 'Температура кабеля (°C)', en: 'Cable temperature (°C)' }, def: '60' },
],
calc(v) {
const I=+v.I, L=+v.L, cosfi=+v.cos_fi, U=+v.U_trans, T=+v.T_cable;
const S_sel = v.S === 'custom' ? +v.S_custom : +v.S;
const S = S_sel || 16;
if(!I||!L||!S||!U) return null;

const dU_pue = 30 * I * L / S;

const rho_20 = 0.0175;
const rho_T = rho_20 * (1 + 0.004*(T-20));
const r = rho_T * 1000 / S;
const x = 0.08;
const sinfi = Math.sqrt(1 - cosfi*cosfi);
const dU_exact = Math.sqrt(3) * I * L * (r*cosfi + x*sinfi);

const dU_pct_pue = dU_pue / U * 100;
const dU_pct_exact = dU_exact / U * 100;
const U_motor_pue = U - dU_pue;
const U_motor_exact = U - dU_exact;

const P_loss = 3 * I * I * r * L / 1000;

const S_rec_pue = Math.ceil(30 * I * L / (U * 0.07));
const S_rec_ex = Math.ceil(Math.sqrt(3)*I*L*(cosfi) / (U*0.07) * rho_T*1000);

let status;
if(dU_pct_exact > 10) status = L('КРИТИЧНО: потери >10% — увеличить сечение!','CRITICAL: drop >10% — increase section!');
else if(dU_pct_exact > 7) status = L('ВНИМАНИЕ: потери 7-10% — рекомендуется проверить','WARNING: drop 7-10% — check needed');
else status = L('НОРМА: потери в допустимых пределах (<7%)','NORMAL: drop within limits (<7%)');

const std_sections = [6,10,16,25,35,50,70,95,120,150,185];
const S_std = std_sections.find(s => s >= S_rec_ex) || 185;

return [
[{ru:'Сечение кабеля',en:'Cable section'}[lang], S+' мм²'],
[{ru:'Длина кабеля',en:'Cable length'}[lang], L.toFixed(3)+' км = '+(L*1000).toFixed(0)+' м'],
[{ru:'Уд. сопр. при '+T+'°C',en:'Specific resistance at '+T+'°C'}, r.toFixed(4)+' Ом/км'],
['', '──── ПОТЕРЯ НАПРЯЖЕНИЯ ────'],
['ΔU по ПУЭ (30×I×L/S)', dU_pue.toFixed(1)+' В ('+dU_pct_pue.toFixed(2)+'%)'],
['ΔU точная (с cosφ и indуктивн.)', dU_exact.toFixed(1)+' В ('+dU_pct_exact.toFixed(2)+'%)'],
[{ru:'НАПРЯЖЕНИЕ НА ПЭД (точное)',en:'MOTOR VOLTAGE (exact)'}[lang], U_motor_exact.toFixed(1)+' В'],
[{ru:'Потери мощности в кабеле',en:'Cable power losses'}[lang], P_loss.toFixed(3)+' кВт'],
['', '──── РЕКОМЕНДАЦИЯ ────'],
[{ru:'Статус',en:'Status'}[lang], status],
[{ru:'Рекоменд. сечение (ΔU≤7%)',en:'Recommended section (ΔU≤7%)'}[lang], S_std+' мм²'],
];
}
},

{
tab: 8,
id: 'langelier',
title: {ru:'КОРРОЗИЯ — ИНДЕКС ЛАНЖЕЛЬЕ (LSI)',en:'CORROSION — LANGELIER SATURATION INDEX (LSI)'},
fields: [
{ id: 'pH', label:{ ru: 'pH воды', en: 'Water pH' }, def: '7.2' },
{ id: 'Ca', label:{ ru: 'Жёсткость Ca²⁺ (мг/л как CaCO₃)', en: 'Ca²⁺ hardness (mg/L as CaCO₃)' }, def: '200' },
{ id: 'Alk', label:{ ru: 'Щёлочность (мг/л как CaCO₃)', en: 'Alkalinity (mg/L as CaCO₃)' }, def: '150' },
{ id: 'TDS', label:{ ru: 'Минерализация TDS (мг/л)', en: 'TDS (mg/L)' }, def: '500' },
{ id: 'T', label:{ ru: 'Температура воды (°C)', en: 'Water temperature (°C)' }, def: '25' },
],
calc(v) {
const pH=+v.pH, Ca=+v.Ca, Alk=+v.Alk, TDS=+v.TDS, T=+v.T;
if(!pH||!Ca||!Alk) return null;
const pCa = -Math.log10(Ca/100000);
const pAlk = -Math.log10(Alk/100000);

const C = 9.3 + 0.1*(T/10) - 0.05*Math.log10(TDS||1);
const pHs = pCa + pAlk + C;
const LSI = pH - pHs;
let interp, risk;
if(LSI < -2) { interp=[{ru:'Сильно агрессивная — высокая коррозия',en:'Highly corrosive — high corrosion'}[lang],'Highly aggressive — severe corrosion']; risk='high'; }
else if(LSI < -0.5) { interp=[{ru:'Умеренно агрессивная — коррозия',en:'Moderately corrosive'}[lang],'Moderately aggressive — corrosion']; risk='med'; }
else if(LSI < 0.5) { interp=[{ru:'Сбалансированная — норма',en:'Balanced — normal'}[lang],'Balanced — normal']; risk='ok'; }
else if(LSI < 2) { interp=[{ru:'Слабое осадкообразование CaCO₃',en:'Slight CaCO₃ scaling'}[lang],'Slight CaCO₃ scaling']; risk='med'; }
else { interp=[{ru:'Сильное осадкообразование — отложения',en:'Heavy scaling — deposits'}[lang],'Strong scaling — deposits']; risk='high'; }
let rec;
if(LSI < -0.5) rec=[{ru:'Рекомендуется: ингибитор коррозии',en:'Recommended: corrosion inhibitor'}[lang],'Recommended: corrosion inhibitor'];
else if(LSI > 0.5) rec=[{ru:'Рекомендуется: ингибитор осадкообразования',en:'Recommended: scale inhibitor'}[lang],'Recommended: scale inhibitor'];
else rec=[{ru:'Ингибирование не требуется',en:'Inhibition not required'}[lang],'No inhibitor required'];
return [
['pHs (расчётный)', pHs.toFixed(2)],
['pH (фактический)', pH.toFixed(2)],
[{ru:'Индекс Ланжелье LSI',en:'Langelier Saturation Index LSI'}[lang], LSI.toFixed(3)],
[{ru:'Характеристика воды',en:'Water characterization'}[lang], interp[lang]],
[{ru:'Рекомендация',en:'Recommendation'}[lang], rec[lang]],
];
}
},
