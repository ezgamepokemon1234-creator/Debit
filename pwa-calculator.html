<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="icon_1024x1024.png">
    <link rel="apple-touch-icon" href="icon_1024x1024.png">
    <title>ΛTΛ Enterprise OS</title>
    <style>
        :root { --gold: #d4af37; --bg: #05080a; --panel: #0d1117; --border: #30363d; --accent: #58a6ff; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Брендированный хедер с твоим лого */
        header { 
            background: #000; 
            border-bottom: 2px solid var(--gold); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .brand-container { display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--gold); }
        .logo-text { font-size: 1.5rem; letter-spacing: 5px; color: var(--gold); font-weight: 900; }
        
        .lang-switch { background: var(--panel); border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }

        .group-label { padding: 15px 15px 5px; font-size: 0.7rem; text-transform: uppercase; color: #666; letter-spacing: 2px; font-weight: bold; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px 15px; }
        .nav-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .nav-card:active { transform: scale(0.95); background: #161b22; }
        .nav-card i { display: block; font-size: 1.4rem; margin-bottom: 6px; color: var(--gold); }
        .nav-card span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }

        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--panel); border-radius: 15px; padding: 18px; border: 1px solid var(--border); margin-bottom: 12px; }
        h2 { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; margin: 0 0 15px 0; border-left: 3px solid var(--gold); padding-left: 10px; }
        
        label { display: block; font-size: 0.6rem; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; background: #010409; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 12px; }
        
        .btn-exe { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold), #b08d2b); border: none; border-radius: 10px; color: #000; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-back { width: 100%; padding: 12px; background: transparent; border: 1px solid #333; color: #555; border-radius: 10px; margin-top: 10px; cursor: pointer; }

        .res-zone { background: rgba(88, 166, 255, 0.05); border: 1px solid var(--accent); padding: 15px; border-radius: 10px; margin-top: 15px; text-align: center; }
        .res-val { display: block; font-size: 1.6rem; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<header>
    <div class="brand-container">
        <img src="icon_1024x1024.png" alt="ATA" class="brand-icon">
        <div class="logo-text">ΛTΛ</div>
    </div>
    <button class="lang-switch" onclick="toggleLang()" id="langBtn">EN</button>
</header>

<div id="dash" class="view active">
    <div class="group-label" data-key="g_elec">Электротехнический блок</div>
    <div class="nav-grid">
        <div class="nav-card" onclick="nav('v_su')"><i>⚡</i><span data-key="m_su">Станция СУ</span></div>
        <div class="nav-card" onclick="nav('v_cable')"><i>🔌</i><span data-key="m_cable">Кабель & ΔU</span></div>
    </div>

    <div class="group-label" data-key="g_prod">Добыча & Вывод на режим</div>
    <div class="nav-grid">
        <div class="nav-card" onclick="nav('v_time')"><i>⏱️</i><span data-key="m_time">Время подачи</span></div>
        <div class="nav-card" onclick="nav('v_vnr')"><i>📈</i><span data-key="m_vnr">Режим / QHP</span></div>
    </div>
    
    <div class="group-label" data-key="g_serv">Сервисные расчеты</div>
    <div class="nav-grid">
        <div class="nav-card" onclick="nav('v_pipe')"><i>📏</i><span data-key="m_pipe">Объемы / ЗКП</span></div>
        <div class="nav-card" onclick="nav('v_kill')"><i>🛡️</i><span data-key="m_kill">Глушение</span></div>
    </div>
</div>

<div id="v_time" class="view">
    <div class="card">
        <h2 data-key="h_time">Время подачи жидкости</h2>
        <label data-key="l_depth">Глубина спуска (м)</label>
        <input type="number" id="t_h" value="2500">
        <label data-key="l_q">Дебит (м³/сут)</label>
        <input type="number" id="t_q" value="50">
        <button class="btn-exe" onclick="calcTime()" data-key="b_calc">Рассчитать</button>
        <div class="res-zone">
            <span class="res-val" id="r_time">0.0</span>
            <span style="font-size:0.7rem" data-key="r_hours">Часов до устья</span>
        </div>
    </div>
    <button class="btn-back" onclick="home()" data-key="b_back">Назад</button>
</div>

<script>
    const i18n = {
        ru: {
            g_elec: "Электротехнический блок", g_prod: "Добыча & Вывод на режим", g_serv: "Сервисные расчеты",
            m_su: "Станция СУ", m_cable: "Кабель & ΔU", m_time: "Время подачи", m_vnr: "Режим / QHP",
            m_pipe: "Объемы / ЗКП", m_kill: "Глушение", h_time: "Время подачи жидкости",
            l_depth: "Глубина спуска (м)", l_q: "Дебит (м³/сут)", b_calc: "Рассчитать", b_back: "Назад",
            r_hours: "Часов до устья"
        },
        en: {
            g_elec: "Electrical Block", g_prod: "Production & Ramp-up", g_serv: "Service Calculations",
            m_su: "Control Station", m_cable: "Cable & ΔU", m_time: "Travel Time", m_vnr: "Mode / QHP",
            m_pipe: "Volumes / Annulus", m_kill: "Well Kill", h_time: "Fluid Travel Time",
            l_depth: "Pump Depth (m)", l_q: "Flow Rate (m³/day)", b_calc: "Calculate", b_back: "Back",
            r_hours: "Hours to Surface"
        }
    };

    let curLang = 'ru';

    function toggleLang() {
        curLang = curLang === 'ru' ? 'en' : 'ru';
        document.getElementById('langBtn').innerText = curLang === 'ru' ? 'EN' : 'RU';
        document.querySelectorAll('[data-key]').forEach(el => {
            el.innerText = i18n[curLang][el.getAttribute('data-key')];
        });
    }

    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function home() { nav('dash'); }

    function calcTime() {
        const h = parseFloat(document.getElementById('t_h').value);
        const q = parseFloat(document.getElementById('t_q').value);
        // Упрощенный расчет: объем НКТ 73мм ~ 3 л/м. 
        // Время (ч) = (Глубина * Объем_м) / (Дебит_сут / 24)
        const time = (h * 3.1) / (q * 1000 / 24);
        document.getElementById('r_time').innerText = time.toFixed(1);
    }
</script>
</body>
</html>
