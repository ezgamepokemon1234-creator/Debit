<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="icon_1024x1024.png">
    <link rel="apple-touch-icon" href="icon_1024x1024.png">
    <title>ΛTΛ Enterprise OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #05080a; --panel: #0d1117; --border: #30363d; --accent: #58a6ff; --text: #c9d1d9; --danger: #f85149; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand img { width: 35px; height: 35px; border-radius: 5px; border: 1px solid var(--gold); }
        .logo-text { font-size: 1.4rem; letter-spacing: 4px; color: var(--gold); font-weight: 900; }
        .h-btn { background: var(--panel); border: 1px solid var(--gold); color: var(--gold); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .group-label { padding: 15px 15px 5px; font-size: 0.65rem; text-transform: uppercase; color: #666; letter-spacing: 2px; font-weight: bold; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px 15px; }
        .nav-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 22px 10px; text-align: center; cursor: pointer; }
        .nav-card i { display: block; font-size: 1.6rem; margin-bottom: 8px; color: var(--gold); }
        .nav-card span { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--panel); border-radius: 15px; padding: 18px; border: 1px solid var(--border); margin-bottom: 12px; }
        h2 { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; margin: 0 0 15px 0; border-left: 3px solid var(--gold); padding-left: 10px; }
        label { display: block; font-size: 0.6rem; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; background: #010409; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        .btn-exe { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold), #b08d2b); border: none; border-radius: 10px; color: #000; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-back { width: 100%; padding: 12px; background: transparent; border: 1px solid #333; color: #555; border-radius: 10px; margin-top: 10px; cursor: pointer; text-align: center; }
        .res-zone { background: rgba(88, 166, 255, 0.05); border: 1px solid var(--accent); padding: 15px; border-radius: 10px; margin-top: 15px; text-align: center; }
        .res-val { display: block; font-size: 1.6rem; font-weight: 900; color: #fff; }
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #qrcode { background: #fff; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="brand"><img src="icon_1024x1024.png" alt="ΛTΛ"><div class="logo-text">ΛTΛ</div></div>
    <div class="header-btns">
        <button class="h-btn" onclick="showQR()">QR</button>
        <button class="h-btn" onclick="copyLink()" id="copyBtn">🔗</button>
        <button class="h-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </div>
</header>

<div id="dash" class="view active">
    <div class="group-label" data-key="g_elec">Электротехника & СУ</div>
    <div class="nav-grid">
        <div class="nav-card" onclick="nav('v_cable')"><i>🔌</i><span data-key="m_cable">Кабель & ΔU</span></div>
        <div class="nav-card" onclick="nav('v_su')"><i>⚡</i><span data-key="m_su">Станция СУ</span></div>
    </div>
    <div class="group-label" data-key="g_prod">Добыча & Скважина</div>
    <div class="nav-grid">
        <div class="nav-card" onclick="nav('v_vol')"><i>📏</i><span data-key="m_vol">Объемы НКТ</span></div>
        <div class="nav-card" onclick="nav('v_time')"><i>⏱️</i><span data-key="m_time">Время подачи</span></div>
    </div>
</div>

<div id="v_vol" class="view">
    <div class="card">
        <h2 data-key="h_vol">Расчет объема НКТ</h2>
        <label data-key="l_pipe_type">Тип трубы</label>
        <select id="p_type" onchange="updatePipeData()">
            <option value="60">НКТ 60 (вн. 50.3 мм)</option>
            <option value="73" selected>НКТ 73 (вн. 62.0 мм)</option>
            <option value="89">НКТ 89 (вн. 75.9 мм)</option>
        </select>
        <label data-key="l_h">Глубина (м)</label>
        <input type="number" id="p_h" value="2000">
        <button class="btn-exe" onclick="calcVol()" data-key="b_calc">Рассчитать</button>
        <div class="res-zone">
            <span class="res-val" id="r_vol">0.0 м³</span>
        </div>
    </div>
    <div class="btn-back" onclick="home()" data-key="b_back">Назад</div>
</div>

<div id="v_su" class="view">
    <div class="card">
        <h2 data-key="h_su">Параметры СУ и ПЭД</h2>
        <label data-key="l_i_fact">Ток факт. (А)</label><input type="number" id="s_i_f" value="45">
        <label data-key="l_i_nom">Ток номин. (А)</label><input type="number" id="s_i_n" value="50">
        <button class="btn-exe" onclick="calcLoad()" data-key="b_calc">Проверить загрузку</button>
        <div class="res-zone">
            <span class="res-val" id="r_load">0%</span>
            <span id="load_status" style="font-size:0.7rem; font-weight:bold;">---</span>
        </div>
    </div>
    <div class="btn-back" onclick="home()" data-key="b_back">Назад</div>
</div>

<div id="qr-modal" onclick="this.style.display='none'">
    <div id="qrcode"></div>
    <p style="color:var(--gold); margin-top:15px; font-size:0.8rem;">SCAN TO SHARE</p>
</div>

<script>
    const i18n = {
        ru: {
            g_elec: "Электротехника & СУ", g_prod: "Добыча & Скважина", m_cable: "Кабель & ΔU", m_su: "Станция СУ",
            m_vol: "Объемы НКТ", m_time: "Время подачи", h_vol: "Расчет объема НКТ", l_pipe_type: "Тип трубы",
            l_h: "Глубина (м)", b_calc: "Рассчитать", b_back: "Назад", h_su: "Параметры СУ и ПЭД",
            l_i_fact: "Ток факт. (А)", l_i_nom: "Ток номин. (А)"
        },
        en: {
            g_elec: "Electrical & Control", g_prod: "Production & Well", m_cable: "Cable & ΔU", m_su: "Control Station",
            m_vol: "Tubing Volume", m_time: "Travel Time", h_vol: "Tubing Volume Calc", l_pipe_type: "Pipe Standard",
            l_h: "Depth (m)", b_calc: "Calculate", b_back: "Back", h_su: "Motor Parameters",
            l_i_fact: "Actual Current (A)", l_i_nom: "Nominal Current (A)"
        }
    };

    let curLang = 'ru';
    function toggleLang() {
        curLang = (curLang === 'ru') ? 'en' : 'ru';
        document.getElementById('langBtn').innerText = curLang.toUpperCase();
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = i18n[curLang][el.getAttribute('data-key')]);
    }

    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function home() { nav('dash'); }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            document.getElementById('copyBtn').innerText = "OK";
            setTimeout(() => document.getElementById('copyBtn').innerText = "🔗", 2000);
        });
    }

    function showQR() {
        const m = document.getElementById('qr-modal');
        const q = document.getElementById('qrcode');
        q.innerHTML = "";
        new QRCode(q, { text: window.location.href, width: 180, height: 180 });
        m.style.display = "flex";
    }

    function calcVol() {
        const h = parseFloat(document.getElementById('p_h').value);
        const type = document.getElementById('p_type').value;
        let d = (type === "60") ? 0.0503 : (type === "73") ? 0.062 : 0.0759;
        let v = (Math.PI * Math.pow(d, 2) / 4) * h;
        document.getElementById('r_vol').innerText = v.toFixed(2) + " м³";
    }

    function calcLoad() {
        const f = parseFloat(document.getElementById('s_i_f').value);
        const n = parseFloat(document.getElementById('s_i_n').value);
        const load = (f / n) * 100;
        const res = document.getElementById('r_load');
        const stat = document.getElementById('load_status');
        res.innerText = load.toFixed(1) + "%";
        if(load > 100) { res.style.color = "var(--danger)"; stat.innerText = "OVERLOAD / ПЕРЕГРУЗ"; }
        else { res.style.color = "#fff"; stat.innerText = "NORMAL / НОРМА"; }
    }
</script>
</body>
</html>
