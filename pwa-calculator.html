<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ΛTΛ Oil Engineering</title>
    <style>
        :root {
            --neon-blue: #d4af37; /* Изменил на золотой под цвет иконки */
            --dark-bg: #0b111a;
            --card-bg: #161d27;
            --text-gray: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calc-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 90%;
            max-width: 420px;
            border: 1px solid #2a3441;
            position: relative;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .brand-logo {
            font-size: 2.8rem;
            font-weight: bold;
            letter-spacing: 10px;
            color: var(--neon-blue);
            margin-bottom: 5px;
        }

        .author-box {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-top: 1px solid #2a3441;
            padding-top: 10px;
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .full-width { grid-column: span 2; }
        
        label { font-size: 0.7rem; color: var(--text-gray); margin-bottom: 5px; display: block; }
        input {
            width: 100%;
            background: #0b111a;
            border: 1px solid #3d4755;
            padding: 12px;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #d4af37 0%, #a68a2d 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .results {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }

        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .res-val { color: var(--neon-blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="header">
        <div class="brand-logo">ΛTΛ</div>
        <div class="sub-title" style="color:var(--text-gray); font-size:0.8rem;">OIL & GAS CALCULATOR</div>
    </div>

    <div class="author-box">
        Created by: Anvarov Timur Akramovich
    </div>

    <div class="input-grid">
        <div class="input-group full-width">
            <label>Коэффициент продуктивности</label>
            <input type="number" id="k_prod" placeholder="10.5">
        </div>
        <div class="input-group">
            <label>P пластовое (МПа)</label>
            <input type="number" id="p_res" placeholder="20">
        </div>
        <div class="input-group">
            <label>P забойное (МПа)</label>
            <input type="number" id="p_well" placeholder="12">
        </div>
    </div>

    <button onclick="calculate()">Выполнить расчет</button>

    <div class="results">
        <div class="res-item"><span>Дебит жидкости:</span> <span id="q_liq" class="res-val">0.00</span></div>
    </div>
</div>

<script>
    function calculate() {
        const k = parseFloat(document.getElementById('k_prod').value);
        const pr = parseFloat(document.getElementById('p_res').value);
        const pw = parseFloat(document.getElementById('p_well').value);
        
        if (k && pr && pw) {
            const res = k * (pr - pw);
            document.getElementById('q_liq').innerText = res.toFixed(2) + " м³/сут";
        } else {
            alert("Заполните данные");
        }
    }

    // Регистрация PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
