<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Anvarov Timur Akramovich">
    <title>ATA ULTIMATE v20.0 | Anvarov T.A.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0b0e14; --panel: #161b22; --border: #30363d; --accent: #00e676; --blue: #2196F3; --max-red: #ff3b30; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding-bottom: env(safe-area-inset-bottom); overflow-x: hidden; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1rem; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
        .reg-panel { background: var(--panel); margin: 10px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .nav-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .nav-card:active { transform: scale(0.96); background: #1c2128; }
        .nav-card i { display: block; font-size: 1.6rem; margin-bottom: 6px; }
        .nav-card span { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: #8b949e; }
        .card { background: var(--panel); border-radius: 12px; padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        label { display: block; font-size: 0.6rem; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; background: #010409; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; font-size: 0.95rem; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-exe { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 5px; background: var(--gold); color: #000; font-size: 0.8rem; }
        .btn-share { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border); color: #fff; border-radius: 8px; margin-top: 8px; cursor: pointer; font-size: 0.7rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .res-zone { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; border: 1px dashed var(--gold); }
        .res-val { display: block; font-size: 2rem; font-weight: 900; color: #fff; }
        #qr_modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        #qrcode { background:#fff; padding:15px; border-radius:12px; border: 5px solid var(--gold); }
        footer { text-align: center; padding: 25px 10px; font-size: 0.6rem; color: #444; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <div class="logo">ATA ULTIMATE <span style="color:#fff">v20</span></div>
    <button style="background:none; border:1px solid var(--gold); color:var(--gold); padding:6px 12px; border-radius:6px; font-size:0.7rem; font-weight:bold" onclick="nav('dash')">ГЛАВНАЯ</button>
</header>

<div id="reg_block" class="reg-panel">
    <div class="reg-grid">
        <div><label>ЦДНГ</label><input type="text" id="reg_cdng" placeholder="ЦДНГ-2"></div>
        <div><label>БРИГАДА</label><input type="text" id="reg_br" placeholder="102"></div>
        <div><label>КУСТ</label><input type="text" id="reg_kp" placeholder="112А"></div>
        <div><label>СКВ №</label><input type="text" id="reg_skv" placeholder="1205"></div>
        <div style="grid-column: span 2;"><label>ОТЧЕТ НА E-MAIL</label><input type="text" id="reg_email" placeholder="disp@oil.ru"></div>
        <div style="grid-column: span 2;"><label>ДАТА ОБХОДА</label><input type="date" id="reg_date"></div>
    </div>
</div>

<div id="dash" class="view active">
    <div class="nav-grid">
        <div class="nav-card" onclick="sendToMax()" style="border-color: var(--max-red); background: rgba(255, 59, 48, 0.15);">
            <i style="color: var(--max-red); font-style: normal; font-weight: 900; font-size: 1.8rem;">MAX</i>
            <span style="color:#fff">В МЕССЕНДЖЕР</span>
        </div>
        <div class="nav-card" onclick="nav('v_tms')"><i style="color:var(--accent)">📟</i><span>ТМС / ЭЦН</span></div>
        <div class="nav-card" onclick="nav('v_load_pct')"><i style="color:#ff5722">📊</i><span>ЗАГРУЗКА %</span></div>
        <div class="nav-card" onclick="nav('v_pkv')"><i>⏱️</i><span>РЕЖИМ ПКВ</span></div>
    </div>
    <div style="padding: 10px;">
        <button class="btn-share" id="voice_btn" style="background: var(--gold); color: #000; border:none; width: 100%; height: 55px; border-radius: 12px; font-size: 0.8rem;" onclick="startVoice()">🎤 ВКЛЮЧИТЬ ГОЛОСОВОЙ ВВОД</button>
    </div>
    <footer>
        Разработка: Anvarov Timur Akramovich © 2026<br>
        Digital Oilfield Solutions v20.0
    </footer>
</div>

<div id="v_tms" class="view">
    <div class="card" style="border-top: 4px solid var(--accent)">
        <h2 style="color:var(--accent); font-size:0.9rem; margin-top:0;">МОНИТОРИНГ ТМС</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div style="grid-column: span 2; background: rgba(0, 230, 118, 0.05); padding: 8px; border-radius: 8px; border: 1px solid #1e2e26;">
                <label style="color:var(--accent);">Q замер (м³/сут)</label>
                <input type="text" id="tms_q">
            </div>
            <div><label>Pпр (атм)</label><input type="text" id="tms_ppr"></div>
            <div><label>F (Hz)</label><input type="text" id="tms_hz"></div>
            <div><label>I (А)</label><input type="text" id="tms_i"></div>
            <div><label>ЭТП (А)</label><input type="text" id="tms_etp"></div>
            <div><label>R изол. (МОм)</label><input type="text" id="tms_riz"></div>
            <div><label>t дв (°C)</label><input type="text" id="tms_tdv"></div>
            <div><label>Рб (атм)</label><input type="text" id="tms_rb"></div>
            <div><label>Рл (атм)</label><input type="text" id="tms_rl"></div>
        </div>
        <button class="btn-share" style="border-color: var(--max-red); color: var(--max-red); font-weight: 900;" onclick="sendToMax()">💬 ОТПРАВИТЬ В MAX</button>
        <button class="btn-share" style="border-color: var(--accent); color: var(--accent);" onclick="generateQR()">🏁 СОЗДАТЬ QR-КОД</button>
        <button class="btn-share" onclick="shareData()">📲 ТЕЛЕГРАМ / WA</button>
    </div>
    <button class="btn-exe" style="background:#333; color:#ccc" onclick="nav('dash')">НАЗАД В МЕНЮ</button>
</div>

<div id="v_load_pct" class="view">
    <div class="card" style="border-top: 4px solid #ff5722">
        <h2 style="color:#ff5722; font-size:0.9rem; margin-top:0;">РАСЧЕТ ЗАГРУЗКИ</h2>
        <label>Рабочий ток (А)</label><input type="text" id="load_i_work">
        <label>ЭТП / Номинал (А)</label><input type="text" id="load_i_etp">
        <button class="btn-exe" style="background:#ff5722; color:#fff" onclick="calcLoad()">РАССЧИТАТЬ %</button>
        <div class="res-zone">
            <span class="res-val" id="res_load_val">0.0</span>%
        </div>
        <button class="btn-share" style="border-color: var(--max-red); color: var(--max-red); margin-top: 15px;" onclick="sendToMax()">💬 ОТПРАВИТЬ В MAX</button>
    </div>
    <button class="btn-exe" style="background:#333; color:#ccc" onclick="nav('dash')">НАЗАД В МЕНЮ</button>
</div>

<div id="qr_modal">
    <div id="qrcode"></div>
    <p style="color:#fff; margin-top:20px; font-weight:bold; letter-spacing:1px">ПЕРЕДАЧА ЗАМЕРА</p>
    <button onclick="document.getElementById('qr_modal').style.display='none'" class="btn-exe" style="width:200px">ЗАКРЫТЬ</button>
</div>

<script>
    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function calcLoad() {
        const iWork = parseFloat(document.getElementById('load_i_work').value.replace(',','.'));
        const iEtp = parseFloat(document.getElementById('load_i_etp').value.replace(',','.'));
        if(iEtp > 0) {
            const res = (iWork / iEtp) * 100;
            document.getElementById('res_load_val').innerText = res.toFixed(1);
        }
    }

    function getHead() {
        return `🏢 ${document.getElementById('reg_cdng').value} | Бр №${document.getElementById('reg_br').value}\n📍 КП-${document.getElementById('reg_kp').value} | СКВ: ${document.getElementById('reg_skv').value}\n📅 Дата: ${document.getElementById('reg_date').value}\n`;
    }

    function sendToMax() {
        let text = "📊 ОТЧЕТ [ATA ULTIMATE]\nАвтор: Anvarov T.A.\n" + getHead() + "------------------\n";
        const activeView = document.querySelector('.view.active');
        const source = (activeView.id === 'dash' || activeView.id === 'v_tms') ? document.getElementById('v_tms') : activeView;
        
        source.querySelectorAll('label').forEach((l, i) => {
            const input = source.querySelectorAll('input')[i];
            if(input && input.value && input.id !== 'reg_email') text += `${l.innerText}: ${input.value}\n`;
        });
        
        if(activeView.id === 'v_load_pct') text += `✅ ЗАГРУЗКА: ${document.getElementById('res_load_val').innerText}%\n`;

        if (navigator.share) {
            navigator.share({ title: 'Отчет MAX', text: text }).catch(() => {
                navigator.clipboard.writeText(text); alert("Отчет скопирован!");
            });
        } else {
            navigator.clipboard.writeText(text); alert("Скопировано для MAX!");
        }
    }

    function generateQR() {
        const data = {};
        document.querySelectorAll('input').forEach(input => { if(input.value) data[input.id] = input.value; });
        const encodedData = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        const shareUrl = window.location.origin + window.location.pathname + "?report=" + encodedData;
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: shareUrl, width: 250, height: 250 });
        document.getElementById('qr_modal').style.display = 'flex';
    }

    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechRecognition) return alert("Голос не поддерживается");
        const rec = new SpeechRecognition();
        rec.lang = 'ru-RU'; rec.continuous = true;
        rec.onstart = () => { document.getElementById('voice_btn').innerText = "🔴 СЛУШАЮ ВАС..."; };
        rec.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                const text = e.results[i][0].transcript.toLowerCase();
                if(text.includes("отправь в макс")) { sendToMax(); return; }
                const val = text.match(/\d+[.,]?\d*/);
                if (val) {
                    const num = val[0].replace(',', '.');
                    if (text.includes("дебит")) document.getElementById('tms_q').value = num;
                    else if (text.includes("прием")) document.getElementById('tms_ppr').value = num;
                    else if (text.includes("рабочий")) { document.getElementById('load_i_work').value = num; calcLoad(); }
                    else if (text.includes("номинал") || text.includes("этп")) { 
                        document.getElementById('load_i_etp').value = num; document.getElementById('tms_etp').value = num; calcLoad();
                    }
                    else if (text.includes("частота")) document.getElementById('tms_hz').value = num;
                    else if (text.includes("ток")) document.getElementById('tms_i').value = num;
                    else if (text.includes("изоляция")) document.getElementById('tms_riz').value = num;
                    else if (text.includes("температура")) document.getElementById('tms_tdv').value = num;
                }
            }
        };
        rec.start();
    }

    window.onload = () => {
        document.getElementById('reg_date').valueAsDate = new Date();
        const params = new URLSearchParams(window.location.search);
        const report = params.get('report');
        if(report) {
            const data = JSON.parse(decodeURIComponent(escape(atob(report))));
            for(let id in data) if(document.getElementById(id)) document.getElementById(id).value = data[id];
            nav('v_tms');
        }
        document.querySelectorAll('input').forEach(el => {
            el.value = localStorage.getItem('ata_' + el.id) || el.value;
            el.oninput = () => localStorage.setItem('ata_' + el.id, el.value);
        });
    };
</script>
</body>
</html>
