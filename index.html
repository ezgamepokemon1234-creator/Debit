<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Anvarov Timur Akramovich">
    <title>ATA-1 PRO LIGHT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --ai: #00ff9d; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        header { border-bottom: 2px solid var(--gold); padding: 15px; text-align: center; background: #000; }
        .view { display: none; padding: 15px; }
        .view.active { display: block !important; }
        .card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: var(--ai); font-size: 1rem; box-sizing: border-box; margin-bottom: 10px; }
        label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 4px; }
        .btn-main { width: 100%; background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 5px; }
        .mic-box { text-align: center; padding: 10px; border: 1px dashed var(--ai); border-radius: 15px; margin-bottom: 15px; }
        #qrcode { background: #fff; padding: 10px; display: inline-block; border-radius: 5px; }
        .footer { text-align: center; font-size: 0.65rem; color: #444; padding: 20px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: var(--gold);">ATA-1 PRO v61.0</div>
    <div style="font-size: 0.6rem;">ANVAROV TIMUR AKRAMOVICH</div>
</header>

<div id="dash" class="view active">
    <div class="mic-box" onclick="runAI()">
        <div id="ai_status" style="color: var(--ai); font-size: 0.8rem; margin-bottom: 5px;">ГОЛОСОВОЙ ПОМОЩНИК</div>
        <span style="font-size: 1.5rem;">🎙</span>
    </div>
    
    <div class="card">
        <label>РАДИО</label>
        <select id="radio-sel" onchange="changeRadio()">
            <option value="">-- ВЫКЛ --</option>
            <option value="https://dorognoe.hostingradio.ru:8000/radio">Дорожное</option>
            <option value="https://recordrussia.hostingradio.ru:8032/rock90128">Рекорд ROCK</option>
        </select>
        <audio id="player" controls style="width:100%; height:30px;"></audio>
    </div>

    <div class="grid">
        <button class="btn-main" style="background:#222; color:#fff" onclick="nav('params')">ПАРАМЕТРЫ</button>
        <button class="btn-main" onclick="makeReport()">ОТЧЕТ (QR)</button>
    </div>
</div>

<div id="params" class="view">
    <div class="card">
        <div class="grid">
            <div><label>КУСТ</label><input type="text" id="kust"></div>
            <div><label>СКВ</label><input type="text" id="skv"></div>
        </div>
        <label>ТОК (А)</label><input type="number" id="tok">
        <label>ПРИЕМ (АТМ)</label><input type="number" id="ppr">
        <button class="btn-main" onclick="nav('dash')">НАЗАД</button>
    </div>
</div>

<div id="report" class="view" style="text-align: center;">
    <div class="card">
        <div id="qrcode"></div>
        <pre id="rep_txt" style="text-align:left; font-size:0.7rem; margin-top:10px; color:var(--ai)"></pre>
        <button class="btn-main" onclick="nav('dash')">В МЕНЮ</button>
    </div>
</div>

<div class="footer">ANVAROV T.A. | INTELLIGENT SOLUTIONS</div>

<script>
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ru-RU';

    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function changeRadio() {
        const p = document.getElementById('player');
        p.src = document.getElementById('radio-sel').value;
        if(p.src) p.play();
    }

    function runAI() {
        try { recognition.start(); document.getElementById('ai_status').innerText = "СЛУШАЮ..."; } catch(e) {}
    }

    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript.toLowerCase();
        const n = text.match(/\d+/g);
        if(n) {
            if(text.includes("ток")) document.getElementById('tok').value = n[0];
            if(text.includes("куст")) document.getElementById('kust').value = n[0];
        }
        document.getElementById('ai_status').innerText = "ОК: " + text;
    };

    recognition.onend = () => { document.getElementById('ai_status').innerText = "ГОЛОСОВОЙ ПОМОЩНИК"; };

    function makeReport() {
        const d = `ATA-1|ANVAROV\nKP:${document.getElementById('kust').value}\nSKV:${document.getElementById('skv').value}\nI:${document.getElementById('tok').value}\nP:${document.getElementById('ppr').value}`;
        document.getElementById('rep_txt').innerText = d;
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: d, width: 150, height: 150 });
        nav('report');
    }
</script>
</body>
</html>
