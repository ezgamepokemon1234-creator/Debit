<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Anvarov Timur Akramovich">
    <title>ATA-1 PRO | ANVAROV T.A.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000000; --card: #111111; --ai: #00ff9d; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { border-bottom: 2px solid var(--gold); padding: 15px; text-align: center; background: #000; position: sticky; top: 0; z-index: 100; }
        .ai-core { width: 90px; height: 90px; border: 4px solid var(--ai); border-radius: 50%; margin: 15px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; box-shadow: 0 0 20px rgba(0,255,157,0.3); transition: 0.3s; }
        .ai-core.listening { background: #ff3b30; border-color: #fff; box-shadow: 0 0 40px #ff3b30; }
        .view { display: none; padding: 15px; }
        .view.active { display: block !important; }
        .card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; background: #050505; border: 1px solid #333; padding: 14px; border-radius: 10px; color: var(--ai); font-size: 1.1rem; box-sizing: border-box; margin-bottom: 10px; }
        label { font-size: 0.65rem; color: #777; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        .btn-gold { width: 100%; background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        #qrcode { background: #fff; padding: 15px; display: inline-block; border-radius: 10px; margin: 15px 0; }
        audio { width: 100%; height: 35px; filter: invert(1) hue-rotate(180deg); margin-top: 5px; }
        .footer { text-align: center; font-size: 0.7rem; color: #444; margin: 20px 0; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; color: var(--gold); letter-spacing: 2px;">ATA-1 PRO</div>
    <div style="font-size: 0.6rem; color: #888;">DEVELOPED BY ANVAROV TIMUR AKRAMOVICH</div>
</header>

<div id="dash" class="view active">
    <div class="card" style="border-color: var(--ai); text-align: center;">
        <div id="ai_status" style="font-size: 0.8rem; color: var(--ai); margin-bottom: 5px; font-weight: bold;">СИСТЕМА АКТИВНА</div>
        <div class="ai-core" id="aiBtn" onclick="runAI()"><span style="font-size: 2rem;">🎙</span></div>
        <div id="speech_log" style="font-style: italic; font-size: 0.7rem; color: #666; margin-bottom: 10px;">"Слушаю вас..."</div>
        
        <div style="border-top: 1px solid #222; padding-top: 10px;">
            <label>РАДИОСТАНЦИЯ</label>
            <select id="station-select" onchange="changeStation()">
                <option value="https://dorognoe.hostingradio.ru:8000/radio">Дорожное Радио</option>
                <option value="https://recordrussia.hostingradio.ru:8032/rock90128">Рекорд ROCK</option>
                <option value="https://pub0302.global.audio/sa_msk">Авторадио</option>
                <option value="https://ep128.hostingradio.ru:8030/ep128">Европа Плюс</option>
            </select>
            <audio id="main-audio" controls></audio>
        </div>
    </div>

    <div class="grid-2">
        <div class="card" onclick="nav('params')">📟 ПАРАМЕТРЫ</div>
        <div class="card" onclick="nav('debit')">📊 ДЕБИТ</div>
        <div class="card" onclick="makeReport()" style="grid-column: span 2; border-color: var(--gold); color: var(--gold); text-align: center; font-weight: bold;">🏁 СФОРМИРОВАТЬ QR-ОТЧЕТ</div>
    </div>
</div>

<div id="params" class="view">
    <div class="card">
        <h3 style="color:var(--gold); margin-top:0;">ВВОД ДАННЫХ</h3>
        <div class="grid-2">
            <div><label>КУСТ</label><input type="text" id="kust" placeholder="№"></div>
            <div><label>СКВ</label><input type="text" id="skv" placeholder="№"></div>
        </div>
        <label>ТОК (А)</label><input type="number" id="tok">
        <label>ДАВЛЕНИЕ ПРИЕМ (АТМ)</label><input type="number" id="ppr">
        <label>ДИНАМИЧЕСКИЙ УРОВЕНЬ (М)</label><input type="number" id="nd">
        <button class="btn-gold" onclick="nav('dash')">В МЕНЮ</button>
    </div>
</div>

<div id="report" class="view" style="text-align: center;">
    <div class="card">
        <h3 style="color:var(--ai);">QR-КОД ГОТОВ</h3>
        <div id="qrcode"></div>
        <div id="report_text" style="font-family: monospace; font-size: 0.8rem; text-align: left; background: #000; padding: 10px; border: 1px solid #333;"></div>
        <button class="btn-gold" style="margin-top: 15px;" onclick="nav('dash')">НАЗАД</button>
    </div>
</div>

<div class="footer">ANVAROV TIMUR AKRAMOVICH — 2026<br>INTELLIGENT OILFIELD SOLUTIONS</div>

<script>
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ru-RU';
    
    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'ru-RU';
        window.speechSynthesis.speak(m);
        document.getElementById('ai_status').innerText = t;
    }

    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function changeStation() {
        const player = document.getElementById('main-audio');
        const selector = document.getElementById('station-select');
        player.src = selector.value;
        player.play();
        speak("Включаю радио, Тимур Акрамович");
    }

    function runAI() {
        recognition.start();
        document.getElementById('aiBtn').classList.add('listening');
    }

    recognition.onresult = (e) => {
        const cmd = e.results[0][0].transcript.toLowerCase();
        document.getElementById('speech_log').innerText = `"${cmd}"`;
        const n = cmd.match(/\d+/g);

        // Команды радио
        if(cmd.includes("включи рок")) { 
            document.getElementById('station-select').value = "https://recordrussia.hostingradio.ru:8032/rock90128"; 
            changeStation(); 
        }
        else if(cmd.includes("включи дорогу")) { 
            document.getElementById('station-select').value = "https://dorognoe.hostingradio.ru:8000/radio"; 
            changeStation(); 
        }
        // Навигация и ввод
        else if (cmd.includes("отчет")) { makeReport(); speak("Ваш QR-код готов"); }
        else if (cmd.includes("параметр")) { nav('params'); speak("Открыла параметры"); }
        else if (n) {
            if (cmd.includes("куст")) { document.getElementById('kust').value = n[0]; speak("Куст " + n[0]); }
            else if (cmd.includes("скважин")) { document.getElementById('skv').value = n[0]; speak("Скважина " + n[0]); }
            else if (cmd.includes("ток")) { document.getElementById('tok').value = n[0]; speak("Ток " + n[0]); }
            else if (cmd.includes("прием")) { document.getElementById('ppr').value = n[0]; speak("Прием " + n[0]); }
        } else {
            speak("Повторите, я не расслышала");
        }
    };

    recognition.onend = () => document.getElementById('aiBtn').classList.remove('listening');

    function makeReport() {
        const data = `ANVAROV T.A. REPORT\nKP: ${document.getElementById('kust').value}\nSKV: ${document.getElementById('skv').value}\nI: ${document.getElementById('tok').value}A\nPpr: ${document.getElementById('ppr').value}atm\nNd: ${document.getElementById('nd').value}m`;
        
        document.getElementById('report_text').innerText = data;
        document.getElementById("qrcode").innerHTML = "";
        
        new QRCode(document.getElementById("qrcode"), {
            text: data,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
        
        nav('report');
    }

    window.onload = () => {
        document.querySelectorAll('input').forEach(el => {
            el.value = localStorage.getItem('ata_' + el.id) || el.value;
            el.oninput = () => localStorage.setItem('ata_' + el.id, el.value);
        });
    };
</script>
</body>
</html>
