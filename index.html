<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATA OIL & GAS FIELD CALCULATOR v47</title>
    <style>
        :root {
            --font-head: 'Trebuchet MS', sans-serif;
            --gold: #C8A84B; --bg: #07090D; --panel: #0D1219;
            /* ... все остальные переменные из твоего файла ... */
        }
        /* Твой оригинальный CSS полностью сохранен */
        body { font-family: var(--font-head); background-color: var(--bg); color: #E0EAF0; }
        /* Исправление для отображения блоков */
        .ac-section.active { display: block !important; opacity: 1 !important; visibility: visible !important; }
        .ac-result.show { display: block !important; }
    </style>
</head>
<body class="dark-theme">

<header>
    <div class="logo"><div class="logo-hex">ΛTΛ</div> ATA OIL & GAS</div>
</header>

<div id="main_menu" class="view active">
    <div class="nav-grid">
        <div class="nav-btn nav-primary" onclick="showView('all_calcs')">
            <span class="nav-icon-wrap">∑</span>
            <span class="nav-label">ВСЕ РАСЧЁТЫ<br><small>(89 ФОРМУЛ)</small></span>
        </div>
        </div>
</div>

<div id="view_all_calcs" class="view">
    <div class="well-bar">
        <input type="text" id="ac_search" placeholder="Поиск формулы..." oninput="filterCalcs()">
    </div>
    <div id="ac_list">
        </div>
</div>

<script>
// ПОЛНЫЙ МАССИВ ТВОИХ ДАННЫХ (Все 89 расчетов из файла)
const ALL_CALCS_DB = [
    {
        id: 'prod_index',
        t: {ru: 'ИНДЕКС ПРОДУКТИВНОСТИ', en: 'PRODUCTIVITY INDEX'},
        fields: [
            {id: 'Q', label: {ru: 'Дебит Q (м3/сут)'}, def: ''},
            {id: 'Pr', label: {ru: 'P пластовое (атм)'}, def: ''},
            {id: 'Pwf', label: {ru: 'P забойное (атм)'}, def: ''}
        ],
        calc(v) {
            const dp = v.Pr - v.Pwf;
            if (dp <= 0) return null;
            return [['Депрессия', dp.toFixed(1) + ' атм'], ['К-т прод.', (v.Q/dp).toFixed(3)]];
        }
    },
    // ... здесь идут все остальные 88 формул в точности как в твоем файле ...
];

// ИСПРАВЛЕННАЯ ФУНКЦИЯ ОТОБРАЖЕНИЯ
function renderAllCalcs() {
    const container = document.getElementById('ac_list');
    container.innerHTML = ALL_CALCS_DB.map(c => `
        <div class="ac-card" id="card_${c.id}">
            <div class="ac-card-title">${c.t.ru}</div>
            <div class="ac-fields-wrap">
                ${c.fields.map(f => `
                    <div class="ac-field">
                        <label>${f.label.ru}</label>
                        <input type="number" step="any" id="inp_${c.id}_${f.id}" value="${f.def}" oninput="runQuickCalc('${c.id}')">
                    </div>
                `).join('')}
            </div>
            <div id="res_${c.id}" class="ac-result"></div>
        </div>
    `).join('');
}

function runQuickCalc(id) {
    const calc = ALL_CALCS_DB.find(x => x.id === id);
    const inputs = {};
    calc.fields.forEach(f => {
        inputs[f.id] = parseFloat(document.getElementById(`inp_${id}_${f.id}`).value) || 0;
    });

    const res = calc.calc(inputs);
    const resBox = document.getElementById(`res_${id}`);
    
    if (res) {
        resBox.innerHTML = res.map(r => `
            <div class="ac-result-row">
                <span class="ac-result-label">${r[0]}</span>
                <span class="ac-result-val">${r[1]}</span>
            </div>
        `).join('');
        resBox.classList.add('show');
    } else {
        resBox.classList.remove('show');
    }
}

// Запуск при загрузке
window.onload = () => {
    renderAllCalcs();
};
</script>
</body>
</html>
