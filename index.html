<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Anvarov Timur Akramovich">
    <title>ATA AI v47.0 | ANVAROV T.A.</title>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0b0e14; --panel: #1c2128; --border: #444c56; --text: #adbac7; --ai: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 0.8rem; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .view.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .ai-status { color: var(--ai); font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .ai-pulse { width: 8px; height: 8px; background: var(--ai); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        .voice-btn { background: #161b22; border: 2px solid var(--ai); color: #fff; width: 100%; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0,230,118,0.1); }
        .voice-btn.active { background: var(--ai); color: #000; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; font-size: 1.1rem; margin-bottom: 12px; box-sizing: border-box; }
        label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; font-weight: bold; margin-left: 5px; }
        .btn-exe { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 900; background: var(--gold); color: #000; text-transform: uppercase; cursor: pointer; }
        footer { text-align: center; padding: 20px; font-size: 0.65rem; color: #444; }
    </style>
</head>
<body>

<header>
    <div class="logo">ATA AI ASSISTANT | BY ANVAROV T.A.</div>
</header>

<div id="dash" class="view active">
    <div class="card" style="border-color: var(--ai);">
        <div class="ai-status"><div class="ai-pulse"></div> ИИ-АССИСТЕНТ ГОТОВ</div>
        <button class="voice-btn" id="aiMic" onclick="runAI()">🎤 НАЖМИТЕ И ГОВОРИТЕ</button>
        <p style="font-size: 0.7rem; text-align: center; color: #555;">Пример: "На кусту 12 скважина 5 ток 18 ампер"</p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="card" onclick="nav('v_params')">📟 ТМС</div>
        <div class="card" onclick="nav('v_debit')">📊 ДЕБИТ</div>
        <div class="card" style="grid-column: span 2; border-color: var(--gold); text-align: center;" onclick="createReport()">🏁 СФОРМИРОВАТЬ ОТЧЕТ</div>
    </div>
</div>

<div id="v_params" class="view">
    <div class="card">
        <h3 style="color: var(--gold); margin-top: 0;">ПАРАМЕТРЫ</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>КУСТ</label><input type="text" id="p_kp"></div>
            <div><label>СКВ</label><input type="text" id="p_skv"></div>
            <div><label>Нд (м)</label><input type="number" id="p_nd"></div>
            <div><label>Рпр (атм)</label><input type="number" id="p_ppr"></div>
            <div><label>Ток (А)</label><input type="number" id="p_i"></div>
            <div><label>Частота</label><input type="number" id="p_f"></div>
            <div><label>Буфер</label><input type="number" id="p_rz"></div>
            <div><label>Затруб</label><input type="number" id="p_rb"></div>
        </div>
        <button class="btn-exe" onclick="nav('dash')">ВЕРНУТЬСЯ</button>
    </div>
</div>

<footer>
    DEVELOPER: ANVAROV TIMUR AKRAMOVICH © 2026
</footer>

<script>
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ru-RU';
    recognition.continuous = false;

    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        window.speechSynthesis.speak(msg);
    }

    function runAI() {
        recognition.start();
        document.getElementById('aiMic').classList.add('active');
        document.getElementById('aiMic').innerText = "🔴 ИИ СЛУШАЕТ...";
    }

    recognition.onresult = (event) => {
        const speech = event.results[0][0].transcript.toLowerCase();
        console.log("AI Heard:", speech);
        
        // 🧠 ГЛОБАЛЬНЫЙ ИИ-АНАЛИЗАТОР
        let processed = false;
        const nums = speech.match(/\d+/g); // Находим все цифры в предложении

        if (speech.includes("куст") && nums) {
            document.getElementById('p_kp').value = nums[0];
            speak("Поняла, куст " + nums[0]);
            processed = true;
        }
        
        if (speech.includes("скважина") && nums) {
            const skv = nums.length > 1 ? nums[1] : nums[0];
            document.getElementById('p_skv').value = skv;
            speak("Скважина " + skv);
            processed = true;
        }

        if (speech.includes("ток") && nums) {
            const val = nums[nums.length-1];
            document.getElementById('p_i').value = val;
            if(val > 60) speak("Предупреждение: высокий ток " + val);
            else speak("Ток " + val + " ампер");
            processed = true;
        }

        if (speech.includes("прием") && nums) {
            const val = nums[nums.length-1];
            document.getElementById('p_ppr').value = val;
            if(val < 10) speak("Внимание! Низкое давление на приеме!");
            else speak("Прием " + val + " атмосфер");
            processed = true;
        }

        if (speech.includes("отчет")) {
            createReport();
            speak("Отчет готов, Тимур Акрамович");
            processed = true;
        }

        if (!processed) speak("Я услышала: " + speech + ". Повторите команду точнее.");
    };

    recognition.onend = () => {
        document.getElementById('aiMic').classList.remove('active');
        document.getElementById('aiMic').innerText = "🎤 НАЖМИТЕ И ГОВОРИТЕ";
    };

    function createReport() {
        let out = `REPORT BY ANVAROV T.A.\n📍 КП-${document.getElementById('p_kp').value} СКВ-${document.getElementById('p_skv').value}\n`;
        const ids = [['Нд','p_nd'],['Рпр','p_ppr'],['Ток','p_i'],['F','p_f']];
        ids.forEach(i => {
            let v = document.getElementById(i[1]).value;
            if(v) out += `${i[0]}: ${v}\n`;
        });
        
        alert(out);
        nav('dash');
    }

    window.onload = () => {
        document.querySelectorAll('input').forEach(el => {
            el.value = localStorage.getItem('ai_' + el.id) || el.value;
            el.oninput = () => localStorage.setItem('ai_' + el.id, el.value);
        });
    };
</script>
</body>
</html>
