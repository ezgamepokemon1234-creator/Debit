<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Anvarov Timur Akramovich">
    <title>ATA v43.0 | ULTIMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0b0e14; --panel: #1c2128; --border: #444c56; --text: #adbac7; --max-red: #ff3b30; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 40px; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1rem; font-weight: bold; color: var(--gold); }
        .view { display: none; padding: 15px; }
        .view.active { display: block !important; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 12px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .nav-btn { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px 5px; color: #fff; text-align: center; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); margin-bottom: 15px; padding-bottom: 5px; }
        h3 { margin: 0; font-size: 0.9rem; color: #fff; text-transform: uppercase; }
        .vnr-btn { background: #22272e; border: 1px solid var(--border); color: var(--text); padding: 5px 15px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .vnr-btn.active { background: var(--gold); color: #000; border-color: #fff; }
        label { display: block; font-size: 0.65rem; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; background: #010409; border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: #fff; margin-bottom: 10px; font-size: 1rem; box-sizing: border-box; }
        .btn-exe { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: 900; background: var(--gold); color: #000; text-transform: uppercase; }
        .res-box { background: #000; border: 1px solid var(--gold); padding: 15px; border-radius: 4px; text-align: center; margin: 10px 0; }
        #qr-out { background: #fff; padding: 10px; display: inline-block; border-radius: 4px; margin: 15px 0; }
        .voice-btn { background: #1e2e26; border: 1px solid #00e676; color: #00e676; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">ATA v43.0 <span style="color:#fff">ULTIMATE</span></div>
    <button style="background:var(--gold); border:none; padding:8px 12px; border-radius:4px; font-weight:bold" onclick="nav('dash')">МЕНЮ</button>
</header>

<div class="card" style="margin: 10px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div><label>ЦДНГ</label><input type="text" id="reg_cdng" placeholder="№"></div>
        <div><label>БРИГАДА</label><input type="text" id="reg_br" placeholder="№"></div>
        <div><label>КУСТ</label><input type="text" id="reg_kp" placeholder="№"></div>
        <div><label>СКВАЖИНА</label><input type="text" id="reg_skv" placeholder="№"></div>
        <div style="grid-column: span 2;"><label>ДАТА ОБХОДА</label><input type="date" id="reg_date"></div>
    </div>
</div>

<div id="dash" class="view active">
    <button class="voice-btn" id="voice_btn" onclick="startVoice()">🎤 ВКЛЮЧИТЬ ГОЛОСОВОЙ ВВОД</button>
    <div class="nav-grid">
        <div class="nav-btn" onclick="nav('v_params')">ПАРАМЕТРЫ</div>
        <div class="nav-btn" onclick="nav('v_debit')">ДЕБИТ (Л/ЦИКЛ)</div>
        <div class="nav-btn" onclick="nav('v_load')">ЗАГРУЗКА %</div>
        <div class="nav-btn" onclick="nav('v_glush')">ГЛУШЕНИЕ</div>
        <div class="nav-btn" onclick="nav('v_tech')">ГРП / КОЙЛ</div>
        <div class="nav-btn" onclick="createReport()" style="background:var(--gold); color:#000;">ОТЧЕТ</div>
    </div>
</div>

<div id="v_params" class="view">
    <div class="card">
        <div class="header-row"><h3>ТМС / ЭЦН</h3><div id="btnVNR" class="vnr-btn" onclick="this.classList.toggle('active')">ВНР</div></div>
        <label>Время замера</label><input type="time" id="p_time">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div><label>Нд (м)</label><input type="number" id="p_nd"></div>
            <div><label>Рз (атм)</label><input type="number" id="p_rz"></div>
            <div><label>Рб (атм)</label><input type="number" id="p_rb"></div>
            <div><label>Рл (атм)</label><input type="number" id="p_rl"></div>
            <div><label>F (Гц)</label><input type="number" id="p_f"></div>
            <div><label>I (А)</label><input type="number" id="p_i" oninput="syncI()"></div>
            <div><label>З (%)</label><input type="number" id="p_z"></div>
            <div><label>Рпр (атм)</label><input type="number" id="p_ppr"></div>
            <div><label>Тдв (°C)</label><input type="number" id="p_tdv"></div>
            <div><label>Нст затр (м)</label><input type="number" id="p_nstz"></div>
            <div style="grid-column: span 2;"><label>Нст нкт (м)</label><input type="number" id="p_nstn"></div>
        </div>
        <label>Проба (%) Н2О</label><input type="number" id="p_h2o">
        <button class="btn-exe" onclick="createReport()">ГОТОВО</button>
    </div>
</div>

<div id="v_load" class="view">
    <div class="card">
        <h3>РАСЧЕТ ЗАГРУЗКИ</h3>
        <label>Рабочий ток (А)</label><input type="number" id="load_i_work">
        <label>ЭТП / Номинал (А)</label><input type="number" id="load_i_etp">
        <button class="btn-exe" onclick="calcLoad()">РАССЧИТАТЬ</button>
        <div class="res-box">Загрузка: <br><span id="res_load" style="font-size:2rem; font-weight:bold;">0.0</span> %</div>
    </div>
</div>

<div id="v_glush" class="view">
    <div class="card">
        <h3>ГЛУШЕНИЕ</h3>
        <label>P пласт. (атм)</label><input type="number" id="g_ppl">
        <label>H верт. (м)</label><input type="number" id="g_h">
        <button class="btn-exe" onclick="doGlush()">РАСЧЕТ</button>
        <div class="res-box">Плотность: <br><span id="res_g" style="font-size:2rem; font-weight:bold;">0.00</span></div>
    </div>
</div>

<div id="v_tech" class="view">
    <div class="card">
        <h3>ОБЪЕМЫ ГРП/КОЙЛ</h3>
        <label>Глубина (м)</label><input type="number" id="t_h">
        <label>Ø Э/К (мм)</label><input type="number" id="t_ek" value="168">
        <label>Ø НКТ (мм)</label><input type="number" id="t_nkt" value="73">
        <button class="btn-exe" onclick="doTech()">РАСЧЕТ</button>
        <div class="res-box" style="font-size:0.9rem;">
            V нкт: <span id="res_t1">0.0</span> м³ | V затр: <span id="res_t2">0.0</span> м³
        </div>
    </div>
</div>

<div id="v_debit" class="view">
    <div class="card">
        <h3>ЗАМЕР ДЕБИТА</h3>
        <label>Слив за цикл (Литры)</label><input type="number" id="q_liters">
        <label>Работа (мин)</label><input type="number" id="q_work">
        <label>Пауза (мин)</label><input type="number" id="q_stop">
        <button class="btn-exe" onclick="calcDebit()">РАССЧИТАТЬ</button>
        <div class="res-box">Дебит сутки: <br><span id="res_q" style="font-size:2rem; font-weight:bold;">0.0</span> м³/сут</div>
    </div>
</div>

<div id="v_report" class="view">
    <div class="card" style="text-align:center;">
        <h3>ОТЧЕТ ГОТОВ</h3>
        <div id="qr-out"></div>
        <button class="btn-exe" onclick="sendSys()">ОТПРАВИТЬ</button>
    </div>
</div>

<script>
    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function syncI() { document.getElementById('load_i_work').value = document.getElementById('p_i').value; }

    function calcLoad() {
        const w = parseFloat(document.getElementById('load_i_work').value) || 0;
        const e = parseFloat(document.getElementById('load_i_etp').value) || 1;
        const res = (w / e) * 100;
        document.getElementById('res_load').innerText = res.toFixed(1);
    }

    function calcDebit() {
        const l = parseFloat(document.getElementById('q_liters').value) || 0;
        const w = (parseFloat(document.getElementById('q_work').value) || 1) + (parseFloat(document.getElementById('q_stop').value) || 0);
        document.getElementById('res_q').innerText = ((l / w) * 1.44).toFixed(2);
    }

    function doGlush() {
        const p = parseFloat(document.getElementById('g_ppl').value) || 0;
        const h = parseFloat(document.getElementById('g_h').value) || 1;
        document.getElementById('res_g').innerText = ((p * 1.1 * 10) / h).toFixed(2);
    }

    function doTech() {
        const h = parseFloat(document.getElementById('t_h').value) || 0;
        const d_ek = parseFloat(document.getElementById('t_ek').value);
        const d_nkt = parseFloat(document.getElementById('t_nkt').value);
        const v1 = (Math.PI * Math.pow((d_nkt-10)/1000, 2)/4)*h;
        const v2 = (Math.PI * (Math.pow(d_ek/1000, 2) - Math.pow(d_nkt/1000, 2))/4)*h;
        document.getElementById('res_t1').innerText = v1.toFixed(1);
        document.getElementById('res_t2').innerText = v2.toFixed(1);
    }

    function createReport() {
        let out = `🏢 ЦДНГ-${document.getElementById('reg_cdng').value} | Бр-${document.getElementById('reg_br').value}\n📍 КП-${document.getElementById('reg_kp').value} | СКВ: ${document.getElementById('reg_skv').value}\n📅 ${document.getElementById('reg_date').value}\n`;
        if(document.getElementById('btnVNR').classList.contains('active')) out += `⚡ РЕЖИМ: ВНР\n`;
        
        const ids = [
            ['ВРЕМЯ', 'p_time', ''], ['Нд', 'p_nd', 'м'], ['Рз', 'p_rz', 'атм'], ['Рб', 'p_rb', 'атм'], 
            ['Рл', 'p_rl', 'атм'], ['F', 'p_f', 'Гц'], ['I', 'p_i', 'А'], ['З', 'p_z', '%'], 
            ['Рпр', 'p_ppr', 'атм'], ['Тдв', 'p_tdv', '°C'], ['Нст зат.', 'p_nstz', 'м'], 
            ['Нст нкт.', 'p_nstn', 'м'], ['ПРОБА %', 'p_h2o', '%']
        ];
        ids.forEach(item => {
            const val = document.getElementById(item[1]).value;
            if(val) out += `${item[0]}: ${val} ${item[2]}\n`;
        });

        const q = document.getElementById('res_q').innerText;
        if(q !== "0.0") out += `ДЕБИТ: ${q} м3/сут\n`;
        const l = document.getElementById('res_load').innerText;
        if(l !== "0.0") out += `ЗАГРУЗКА: ${l}%\n`;

        finalData = out;
        nav('v_report');
        document.getElementById("qr-out").innerHTML = "";
        new QRCode(document.getElementById("qr-out"), { text: out, width: 220, height: 220 });
    }

    async function sendSys() { if (navigator.share) await navigator.share({ text: finalData }); }

    // ГОЛОСОВОЙ ВВОД (ИЗ v20)
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechRecognition) return alert("Голос не поддерживается");
        const rec = new SpeechRecognition();
        rec.lang = 'ru-RU'; rec.onstart = () => { document.getElementById('voice_btn').innerText = "🔴 СЛУШАЮ..."; };
        rec.onresult = (e) => {
            const text = e.results[0][0].transcript.toLowerCase();
            const val = text.match(/\d+/);
            if(val) {
                if(text.includes("дебит")) document.getElementById('q_liters').value = val[0];
                if(text.includes("частота")) document.getElementById('p_f').value = val[0];
                if(text.includes("давление")) document.getElementById('p_ppr').value = val[0];
                if(text.includes("ток")) { document.getElementById('p_i').value = val[0]; syncI(); }
            }
            document.getElementById('voice_btn').innerText = "🎤 ВКЛЮЧИТЬ ГОЛОСОВОЙ ВВОД";
        };
        rec.start();
    }

    // АВТОСОХРАНЕНИЕ (ИЗ v20)
    window.onload = () => {
        document.getElementById('reg_date').valueAsDate = new Date();
        document.querySelectorAll('input').forEach(el => {
            el.value = localStorage.getItem('ata_' + el.id) || el.value;
            el.oninput = () => { 
                localStorage.setItem('ata_' + el.id, el.value);
                if(el.id === 'p_i') syncI();
            };
        });
    };
</script>
</body>
</html>
