<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATA v41.0 | INDUSTRIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0b0e14; --panel: #1c2128; --border: #444c56; --text: #adbac7; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1rem; font-weight: bold; color: var(--gold); }
        .view { display: none; padding: 15px; }
        .view.active { display: block !important; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 15px; margin-bottom: 12px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .nav-btn { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 20px 5px; color: #fff; text-align: center; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); margin-bottom: 15px; padding-bottom: 5px; }
        h3 { margin: 0; font-size: 0.9rem; color: #fff; text-transform: uppercase; }
        .vnr-btn { background: #22272e; border: 1px solid var(--border); color: var(--text); padding: 5px 15px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .vnr-btn.active { background: var(--gold); color: #000; border-color: #fff; }
        label { display: block; font-size: 0.75rem; color: #768390; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; background: #22272e; border: 1px solid var(--border); padding: 12px; border-radius: 4px; color: #fff; margin-bottom: 12px; font-size: 1rem; box-sizing: border-box; }
        .btn-exe { width: 100%; padding: 16px; border: none; border-radius: 4px; font-weight: 900; background: var(--gold); color: #000; text-transform: uppercase; }
        .res-box { background: #000; border: 1px solid var(--gold); padding: 15px; border-radius: 4px; text-align: center; margin: 10px 0; }
        #qr-out { background: #fff; padding: 10px; display: inline-block; border-radius: 4px; margin: 15px 0; }
    </style>
</head>
<body>

<header>
    <div class="logo">ATA v41.0</div>
    <button style="background:var(--gold); border:none; padding:8px 12px; border-radius:4px; font-weight:bold" onclick="nav('dash')">МЕНЮ</button>
</header>

<div id="dash" class="view active">
    <div class="card">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>КУСТ</label><input type="text" id="reg_kp" placeholder="№"></div>
            <div><label>СКВАЖИНА</label><input type="text" id="reg_skv" placeholder="№"></div>
        </div>
    </div>
    <div class="nav-grid">
        <div class="nav-btn" onclick="nav('v_params')">ПАРАМЕТРЫ</div>
        <div class="nav-btn" onclick="nav('v_debit')">ДЕБИТ (Л/ЦИКЛ)</div>
        <div class="nav-btn" onclick="nav('v_tech')">ГРП / КОЙЛ</div>
        <div class="nav-btn" onclick="nav('v_glush')">ГЛУШЕНИЕ</div>
        <div class="nav-btn" onclick="nav('v_ppd')">ППД ПРИЕМ.</div>
        <div class="nav-btn" onclick="createReport()" style="background:var(--gold); color:#000;">ОТЧЕТ</div>
    </div>
</div>

<div id="v_params" class="view">
    <div class="card">
        <div class="header-row">
            <h3>ПАРАМЕТРЫ ТМС</h3>
            <div id="btnVNR" class="vnr-btn" onclick="this.classList.toggle('active')">ВНР</div>
        </div>
        
        <label>Время замера</label><input type="time" id="p_time">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Нд (м)</label><input type="number" id="p_nd"></div>
            <div><label>Рз (атм)</label><input type="number" id="p_rz"></div>
            <div><label>Рб (атм)</label><input type="number" id="p_rb"></div>
            <div><label>Рл (атм)</label><input type="number" id="p_rl"></div>
            <div><label>F (Гц)</label><input type="number" id="p_f"></div>
            <div><label>I (А)</label><input type="number" id="p_i"></div>
            <div><label>З (%)</label><input type="number" id="p_z"></div>
            <div><label>Рпр (атм)</label><input type="number" id="p_ppr"></div>
            <div><label>Тдв (°C)</label><input type="number" id="p_tdv"></div>
            <div><label>Нст затр. (м)</label><input type="number" id="p_nstz"></div>
            <div style="grid-column: span 2;"><label>Нст нкт. (м)</label><input type="number" id="p_nstn"></div>
        </div>
        <label>Проба (%) Н2О</label><input type="number" id="p_h2o">
        <button class="btn-exe" onclick="createReport()">СФОРМИРОВАТЬ</button>
    </div>
</div>

<div id="v_debit" class="view">
    <div class="card">
        <h3>ЗАМЕР ДЕБИТА</h3>
        <label>Слив за цикл (Литры)</label><input type="number" id="q_liters">
        <label>Работа (мин)</label><input type="number" id="q_work">
        <label>Пауза (мин)</label><input type="number" id="q_stop">
        <button class="btn-exe" onclick="calcDebit()">РАССЧИТАТЬ</button>
        <div class="res-box">Дебит за сутки:<br><b id="res_q" style="font-size:1.8rem;">0.0</b> м³/сут</div>
    </div>
</div>

<div id="v_report" class="view">
    <div class="card" style="text-align:center;">
        <h3>ОТЧЕТ ГОТОВ</h3>
        <div id="qr-out"></div>
        <button class="btn-exe" onclick="sendSys()">ОТПРАВИТЬ СООБЩЕНИЕМ</button>
        <button style="width:100%; background:none; border:none; color:var(--gold); margin-top:20px; font-weight:bold;" onclick="nav('dash')">← В МЕНЮ</button>
    </div>
</div>

<script>
    let finalData = "";
    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function calcDebit() {
        const l = parseFloat(document.getElementById('q_liters').value) || 0;
        const w = parseFloat(document.getElementById('q_work').value) || 1;
        const s = parseFloat(document.getElementById('q_stop').value) || 0;
        document.getElementById('res_q').innerText = ((l / (w + s)) * 1.44).toFixed(2);
    }

    function createReport() {
        const kp = document.getElementById('reg_kp').value || "-";
        const skv = document.getElementById('reg_skv').value || "-";
        let out = `СКВ: ${skv} (КП-${kp})\n`;
        
        if(document.getElementById('btnVNR').classList.contains('active')) {
            out += `РЕЖИМ: ВНР\n`;
        }

        const ids = [
            ['ВРЕМЯ', 'p_time', ''], ['Нд', 'p_nd', 'м'], ['Рз', 'p_rz', 'атм'], 
            ['Рб', 'p_rb', 'атм'], ['Рл', 'p_rl', 'атм'], ['F', 'p_f', 'Гц'], 
            ['I', 'p_i', 'А'], ['З', 'p_z', '%'], ['Рпр', 'p_ppr', 'атм'], 
            ['Тдв', 'p_tdv', '°C'], ['Нст затр.', 'p_nstz', 'м'], 
            ['Нст нкт.', 'p_nstn', 'м'], ['ПРОБА % Н2О', 'p_h2o', '%']
        ];
        
        ids.forEach(item => {
            const val = document.getElementById(item[1]).value;
            if(val) out += `${item[0]}: ${val} ${item[2]}\n`;
        });

        const q = document.getElementById('res_q').innerText;
        if(q !== "0.0") out += `ДЕБИТ: ${q} м3/сут\n`;

        finalData = out;
        nav('v_report');
        const qrContainer = document.getElementById('qr-out');
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: out, width: 200, height: 200 });
    }

    async function sendSys() {
        if (navigator.share) await navigator.share({ title: 'Отчет', text: finalData });
    }
</script>
</body>
</html>
