<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Anvarov Timur Akramovich">
    <title>ATA v46.0 | ANVAROV T.A.</title>
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0b0e14; --panel: #1c2128; --border: #444c56; --text: #adbac7; --mic: #ff3b30; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 0.85rem; font-weight: 900; color: var(--gold); text-transform: uppercase; }
        .view { display: none; padding: 15px; }
        .view.active { display: block !important; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .nav-btn { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 25px 5px; color: #fff; text-align: center; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        label { display: block; font-size: 0.65rem; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; background: #010409; border: 1px solid var(--border); padding: 14px; border-radius: 8px; color: #fff; margin-bottom: 10px; font-size: 1.1rem; box-sizing: border-box; }
        .voice-bar { background: #1a1a1a; border: 2px solid var(--gold); color: #fff; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; margin-bottom: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .voice-bar.listening { background: var(--mic); border-color: #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        footer { text-align: center; padding: 25px; font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .btn-exe { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 900; background: var(--gold); color: #000; text-transform: uppercase; }
        #qr-out { background: #fff; padding: 10px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <div class="logo">DEVELOPER: ANVAROV TIMUR AKRAMOVICH</div>
</header>

<div class="card" style="margin: 10px; border-color: var(--gold);">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div><label>КУСТ</label><input type="text" id="reg_kp"></div>
        <div><label>СКВ</label><input type="text" id="reg_skv"></div>
    </div>
</div>

<div id="dash" class="view active">
    <div class="voice-bar" id="mainMic" onclick="startVoice()">🎤 НАЖМИ И ГОВОРИ КОМАНДУ</div>
    <div class="nav-grid">
        <div class="nav-btn" onclick="nav('v_params')">ПАРАМЕТРЫ ТМС</div>
        <div class="nav-btn" onclick="nav('v_debit')">ДЕБИТ</div>
        <div class="nav-btn" onclick="nav('v_glush')">ГЛУШЕНИЕ</div>
        <div class="nav-btn" onclick="createReport()" style="background:var(--gold); color:#000;">ОТЧЕТ</div>
    </div>
</div>

<div id="v_params" class="view">
    <div class="voice-bar" onclick="startVoice()">🎤 ГОВОРИ ПАРАМЕТРЫ</div>
    <div class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Нд (м)</label><input type="number" id="p_nd"></div>
            <div><label>Рз (атм)</label><input type="number" id="p_rz"></div>
            <div><label>Рб (атм)</label><input type="number" id="p_rb"></div>
            <div><label>Рл (атм)</label><input type="number" id="p_rl"></div>
            <div><label>F (Гц)</label><input type="number" id="p_f"></div>
            <div><label>I (А)</label><input type="number" id="p_i"></div>
            <div><label>З (%)</label><input type="number" id="p_z"></div>
            <div><label>Рпр (атм)</label><input type="number" id="p_ppr"></div>
        </div>
        <button class="btn-exe" onclick="nav('dash')">В МЕНЮ</button>
    </div>
</div>

<div id="v_debit" class="view">
    <div class="voice-bar" onclick="startVoice()">🎤 ГОВОРИ ДЕБИТ</div>
    <div class="card">
        <label>Литры</label><input type="number" id="q_liters">
        <label>Работа (мин)</label><input type="number" id="q_work">
        <button class="btn-exe" onclick="nav('dash')">В МЕНЮ</button>
    </div>
</div>

<div id="v_report" class="view">
    <div class="card" style="text-align:center;">
        <div id="qr-out"></div>
        <button class="btn-exe" style="margin-top:20px;" onclick="sendSys()">ОТПРАВИТЬ СООБЩЕНИЕМ</button>
        <button class="btn-exe" style="background:none; color:var(--gold);" onclick="nav('dash')">НАЗАД</button>
    </div>
</div>

<footer>
    Designed & Coded by Anvarov T.A. &copy; 2026
</footer>

<script>
    let finalData = "";
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'ru-RU';
    recognition.interimResults = false;

    function nav(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        window.speechSynthesis.speak(msg);
    }

    function startVoice() {
        try { recognition.start(); } catch(e) {}
        document.querySelectorAll('.voice-bar').forEach(b => {
            b.classList.add('listening');
            b.innerText = "🔴 СЛУШАЮ...";
        });
    }

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript.toLowerCase();
        const val = text.match(/\d+/);
        
        // Навигация
        if(text.includes("параметр")) { nav('v_params'); speak("Открываю параметры"); }
        else if(text.includes("дебит")) { nav('v_debit'); speak("Захожу в дебит"); }
        else if(text.includes("отчет")) { createReport(); speak("Сделала отчет"); }
        
        // Ввод данных
        if(val) {
            let n = val[0];
            if(text.includes("нд") || text.includes("уровень")) { document.getElementById('p_nd').value = n; speak("Нд " + n); }
            else if(text.includes("буфер") || text.includes("рз")) { document.getElementById('p_rz').value = n; speak("Буфер " + n); }
            else if(text.includes("затруб") || text.includes("рб")) { document.getElementById('p_rb').value = n; speak("Затруб " + n); }
            else if(text.includes("линия") || text.includes("линейное")) { document.getElementById('p_rl').value = n; speak("Линия " + n); }
            else if(text.includes("прием") || text.includes("рпр")) { document.getElementById('p_ppr').value = n; speak("Прием " + n); }
            else if(text.includes("частота") || text.includes("герц")) { document.getElementById('p_f').value = n; speak("Частота " + n); }
            else if(text.includes("ток")) { document.getElementById('p_i').value = n; speak("Ток " + n); }
            else if(text.includes("загрузка")) { document.getElementById('p_z').value = n; speak("Загрузка " + n); }
            else if(text.includes("литр")) { document.getElementById('q_liters').value = n; speak("Литры " + n); }
        }
    };

    recognition.onend = () => {
        document.querySelectorAll('.voice-bar').forEach(b => {
            b.classList.remove('listening');
            b.innerText = "🎤 НАЖМИ И ГОВОРИ";
        });
    };

    function createReport() {
        let out = `АНВАРОВ Т.А. | ОТЧЕТ\nКП-${document.getElementById('reg_kp').value} СКВ-${document.getElementById('reg_skv').value}\n`;
        const ids = [['Нд','p_nd'],['Рз','p_rz'],['Рб','p_rb'],['Рл','p_rl'],['F','p_f'],['I','p_i'],['З','p_z'],['Рпр','p_ppr']];
        ids.forEach(i => {
            let v = document.getElementById(i[1]).value;
            if(v) out += `${i[0]}: ${v}\n`;
        });
        finalData = out;
        nav('v_report');
        document.getElementById("qr-out").innerHTML = "";
        new QRCode(document.getElementById("qr-out"), { text: out, width: 200, height: 200 });
    }

    async function sendSys() { if (navigator.share) await navigator.share({ text: finalData }); }

    window.onload = () => {
        document.querySelectorAll('input').forEach(el => {
            el.value = localStorage.getItem('ata_' + el.id) || el.value;
            el.oninput = () => localStorage.setItem('ata_' + el.id, el.value);
        });
    };
</script>
</body>
</html>
